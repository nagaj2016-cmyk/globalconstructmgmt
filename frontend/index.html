// PHASE 13 — SaaS ADMIN
// ═══════════════════════════════════════════════════════════════════════════════
const SaasAdmin=({toast})=>{
  const[tab,setTab]=useState("dashboard");
  const[dash,setDash]=useState(null);
  const[tenants,setTenants]=useState([]);
  const[plans,setPlans]=useState([]);
  const[selTenant,setSelTenant]=useState(null);
  const[usage,setUsage]=useState(null);
  const[cfg,setCfg]=useState(null);
  const[onboardForm,setOnboardForm]=useState({company_name:"",admin_email:"",admin_name:"",admin_password:"",plan_name:"starter",country:"India",timezone:"Asia/Kolkata",currency:"INR"});
  const tenantCountries=["India","Canada","United States","Europe","Australia","United Arab Emirates","Saudi Arabia","United Kingdom","Singapore"];

  React.useEffect(()=>{loadDash();loadTenants();loadPlans();},[]);
  const loadDash=async()=>{try{const d=await api("/saas/admin/dashboard");setDash(d);}catch(e){}};
  const loadTenants=async()=>{try{const d=await api("/saas/admin/tenants");setTenants(Array.isArray(d)?d:[]);}catch(e){}};
  const loadPlans=async()=>{try{const d=await api("/saas/plans");setPlans(Array.isArray(d)?d:[]);}catch(e){}};
  const pickTenant=async(t)=>{setSelTenant(t);
    try{const u=await api("/saas/usage/"+t.company_id);setUsage(u);}catch(e){setUsage(null);}
    try{const c=await api("/saas/config/"+t.company_id);setCfg(c);}catch(e){setCfg(null);}};
  const onboard=async()=>{
    await api("/saas/onboard",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(onboardForm)});
    toast("Tenant onboarded!");loadTenants();loadDash();
    setOnboardForm({company_name:"",admin_email:"",admin_name:"",admin_password:"",plan_name:"starter",country:"India",timezone:"Asia/Kolkata",currency:"INR"});};
  const setOnboardCountry=(country)=>{
    const profile=getCountryProfile(country);
    setOnboardForm({...onboardForm,country,timezone:profile.timezone,currency:profile.currency==="Multi-currency"?"USD":profile.currency});
  };
  const subscribe=async(cid,pname)=>{
    await api("/saas/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({company_id:cid,plan_name:pname})});
    toast("Plan updated");loadTenants();};
  const suspend=async(id)=>{await api("/saas/admin/tenants/"+id+"/suspend",{method:"PUT"});toast("Suspended","warning");loadTenants();};
  const activate=async(id)=>{await api("/saas/admin/tenants/"+id+"/activate",{method:"PUT"});toast("Activated");loadTenants();};
  const saveConfig=async()=>{if(!selTenant||!cfg)return;
    await api("/saas/config/"+selTenant.company_id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});
    toast("Config saved");};

  const PC={"free":"#64748b","starter":"#2563eb","professional":"#7c3aed","enterprise":"#dc2626"};
  const SC={"active":"#166534","trial":"#92400e","suspended":"#991b1b","none":"#6b7280"};

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {[["dashboard","fa-gauge-high","Dashboard"],["tenants","fa-building","Tenants"],["onboard","fa-plus-circle","Onboard"],["plans","fa-credit-card","Plans"]].map(([k,ic,l])=>(
          <button key={k} className={"btn"+(tab===k?" btn-primary":"")} style={{fontSize:12}} onClick={()=>setTab(k)}>
            <i className={"fas "+ic}/> {l}
          </button>
        ))}
      </div>

      {tab==="dashboard"&&dash&&<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
          {[["Tenants",dash.total_tenants,"fa-building","#3b82f6"],["Active",dash.status.active,"fa-check-circle","#10b981"],["Trial",dash.status.trial,"fa-clock","#f59e0b"],["MRR","USD "+dash.mrr_usd,"fa-coins","#8b5cf6"]].map(([l,v,ic,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}><div style={{fontSize:11,color:"#64748b"}}><i className={"fas "+ic} style={{color:c,marginRight:4}}/>{l}</div><div style={{fontSize:26,fontWeight:700}}>{v}</div></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}>
            <h4 style={{marginBottom:10}}>Plan Distribution</h4>
            {Object.entries(dash.plan_distribution||{}).map(([plan,count])=>(
              <div key={plan} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <span style={{background:(PC[plan]||"#64748b")+"22",color:PC[plan]||"#64748b",border:"1px solid "+(PC[plan]||"#64748b")+"44",borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,minWidth:90,textAlign:"center"}}>{plan}</span>
                <div style={{flex:1,background:"#f1f5f9",borderRadius:4,height:6}}><div style={{background:PC[plan]||"#64748b",width:(count/Math.max(dash.total_tenants,1)*100)+"%",height:"100%",borderRadius:4}}/></div>
                <span style={{fontSize:12,fontWeight:700}}>{count}</span>
              </div>
            ))}
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}>
            <h4 style={{marginBottom:10}}>Revenue</h4>
            <div style={{display:"flex",gap:10,marginBottom:10}}>
              <div style={{flex:1,background:"#eff6ff",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontSize:11,color:"#64748b"}}>MRR</div><div style={{fontSize:24,fontWeight:700,color:"#1e40af"}}>USD {dash.mrr_usd}</div></div>
              <div style={{flex:1,background:"#f0fdf4",borderRadius:8,padding:12,textAlign:"center"}}><div style={{fontSize:11,color:"#64748b"}}>ARR</div><div style={{fontSize:24,fontWeight:700,color:"#166534"}}>USD {dash.arr_usd}</div></div>
            </div>
          </div>
        </div>
      </div>}
      {tab==="dashboard"&&!dash&&<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>Loading dashboard...</div>}

      {tab==="tenants"&&<div style={{display:"grid",gridTemplateColumns:"1fr 320px",gap:16}}>
        <div>
          <table className="table" style={{fontSize:12}}>
            <thead><tr><th>Company</th><th>Plan</th><th>Status</th><th>Users</th><th>Trial Ends</th><th>Actions</th></tr></thead>
            <tbody>
              {tenants.map(t=><tr key={t.company_id} style={{cursor:"pointer",background:selTenant&&selTenant.company_id===t.company_id?"#eff6ff":"transparent"}} onClick={()=>pickTenant(t)}>
                <td><div style={{fontWeight:600}}>{t.company_name}</div><div style={{fontSize:10,color:"#64748b"}}>{t.app_name}</div></td>
                <td><span style={{background:(PC[t.plan]||"#64748b")+"22",color:PC[t.plan]||"#64748b",border:"1px solid "+(PC[t.plan]||"#64748b")+"44",borderRadius:4,padding:"2px 6px",fontSize:11,fontWeight:600}}>{t.plan||"free"}</span></td>
                <td><span style={{color:SC[t.subscription_status]||"#6b7280",fontWeight:600,fontSize:11}}>{t.subscription_status||"none"}</span></td>
                <td>{t.user_count}</td><td>{t.trial_ends||"—"}</td>
                <td style={{display:"flex",gap:4}}>
                  {t.is_active?<button className="btn" style={{fontSize:10,padding:"1px 6px",background:"#fee2e2",color:"#991b1b"}} onClick={e=>{e.stopPropagation();suspend(t.company_id);}}>Suspend</button>
                  :<button className="btn" style={{fontSize:10,padding:"1px 6px",background:"#dcfce7",color:"#166534"}} onClick={e=>{e.stopPropagation();activate(t.company_id);}}>Activate</button>}
                </td>
              </tr>)}
              {tenants.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"#94a3b8",padding:20}}>No tenants yet.</td></tr>}
            </tbody>
          </table>
        </div>
        {selTenant&&<div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14,marginBottom:10}}>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>{selTenant.company_name}</h4>
            {usage&&<div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>Usage — {usage.period}</div>
              {[["Users",usage.current.users,usage.limits.users],["Projects",usage.current.projects,usage.limits.projects]].map(([l,c,lim])=>(
                <div key={l} style={{marginBottom:5}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span>{l}</span><span>{c} / {lim<0?"∞":lim}</span></div>
                  <div style={{background:"#f1f5f9",borderRadius:4,height:5}}><div style={{background:"#3b82f6",width:(lim>0?Math.min(c/lim*100,100):0)+"%",height:"100%",borderRadius:4}}/></div>
                </div>
              ))}
            </div>}
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14,marginBottom:10}}>
            <h4 style={{marginBottom:8}}>Change Plan</h4>
            {plans.map(p=><button key={p.name} className="btn" style={{width:"100%",textAlign:"left",display:"flex",justifyContent:"space-between",background:selTenant.plan===p.name?"#eff6ff":"transparent",border:"1px solid "+(selTenant.plan===p.name?"#3b82f6":"#e2e8f0"),borderRadius:5,padding:"5px 8px",fontSize:11,marginBottom:4}} onClick={()=>subscribe(selTenant.company_id,p.name)}>
              <span style={{fontWeight:600,color:PC[p.name]||"#64748b"}}>{p.display_name}</span><span style={{color:"#64748b"}}>USD {p.price_monthly}/mo</span>
            </button>)}
          </div>
          {cfg&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}>
            <h4 style={{marginBottom:8}}>White-label</h4>
            <label style={{fontSize:11}}>App Name</label><input className="input" value={cfg.app_name||""} onChange={e=>setCfg({...cfg,app_name:e.target.value})}/>
            <label style={{fontSize:11}}>Primary Color</label>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="color" value={cfg.primary_color||"#2563eb"} onChange={e=>setCfg({...cfg,primary_color:e.target.value})} style={{width:36,height:30,border:"none",cursor:"pointer"}}/>
              <input className="input" style={{flex:1,margin:0}} value={cfg.primary_color||"#2563eb"} onChange={e=>setCfg({...cfg,primary_color:e.target.value})}/>
            </div>
            <label style={{fontSize:11}}>Currency</label>
            <select className="input" value={cfg.currency||"INR"} onChange={e=>setCfg({...cfg,currency:e.target.value})}>{CURRENCY_OPTIONS.map(c=><option key={c}>{c}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:6,fontSize:11}} onClick={saveConfig}>Save Config</button>
          </div>}
        </div>}
      </div>}

      {tab==="onboard"&&<div style={{maxWidth:460}}>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:20}}>
          <h4 style={{marginBottom:12,color:"#1e40af"}}>Onboard New Tenant</h4>
          <p style={{fontSize:12,color:"#64748b",marginBottom:12}}>Creates company + admin user + subscription with a 30-day trial.</p>
          <label>Company Name</label><input className="input" value={onboardForm.company_name} onChange={e=>setOnboardForm({...onboardForm,company_name:e.target.value})}/>
          <label>Admin Name</label><input className="input" value={onboardForm.admin_name} onChange={e=>setOnboardForm({...onboardForm,admin_name:e.target.value})}/>
          <label>Admin Email</label><input className="input" type="email" value={onboardForm.admin_email} onChange={e=>setOnboardForm({...onboardForm,admin_email:e.target.value})}/>
          <label>Admin Password</label><input className="input" type="password" value={onboardForm.admin_password} onChange={e=>setOnboardForm({...onboardForm,admin_password:e.target.value})}/>
          <label>Plan</label>
          <select className="input" value={onboardForm.plan_name} onChange={e=>setOnboardForm({...onboardForm,plan_name:e.target.value})}>
            {plans.map(p=><option key={p.name} value={p.name}>{p.display_name} — USD {p.price_monthly}/mo</option>)}
          </select>
          <label>Country</label>
          <select className="input" value={onboardForm.country} onChange={e=>setOnboardCountry(e.target.value)}>
            {tenantCountries.map(c=><option key={c}>{c}</option>)}
          </select>
          <label>Timezone</label>
          <select className="input" value={onboardForm.timezone} onChange={e=>setOnboardForm({...onboardForm,timezone:e.target.value})}>
            {["Asia/Kolkata","America/Toronto","America/New_York","Europe/Berlin","Europe/London","Australia/Sydney","Asia/Dubai","Asia/Riyadh","Asia/Singapore","UTC"].map(tz=><option key={tz}>{tz}</option>)}
          </select>
          <label>Currency</label>
          <select className="input" value={onboardForm.currency} onChange={e=>setOnboardForm({...onboardForm,currency:e.target.value})}>
            {CURRENCY_OPTIONS.map(c=><option key={c}>{c}</option>)}
          </select>
          <button className="btn btn-primary" style={{width:"100%",marginTop:12}} onClick={onboard}><i className="fas fa-rocket"/> Onboard Tenant</button>
        </div>
      </div>}

      {tab==="plans"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:14}}>
        {plans.map(p=><div key={p.name} style={{background:"#fff",border:"2px solid "+(PC[p.name]||"#e2e8f0"),borderRadius:12,padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
            <span style={{fontWeight:700,fontSize:16,color:PC[p.name]||"#1e293b"}}>{p.display_name}</span>
            <span style={{fontSize:12,color:"#64748b"}}>USD {p.price_monthly}/mo</span>
          </div>
          <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>{p.max_users<0?"Unlimited":p.max_users} users · {p.max_projects<0?"Unlimited":p.max_projects} projects · {p.max_storage_gb}GB</div>
          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            {(p.features||[]).map(f=><div key={f} style={{fontSize:11,color:"#374151",display:"flex",alignItems:"center",gap:5}}><i className="fas fa-check" style={{color:"#22c55e",fontSize:9}}/>{f.replace(/_/g," ")}</div>)}
          </div>
          {p.price_annual>0&&<div style={{marginTop:10,background:"#f0fdf4",borderRadius:5,padding:"3px 7px",fontSize:10,color:"#166534",fontWeight:600}}>Annual: USD {p.price_annual}/yr (save {Math.round((1-p.price_annual/(p.price_monthly*12))*100)}%)</div>}
        </div>)}
      </div>}
    </div>
  );
};

// ATTENDANCE MODULE (standalone page)
// ═══════════════════════════════════════════════════════════════════════════════
const AttendanceModule=({toast})=>{
  const[records,setRecords]=useState([]);
  const[projects,setProjects]=useState([]);
  const[workers,setWorkers]=useState([]);
  const[selProj,setSelProj]=useState("");
  const[selDate,setSelDate]=useState(new Date().toISOString().slice(0,10));
  const[loading,setLoading]=useState(false);

  React.useEffect(()=>{
    api("/projects/").then(d=>setProjects(Array.isArray(d)?d:(d.items||[]))).catch(()=>{});
    api("/workers").then(d=>setWorkers(Array.isArray(d)?d:[])).catch(()=>{});
  },[]);

  React.useEffect(()=>{
    if(!selProj)return;
    setLoading(true);
    api("/siteops/attendance?project_id="+selProj+"&date="+selDate)
      .then(d=>setRecords(Array.isArray(d)?d:[]))
      .catch(()=>setRecords([]))
      .finally(()=>setLoading(false));
  },[selProj,selDate]);

  const markAll=async(status)=>{
    if(!selProj){toast("Select a project first","error");return;}
    const toMark=workers.filter(w=>!records.find(r=>r.worker_id===w.id));
    for(const w of toMark){
      await api("/siteops/attendance",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({worker_id:w.id,project_id:+selProj,date:selDate,status,check_in:"08:00",check_out:"17:00",hours_worked:9})
      }).catch(()=>{});
    }
    toast(`Marked ${toMark.length} workers as ${status}`);
    api("/siteops/attendance?project_id="+selProj+"&date="+selDate).then(d=>setRecords(Array.isArray(d)?d:[])).catch(()=>{});
  };

  const toggle=async(wid,current)=>{
    const next=current==="present"?"absent":"present";
    const rec=records.find(r=>r.worker_id===wid);
    if(rec){
      await api("/siteops/attendance/"+rec.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:next})}).catch(()=>{});
    } else {
      await api("/siteops/attendance",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({worker_id:wid,project_id:+selProj,date:selDate,status:next,check_in:"08:00",check_out:"17:00",hours_worked:9})
      }).catch(()=>{});
    }
    api("/siteops/attendance?project_id="+selProj+"&date="+selDate).then(d=>setRecords(Array.isArray(d)?d:[])).catch(()=>{});
  };

  const getStatus=(wid)=>{const r=records.find(r=>r.worker_id===wid);return r?r.status:"absent";};
  const present=workers.filter(w=>getStatus(w.id)==="present").length;
  const half=workers.filter(w=>getStatus(w.id)==="half_day").length;
  const absent=workers.filter(w=>getStatus(w.id)==="absent").length;

  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        <select className="input" style={{maxWidth:260}} value={selProj} onChange={e=>setSelProj(e.target.value)}>
          <option value="">— Select Project —</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select>
        <input className="input" type="date" style={{maxWidth:180}} value={selDate} onChange={e=>setSelDate(e.target.value)}/>
        <button className="btn btn-primary" onClick={()=>markAll("present")} disabled={!selProj}>✓ Mark All Present</button>
        <button className="btn btn-outline" style={{borderColor:"#ef4444",color:"#ef4444"}} onClick={()=>markAll("absent")} disabled={!selProj}>✗ Mark All Absent</button>
      </div>

      {selProj&&<div className="stats-grid" style={{marginBottom:16}}>
        <div className="stat-card"><div className="stat-icon" style={{background:"#f0fdf4",color:"#10b981"}}><i className="fas fa-user-check"/></div><div className="stat-info"><h3>{present}</h3><p>Present</p><span style={{fontSize:11,color:"#94a3b8"}}>{workers.length?Math.round(present/workers.length*100):0}%</span></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:"#fef3c7",color:"#d97706"}}><i className="fas fa-user-clock"/></div><div className="stat-info"><h3>{half}</h3><p>Half Day</p></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:"#fef2f2",color:"#ef4444"}}><i className="fas fa-user-xmark"/></div><div className="stat-info"><h3>{absent}</h3><p>Absent</p></div></div>
        <div className="stat-card"><div className="stat-icon" style={{background:"#eff6ff",color:"#3b82f6"}}><i className="fas fa-users"/></div><div className="stat-info"><h3>{workers.length}</h3><p>Total Workers</p></div></div>
      </div>}

      {loading&&<div className="loading-center"><div className="spinner"/></div>}

      {selProj&&!loading&&<div className="card">
        <table className="table">
          <thead><tr><th>Worker</th><th>Role</th><th>Status</th><th>Hours</th><th>Action</th></tr></thead>
          <tbody>
            {workers.map(w=>{
              const st=getStatus(w.id);
              const rec=records.find(r=>r.worker_id===w.id);
              return(
                <tr key={w.id}>
                  <td><strong>{w.name}</strong></td>
                  <td><span style={{fontSize:11,color:"#64748b"}}>{w.trade||w.role||"—"}</span></td>
                  <td>
                    <select value={st} onChange={async e=>{
                      const v=e.target.value;
                      if(rec){await api("/siteops/attendance/"+rec.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:v})}).catch(()=>{});}
                      else{await api("/siteops/attendance",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({worker_id:w.id,project_id:+selProj,date:selDate,status:v,check_in:"08:00",check_out:"17:00",hours_worked:v==="half_day"?4.5:9})}).catch(()=>{});}
                      api("/siteops/attendance?project_id="+selProj+"&date="+selDate).then(d=>setRecords(Array.isArray(d)?d:[])).catch(()=>{});
                    }} style={{fontSize:12,padding:"2px 6px",borderRadius:4,border:"1px solid #e2e8f0",background:st==="present"?"#f0fdf4":st==="half_day"?"#fffbeb":"#fef2f2"}}>
                      <option value="present">Present</option>
                      <option value="half_day">Half Day</option>
                      <option value="absent">Absent</option>
                      <option value="leave">On Leave</option>
                    </select>
                  </td>
                  <td style={{fontSize:12}}>{rec?rec.hours_worked||9:"—"} hrs</td>
                  <td><span style={{fontSize:11,color:st==="present"?"#10b981":st==="absent"?"#ef4444":"#f59e0b",fontWeight:700}}>{st==="present"?"✓ In":st==="absent"?"✗ Out":"½ Half"}</span></td>
                </tr>
              );
            })}
            {workers.length===0&&<tr><td colSpan={5}><div className="empty"><i className="fas fa-users"/>No workers found</div></td></tr>}
          </tbody>
        </table>
      </div>}

      {!selProj&&<div className="empty"><i className="fas fa-calendar-check"/>Select a project and date to manage attendance</div>}
    </div>
  );
};

// REPORTS CENTER
// ═══════════════════════════════════════════════════════════════════════════════
const ReportsCenter=({toast,setPage})=>{
  const[projects,setProjects]=useState([]);
  const[selProj,setSelProj]=useState("");
  const[generating,setGenerating]=useState({});

  React.useEffect(()=>{
    api("/projects/").then(d=>setProjects(Array.isArray(d)?d:(d.items||[]))).catch(()=>{});
  },[]);

  const genPdf=async(endpoint,filename,params={})=>{
    setGenerating(g=>({...g,[filename]:true}));
    try{
      const qs=new URLSearchParams(params).toString();
      const res=await fetch(API+"/"+endpoint+(qs?"?"+qs:""),{headers:{Authorization:"Bearer "+getToken(),"ngrok-skip-browser-warning":"true"}});
      if(!res.ok)throw new Error("Failed");
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=filename;a.click();
      URL.revokeObjectURL(url);
      toast("Report downloaded: "+filename);
    }catch(e){toast("Error generating report","error");}
    setGenerating(g=>({...g,[filename]:false}));
  };

  const REPORT_GROUPS=[
    {title:"Project Reports",color:"#3b82f6",icon:"fa-diagram-project",reports:[
      {name:"Project Summary Report",desc:"All projects with budget, progress, and status",fn:()=>genPdf("reports/projects","projects_summary.pdf")},
      {name:"Task Status Report",desc:"All tasks by status, priority, and assignee",fn:()=>genPdf("reports/tasks","tasks_report.pdf")},
      {name:"Schedule & EVM Report",desc:"CPM critical path, SPI/CPI analysis",fn:()=>selProj?genPdf("reports/schedule","schedule_evm.pdf",{project_id:selProj}):toast("Select project","error")},
    ]},
    {title:"Commercial Reports",color:"#10b981",icon:"fa-coins",reports:[
      {name:"Invoice Register",desc:"All invoices with amounts and payment status",fn:()=>genPdf("reports/invoices","invoice_register.pdf")},
      {name:"Expense Report",desc:"Expense breakdown by category and project",fn:()=>genPdf("reports/expenses","expense_report.pdf")},
      {name:"BOQ & Procurement",desc:"Bill of quantities vs actual procurement",fn:()=>genPdf("reports/boq","boq_report.pdf",{project_id:selProj||""})},
    ]},
    {title:"Site & Quality Reports",color:"#f59e0b",icon:"fa-hard-hat",reports:[
      {name:"Daily Site Diary",desc:"Site diary entries for selected project",fn:()=>selProj?genPdf("siteops/diary/export","site_diary.pdf",{project_id:selProj}):toast("Select project","error")},
      {name:"Cube Test Certificate",desc:"IS 516 concrete test results",fn:()=>selProj?genPdf("qc/tests/export","cube_tests.pdf",{project_id:selProj}):toast("Select project","error")},
      {name:"NCR Register",desc:"Non-conformance reports and status",fn:()=>selProj?genPdf("qc/ncr/export","ncr_register.pdf",{project_id:selProj}):toast("Select project","error")},
    ]},
    {title:"Safety Reports",color:"#ef4444",icon:"fa-triangle-exclamation",reports:[
      {name:"Safety Incident Report",desc:"All incidents with severity and actions",fn:()=>genPdf("safety/incidents/export","incidents.pdf")},
      {name:"Permit to Work Log",desc:"All permits — active, expired, closed",fn:()=>genPdf("safety/ptw/export","ptw_log.pdf")},
      {name:"Toolbox Talk Register",desc:"Attendance list for all toolbox talks",fn:()=>genPdf("safety/toolbox/export","toolbox_talks.pdf")},
    ]},
    {title:"Workforce Reports",color:"#8b5cf6",icon:"fa-users",reports:[
      {name:"Worker Register",desc:"All workers with trade, status, and contact",fn:()=>genPdf("reports/workers","worker_register.pdf")},
      {name:"Attendance Summary",desc:"Attendance % by worker and date range",fn:()=>selProj?genPdf("siteops/attendance/export","attendance_report.pdf",{project_id:selProj}):toast("Select project","error")},
      {name:"Equipment Log",desc:"Equipment utilisation and fuel consumption",fn:()=>genPdf("siteops/equipment/export","equipment_log.pdf")},
    ]},
  ];

  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:20,alignItems:"center",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <p style={{color:"#64748b",fontSize:13,marginBottom:8}}>Select a project for project-specific reports:</p>
          <select className="input" style={{maxWidth:320}} value={selProj} onChange={e=>setSelProj(e.target.value)}>
            <option value="">— All Projects —</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn btn-outline" style={{fontSize:12}} onClick={()=>setPage("documents")}><i className="fas fa-folder-open"/> Documents</button>
          <button className="btn btn-outline" style={{fontSize:12}} onClick={()=>setPage("quality")}><i className="fas fa-clipboard-check"/> QC Module</button>
          <button className="btn btn-outline" style={{fontSize:12}} onClick={()=>setPage("safety")}><i className="fas fa-triangle-exclamation"/> Safety Module</button>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:16}}>
        {REPORT_GROUPS.map(grp=>(
          <div key={grp.title} className="card" style={{borderTop:`3px solid ${grp.color}`}}>
            <div className="card-header" style={{marginBottom:12}}>
              <span className="card-title"><i className={"fas "+grp.icon} style={{color:grp.color,marginRight:6}}/>{grp.title}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {grp.reports.map(r=>(
                <div key={r.name} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"#1e293b"}}>{r.name}</div>
                    <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{r.desc}</div>
                  </div>
                  <button className="btn btn-outline btn-sm" style={{marginLeft:10,fontSize:11,whiteSpace:"nowrap",color:grp.color,borderColor:grp.color+"66"}} onClick={r.fn} disabled={generating[r.name]}>
                    {generating[r.name]?<><span className="spinner"/> Generating…</>:<><i className="fas fa-file-pdf"/> PDF</>}
                  </button>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

        concrete_footing:{...commonConcrete,Pu:+adv.Pu,Mx:+adv.Mux,My:+adv.Muy,bearing_capacity:+adv.bearing_capacity,column_b:+adv.column_b,column_h:+adv.column_h,footing_L:+adv.footing_L,footing_B:+adv.footing_B,thickness:+adv.thickness},
        development_length:{...commonConcrete,bar_dia:+adv.bar_dia,coating:adv.coating,concrete_location:adv.concrete_location,confinement:adv.confinement},
        concrete_slab:{...commonConcrete,slab_type:adv.slab_type,span_short:+adv.span_short,span_long:+adv.span_long,thickness:+adv.thickness,factored_load:+adv.factored_load,bar_dia:+adv.bar_dia},
        punching_shear:{fc:+ccFc,Vu:+adv.Vu,column_b:+adv.column_b,column_h:+adv.column_h,slab_thickness:+adv.thickness,bar_dia:+adv.bar_dia,interior:adv.interior==="true"},
        steel_column:{section:stSection,Fy:+stFy,Ag:+adv.Ag,rx:+adv.rx,ry:+adv.ry,KLx:+adv.KLx,KLy:+adv.KLy,Cf:+adv.Cf},
        baseplate:{Pu:+adv.Pu,M:+adv.Mux,plate_N:+adv.plate_N,plate_B:+adv.plate_B,column_d:+adv.column_d,column_bf:+adv.column_bf,plate_t:+adv.plate_t,Fy_plate:+adv.Fy_plate,fc:+ccFc,anchor_count:+adv.anchor_count,anchor_dia:+adv.anchor_dia},
        bolt_group:{bolt_dia:+adv.bolt_dia,bolt_grade_Fu:+adv.bolt_grade_Fu,n_bolts:+adv.n_bolts,shear_planes:+adv.shear_planes,factored_shear:+adv.factored_shear,plate_thickness:+adv.plate_thickness,plate_Fu:+adv.plate_Fu,edge_distance:+adv.edge_distance},
        weld:{weld_size:+adv.weld_size,weld_length:+adv.weld_length,electrode_Fu:+adv.electrode_Fu,factored_load:+adv.factored_load_weld,load_angle_deg:+adv.load_angle_deg},
        web_crippling:{section:stSection,Fy:+stFy,factored_reaction:+adv.factored_shear,bearing_length:+adv.bearing_length,d:310,tw:9.9,tf:15.4,end_reaction:adv.end_reaction==="true",stiffeners:adv.stiffeners==="true"},
        wood_fastener:{fastener_type:adv.fastener_type,diameter:+adv.fastener_dia,side_member_thickness:+adv.side_member_thickness,main_member_thickness:+adv.main_member_thickness,wood_specific_gravity:+adv.wood_sg,n_fasteners:+adv.n_fasteners,factored_load:+adv.fastener_load,load_duration:wdDuration},
      }[advType];
    }
    try{
      const d=await api(url,{method:"POST",body:JSON.stringify(body)});
      setResult(d);
      if(toast)toast("✓ Calculation complete","success");
    }catch(e){if(toast)toast("Calculation failed","error");}
    setLoading(false);
  };

  const statusBadge=(s)=>{
    if(!s)return null;
    const ok=s.includes("SAFE");
    return<span style={{display:"inline-block",padding:"3px 10px",borderRadius:5,fontWeight:700,fontSize:12,
      background:ok?"#dcfce7":"#fee2e2",color:ok?"#166534":"#991b1b"}}>{s}</span>;
  };

  const nbcTabs=[
    {id:"snow",label:"❄ Snow Load"},
    {id:"wind",label:"💨 Wind"},
    {id:"seismic",label:"🌎 Seismic"},
    {id:"concrete",label:"🏗 CSA A23.3"},
    {id:"steel",label:"⚙ CSA S16"},
    {id:"wood",label:"🪵 CSA O86"},
    {id:"combos",label:"∑ Load Combos"},
    {id:"advanced",label:"▦ Advanced"},
  ];

  const inp=(label,val,set,type="number",step=0.1,extra={})=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:3}}>{label}</div>
      <input type={type} value={val} step={step} onChange={e=>set(type==="number"?+e.target.value:e.target.value)}
        style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:13,background:"#f8fafc"}} {...extra}/>
    </div>
  );
  const sel=(label,val,set,opts)=>(
    <div style={{marginBottom:10}}>
      <div style={{fontSize:11,fontWeight:600,color:"#64748b",marginBottom:3}}>{label}</div>
      <select value={val} onChange={e=>set(e.target.value)}
        style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #e2e8f0",fontSize:13,background:"#f8fafc"}}>
        {opts.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );

  const ResultRow=({k,v,bold,hi})=>(
    <div style={{display:"flex",justifyContent:"space-between",padding:"6px 12px",
      background:hi?"#f0fdf4":"transparent",borderBottom:"1px solid #f1f5f9",fontSize:13}}>
      <span style={{color:"#64748b"}}>{k}</span>
      <span style={{fontWeight:bold?700:500,color:hi?"#059669":"#0f2044"}}>{v}</span>
    </div>
  );
  const setAdvField=(k,v)=>setAdv(p=>({...p,[k]:v}));
  const AdvIn=({k,label,type="number",step=0.1})=>inp(label||k,adv[k],v=>setAdvField(k,v),type,step);
  const AdvSel=({k,label,opts})=>sel(label||k,adv[k],v=>setAdvField(k,v),opts);
  const renderObjectRows=(obj,prefix="")=>{
    if(!obj||typeof obj!=="object")return null;
    return Object.entries(obj).map(([k,v])=>{
      if(k==="proof")return null;
      const label=(prefix?prefix+" · ":"")+k.replaceAll("_"," ");
      if(v&&typeof v==="object")return renderObjectRows(v,label);
      return <ResultRow key={label} k={label} v={String(v)} bold={["overall","status","utilization_pct"].includes(k)}/>;
    });
  };
  const ProofPanel=({proof})=>{
    if(!proof)return null;
    return <div style={{marginTop:12,background:"#f8fafc",border:"1px solid #dbeafe",borderRadius:10,padding:14}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <i className="fas fa-shield-alt" style={{color:"#2563eb"}}/>
        <div style={{fontSize:12,fontWeight:800,color:"#0f2044",textTransform:"uppercase",letterSpacing:".4px"}}>Proof & Official Sources</div>
      </div>
      <div style={{fontSize:12,color:"#334155",lineHeight:1.5,marginBottom:10}}>
        <b>Code basis:</b> {proof.code_basis}
        {proof.clauses?.length?<> · <b>Clauses:</b> {proof.clauses.join("; ")}</>:null}
      </div>
      {proof.sources?.length&&<div style={{display:"grid",gap:8,marginBottom:10}}>
        {proof.sources.map((s,i)=><a key={i} href={s.url} target="_blank" rel="noreferrer"

          <div style={{fontSize:12,fontWeight:700,color:"#1d4ed8"}}>{s.label}</div>
          <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{s.authority} · {s.publisher}</div>
        </a>)}
      </div>}
      <div style={{fontSize:11,color:"#64748b",lineHeight:1.5}}>
        <b>Validation:</b> {proof.validation_status}<br/>
        <b>Legal note:</b> {proof.legal_note}
      </div>
    </div>;
  };

  return(

      <div style={{background:"linear-gradient(135deg,#0f2044 0%,#1e3a8a 100%)",borderRadius:14,padding:"20px 24px",marginBottom:20,color:"#fff",display:"flex",alignItems:"center",gap:16}}>
        <div style={{fontSize:36}}>🍁</div>
        <div>
          <div style={{fontSize:20,fontWeight:800,letterSpacing:"-0.5px"}}>NBC Canada Structural Calculator</div>
          <div style={{fontSize:13,color:"rgba(255,255,255,0.65)",marginTop:2}}>NBC {NBC_VERSIONS.join(" · ")} · CSA A23.3 · CSA S16 · CSA O86 · 35 cities</div>

            {tab==="steel"&&"⚙ CSA S16-19 Steel Beam"}
            {tab==="wood"&&"🪵 CSA O86-19 Wood Beam"}

            {sel("Importance Category",importance,setImportance,[

              {v:"high",l:"High (1.15)"},
              {v:"post_disaster",l:"Post-disaster (1.25)"},

          </>}

          {/* SNOW inputs */}
          {tab==="snow"&&<>
            {inp("Cb — Basic Roof Factor",Cb,setCb,"number",0.05)}
            {sel("Cw — Wind Exposure",Cw,setCw,[
              {v:1.0,l:"1.0 — Sheltered"},
              {v:0.75,l:"0.75 — Semi-exposed"},
              {v:0.5,l:"0.5 — Exposed"},

          {/* WIND inputs */}
          {tab==="wind"&&<>
            {inp("Reference Height h (m)",wHeight,setWHeight)}

              {v:"A",l:"A — Open terrain"},
              {v:"B",l:"B — Suburban (default)"},
              {v:"C",l:"C — Urban dense"},

            {inp("Cg — Gust Factor",wCg,setWCg)}
            {inp("Cp (net) — Pressure Coefficient",wCp,setWCp)}

          {/* SEISMIC inputs */}
          {tab==="seismic"&&<>
            {inp("Total Height hn (m)",sHn,setSHn)}
            {inp("Seismic Weight W (kN)",sWeight,setSWeight,1,100)}
            {sel("Structural System",sSystem,setSSystem,[
              {v:"ductile_moment",l:"Ductile Moment Frame (Rd=5.0)"},
              {v:"moderately_ductile",l:"Mod. Ductile Frame (Rd=3.5)"},
              {v:"limited_ductile",l:"Limited Ductility (Rd=2.0)"},
              {v:"ductile_sw",l:"Ductile Shear Wall (Rd=3.5)"},
              {v:"conventional",l:"Conventional (Rd=1.5)"},
            ])}
            {sel("Site Class",sSiteClass,setSSiteClass,[
              {v:"A",l:"A — Hard Rock"},
              {v:"B",l:"B — Rock"},
              {v:"C",l:"C — Very Dense Soil (default)"},
              {v:"D",l:"D — Stiff Soil"},
              {v:"E",l:"E — Soft Soil"},

          {/* CSA A23.3 CONCRETE inputs */}

              <div>{inp("fy (MPa)",ccFy,setCcFy)}</div>

          {tab==="steel"&&<>
            {inp("Section (e.g. W310x97)",stSection,setStSection,"text")}
            {sel("Steel Grade",stFy,setStFy,[
              {v:350,l:"G40.21 350W (default)"},
              {v:300,l:"G40.21 300W"},
              {v:260,l:"G40.21 260W"},

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <div>{inp("Mf (kN·m)",stMf,setStMf)}</div>

              <div>{inp("Zx (×10³ mm³)",stZx,setStZx)}</div>
            </div>
            {inp("Lb — Unbraced Length (m, 0=braced)",stLb,setStLb)}

          {tab==="wood"&&<>

              {v:"DF",l:"DF — Douglas Fir"},
              {v:"HF",l:"HF — Hem-Fir"},

            {sel("Grade",wdGrade,setWdGrade,[
              {v:"SS",l:"SS — Select Structural"},
              {v:"No.1",l:"No.1"},

              <div>{inp("Width (mm)",wdW,setWdW)}</div>
              <div>{inp("Depth (mm)",wdD,setWdD)}</div>

              <div>{inp("Vf (kN)",wdVf,setWdVf)}</div>

            {inp("Span (m)",wdSpan,setWdSpan)}
            {sel("Load Duration",wdDuration,setWdDuration,[

              {v:"standard",l:"Standard — occupancy (KD=1.0)"},
              {v:"long",l:"Long — storage (KD=0.80)"},
              {v:"permanent",l:"Permanent — self-weight (KD=0.65)"},

          {/* LOAD COMBOS inputs */}
          {tab==="combos"&&<>
            <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>Enter service loads (kN or kN/m)</div>

            {inp("S — Snow load",lcS,setLcS)}
            {inp("W — Wind load",lcW,setLcW)}
            {inp("E — Seismic (base shear kN)",lcE,setLcE)}
          </>}

          {/* ADVANCED inputs */}
          {tab==="advanced"&&<>
            {sel("Calculator",advType,setAdvType,[
              {v:"snow_drift",l:"NBC snow drift / roof step"},

              {v:"concrete_column",l:"CSA A23.3 concrete column"},
              {v:"concrete_footing",l:"CSA A23.3 isolated footing"},
              {v:"development_length",l:"CSA A23.3 development length"},
              {v:"concrete_slab",l:"CSA A23.3 slab flexure"},
              {v:"punching_shear",l:"CSA A23.3 punching shear"},
              {v:"steel_column",l:"CSA S16 steel column"},
              {v:"baseplate",l:"CSA S16 base plate"},
              {v:"bolt_group",l:"CSA S16 bolt group"},
              {v:"weld",l:"CSA S16 fillet weld"},
              {v:"web_crippling",l:"CSA S16 web crippling"},
              {v:"wood_fastener",l:"CSA O86 wood fastener"},
            ])}
            {advType==="snow_drift"&&<>
              {sel("City",city,setCity,NBC_CITIES)}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                <div><AdvIn k="lower_roof_width" label="Lower roof width (m)"/></div>

              </div>
              <AdvIn k="height_difference" label="Roof step height (m)"/>
            </>}
            {advType==="wind_components"&&<>
              {sel("City",city,setCity,NBC_CITIES)}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div>{inp("Height (m)",wHeight,setWHeight)}</div><div><AdvIn k="effective_area" label="Effective area (m²)"/></div></div>

            {["concrete_column","concrete_footing","development_length","concrete_slab","punching_shear"].includes(advType)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>

            {advType==="concrete_column"&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><AdvIn k="b" label="b (mm)"/></div><div><AdvIn k="h" label="h (mm)"/></div><div><AdvIn k="bar_dia" label="Bar dia (mm)"/></div><div><AdvIn k="n_bars" label="No. bars" step={1}/></div></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><AdvIn k="Pu" label="Pu (kN)"/></div><div><AdvIn k="unsupported_length" label="Length (m)"/></div><div><AdvIn k="Mux" label="Mux (kN·m)"/></div><div><AdvIn k="Muy" label="Muy (kN·m)"/></div></div>

            {advType==="concrete_footing"&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><AdvIn k="Pu" label="Pu (kN)"/></div><div><AdvIn k="bearing_capacity" label="Bearing (kPa)"/></div><div><AdvIn k="footing_L" label="Length (m)"/></div><div><AdvIn k="footing_B" label="Width (m)"/></div><div><AdvIn k="thickness" label="Thickness (mm)"/></div><div><AdvIn k="column_b" label="Column b (mm)"/></div></div>

            {advType==="development_length"&&<>
              <AdvIn k="bar_dia" label="Bar dia (mm)"/>

            {advType==="concrete_slab"&&<>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><AdvIn k="span_short" label="Short span (m)"/></div><div><AdvIn k="span_long" label="Long span (m)"/></div><div><AdvIn k="thickness" label="Thickness (mm)"/></div><div><AdvIn k="factored_load" label="Load (kPa)"/></div><div><AdvIn k="bar_dia" label="Bar dia (mm)"/></div></div>

            {advType==="steel_column"&&<>
              {inp("Section",stSection,setStSection,"text")}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div>{inp("Fy (MPa)",stFy,setStFy)}</div><div><AdvIn k="Cf" label="Cf (kN)"/></div><div><AdvIn k="Ag" label="Ag (mm²)"/></div><div><AdvIn k="rx" label="rx (mm)"/></div><div><AdvIn k="ry" label="ry (mm)"/></div><div><AdvIn k="KLx" label="KLx (m)"/></div></div>
            </>}
            {advType==="baseplate"&&<>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div><AdvIn k="Pu" label="Pu (kN)"/></div><div><AdvIn k="Mux" label="Moment (kN·m)"/></div><div><AdvIn k="plate_N" label="Plate N (mm)"/></div><div><AdvIn k="plate_B" label="Plate B (mm)"/></div><div><AdvIn k="plate_t" label="Plate t (mm)"/></div><div><AdvIn k="anchor_dia" label="Anchor dia (mm)"/></div></div>

            {/* LOAD COMBOS result */}
            {tab==="combos"&&result.combinations&&<div style={{padding:16}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>

            ✗ {result.error}
          </div>}
        </div>
      </div>
    </div>
  );
};

// PROJECT CONTROLS
// ═══════════════════════════════════════════════════════════════════════════════
const Stat=({icon,color,ic,label,val,sub})=>(
  <div className="stat-card">
    <div className="stat-icon" style={{background:color,color:ic}}><i className={"fas "+icon}/></div>
    <div className="stat-info">
      <h3 style={{fontSize:typeof val==="string"?14:22}}>{val}</h3>
      <p>{label}</p>
      <span style={{fontSize:11,color:"#94a3b8"}}>{sub}</span>
    </div>
  </div>
);

const Controls=({toast})=>{
  const[tab,setTab]=useState("rfis");
  const[projects,setProjects]=useState([]);
  const[rows,setRows]=useState([]);
  const[projectId,setProjectId]=useState("");
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);

  const endpoint={rfis:"/controls/rfis",changes:"/controls/change-orders",drawings:"/controls/drawings"}[tab];
  const load=()=>Promise.all([api("/projects"),api(endpoint+(projectId?`?project_id=${projectId}`:""))])
    .then(([p,r])=>{setProjects(p);setRows(Array.isArray(r)?r:[])})
    .catch(e=>toast(e.message,"error"));
  useEffect(()=>{load()},[tab,projectId]);

  const projectName=id=>projects.find(p=>p.id===id)?.name||"-";
  const save=async(d)=>{
    try{
      const body={...d,project_id:+d.project_id};
      if(tab==="changes"){
        body.cost_impact=+body.cost_impact||0;
        body.time_impact_days=+body.time_impact_days||0;
        if(!body.contract_id)delete body.contract_id; else body.contract_id=+body.contract_id;
      }
      await api(endpoint,{method:"POST",body:JSON.stringify(body)});
      toast("Saved","success");setModal(null);load();
    }catch(e){toast(e.message,"error")}
  };
  const del=async()=>{
    try{
      await api(`${endpoint}/${confirm.id}`,{method:"DELETE"});
      toast("Deleted","success");setConfirm(null);load();
    }catch(e){toast(e.message,"error")}
  };

  const totals={
    openRfis: rows.filter(r=>r.status==="open").length,
    pendingChanges: rows.filter(r=>["draft","submitted"].includes(r.status)).length,
    approvedValue: rows.filter(r=>r.status==="approved").reduce((s,r)=>s+(+r.cost_impact||0),0),
    activeDrawings: rows.filter(r=>r.status!=="superseded").length,
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Project Controls</h2>
        <button className="btn btn-primary" disabled={!projects.length} onClick={()=>setModal({})}><i className="fas fa-plus"/>New {tab==="rfis"?"RFI":tab==="changes"?"Change Order":"Drawing"}</button>
      </div>
      {!projects.length&&<div className="alert alert-warning" style={{marginBottom:14}}>
        Create or onboard a demo project before adding RFIs, change orders, or drawing revisions.
      </div>}
      <div className="stats-grid">
        <Stat icon="fa-circle-question" color="#eff6ff" ic="#2563eb" label="Open RFIs" val={tab==="rfis"?totals.openRfis:"-"} sub="needs response"/>
        <Stat icon="fa-file-contract" color="#fff7ed" ic="#ea580c" label="Pending Changes" val={tab==="changes"?totals.pendingChanges:"-"} sub="commercial impact"/>
        <Stat icon="fa-coins" color="#ecfdf5" ic="#059669" label="Approved Value" val={tab==="changes"?fmt(totals.approvedValue):"-"} sub="change orders"/>
        <Stat icon="fa-drafting-compass" color="#f0f9ff" ic="#0284c7" label="Active Drawings" val={tab==="drawings"?totals.activeDrawings:"-"} sub="current register"/>
      </div>
      <div className="card">
        <div style={{display:"flex",gap:10,alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",marginBottom:16}}>
          <div className="tabs">
            {[["rfis","RFIs"],["changes","Change Orders"],["drawings","Drawings"]].map(([k,l])=>
              <button key={k} className={tab===k?"active":""} onClick={()=>setTab(k)}>{l}</button>)}
          </div>
          <select value={projectId} onChange={e=>setProjectId(e.target.value)} style={{padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13}}>
            <option value="">All Projects</option>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="table-wrap">
          {tab==="rfis"&&<table><thead><tr><th>RFI #</th><th>Subject</th><th>Project</th><th>Discipline</th><th>Priority</th><th>Status</th><th>Due</th><th></th></tr></thead><tbody>
            {rows.map(r=><tr key={r.id}><td>{r.rfi_number}</td><td style={{fontWeight:600}}>{r.subject}</td><td>{projectName(r.project_id)}</td><td>{r.discipline||"-"}</td><td><span className="badge badge-draft">{r.priority}</span></td><td><span className="badge badge-active">{r.status}</span></td><td>{fmtDate(r.due_date)}</td><td><button className="btn btn-danger btn-sm" onClick={()=>setConfirm(r)}><i className="fas fa-trash"/></button></td></tr>)}
          </tbody></table>}
          {tab==="changes"&&<table><thead><tr><th>CO #</th><th>Title</th><th>Project</th><th>Cost Impact</th><th>Days</th><th>Status</th><th>Requested By</th><th></th></tr></thead><tbody>
            {rows.map(r=><tr key={r.id}><td>{r.co_number}</td><td style={{fontWeight:600}}>{r.title}</td><td>{projectName(r.project_id)}</td><td>{fmt(r.cost_impact)}</td><td>{r.time_impact_days}</td><td><span className="badge badge-sent">{r.status}</span></td><td>{r.requested_by||"-"}</td><td><button className="btn btn-danger btn-sm" onClick={()=>setConfirm(r)}><i className="fas fa-trash"/></button></td></tr>)}
          </tbody></table>}
          {tab==="drawings"&&<table><thead><tr><th>Drawing #</th><th>Title</th><th>Project</th><th>Discipline</th><th>Rev</th><th>Status</th><th>Issued</th><th></th></tr></thead><tbody>
            {rows.map(r=><tr key={r.id}><td>{r.drawing_no}</td><td style={{fontWeight:600}}>{r.title}</td><td>{projectName(r.project_id)}</td><td>{r.discipline||"-"}</td><td>{r.revision}</td><td><span className="badge badge-approved">{r.status}</span></td><td>{fmtDate(r.issue_date)}</td><td><button className="btn btn-danger btn-sm" onClick={()=>setConfirm(r)}><i className="fas fa-trash"/></button></td></tr>)}
          </tbody></table>}
          {!rows.length&&<div className="empty"><i className="fas fa-clipboard-list"/>No records found</div>}
        </div>
      </div>
      {modal&&<Modal title={`New ${tab==="rfis"?"RFI":tab==="changes"?"Change Order":"Drawing"}`} onClose={()=>setModal(null)}>
        <ControlsForm type={tab} projects={projects} onSave={save} onClose={()=>setModal(null)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this record?" onYes={del} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

const ControlsForm=({type,projects,onSave,onClose})=>{
  const initial=type==="rfis"
    ? {project_id:"",subject:"",question:"",discipline:"structural",priority:"medium",status:"open",raised_by:"",assigned_to:"",due_date:""}
    : type==="changes"
      ? {project_id:"",title:"",description:"",reason:"client_instruction",status:"draft",cost_impact:"0",time_impact_days:"0",requested_by:"",submitted_date:""}
      : {project_id:"",drawing_no:"",title:"",discipline:"architectural",revision:"0",status:"draft",issue_date:"",prepared_by:"",checked_by:"",approved_by:"",file_name:""};
  const[d,setD]=useState(initial);
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const submit=e=>{e.preventDefault();onSave(d)};
  return(
    <form onSubmit={submit}>
      <div className="form-group"><label>Project *</label><select required value={d.project_id} onChange={e=>set("project_id",e.target.value)}><option value="">Select Project</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select></div>
      {type==="rfis"&&<>
        <div className="form-group"><label>Subject *</label><input required value={d.subject} onChange={e=>set("subject",e.target.value)}/></div>
        <div className="form-group"><label>Question *</label><textarea required value={d.question} onChange={e=>set("question",e.target.value)}/></div>
        <div className="form-row"><div className="form-group"><label>Discipline</label><select value={d.discipline} onChange={e=>set("discipline",e.target.value)}>{["structural","architectural","MEP","commercial","site"].map(x=><option key={x}>{x}</option>)}</select></div><div className="form-group"><label>Priority</label><select value={d.priority} onChange={e=>set("priority",e.target.value)}>{["low","medium","high","urgent"].map(x=><option key={x}>{x}</option>)}</select></div></div>
        <div className="form-row"><div className="form-group"><label>Raised By</label><input value={d.raised_by} onChange={e=>set("raised_by",e.target.value)}/></div><div className="form-group"><label>Assigned To</label><input value={d.assigned_to} onChange={e=>set("assigned_to",e.target.value)}/></div></div>
        <div className="form-group"><label>Due Date</label><input type="date" value={d.due_date} onChange={e=>set("due_date",e.target.value)}/></div>
      </>}
      {type==="changes"&&<>
        <div className="form-group"><label>Title *</label><input required value={d.title} onChange={e=>set("title",e.target.value)}/></div>
        <div className="form-group"><label>Description</label><textarea value={d.description} onChange={e=>set("description",e.target.value)}/></div>
        <div className="form-row"><div className="form-group"><label>{moneyLabel("Cost Impact")}</label><input type="number" value={d.cost_impact} onChange={e=>set("cost_impact",e.target.value)}/></div><div className="form-group"><label>Time Impact Days</label><input type="number" value={d.time_impact_days} onChange={e=>set("time_impact_days",e.target.value)}/></div></div>
        <div className="form-row"><div className="form-group"><label>Reason</label><input value={d.reason} onChange={e=>set("reason",e.target.value)}/></div><div className="form-group"><label>Requested By</label><input value={d.requested_by} onChange={e=>set("requested_by",e.target.value)}/></div></div>
      </>}
      {type==="drawings"&&<>
        <div className="form-row"><div className="form-group"><label>Drawing No.</label><input value={d.drawing_no} onChange={e=>set("drawing_no",e.target.value)}/></div><div className="form-group"><label>Revision</label><input value={d.revision} onChange={e=>set("revision",e.target.value)}/></div></div>
        <div className="form-group"><label>Title *</label><input required value={d.title} onChange={e=>set("title",e.target.value)}/></div>
        <div className="form-row"><div className="form-group"><label>Discipline</label><select value={d.discipline} onChange={e=>set("discipline",e.target.value)}>{["architectural","structural","MEP","civil","interior"].map(x=><option key={x}>{x}</option>)}</select></div><div className="form-group"><label>Status</label><select value={d.status} onChange={e=>set("status",e.target.value)}>{["draft","submitted","approved","superseded"].map(x=><option key={x}>{x}</option>)}</select></div></div>
        <div className="form-row"><div className="form-group"><label>Issue Date</label><input type="date" value={d.issue_date} onChange={e=>set("issue_date",e.target.value)}/></div><div className="form-group"><label>File Name</label><input value={d.file_name} onChange={e=>set("file_name",e.target.value)}/></div></div>
      </>}
      <div className="form-actions"><button type="button" className="btn btn-outline" onClick={onClose}>Cancel</button><button type="submit" className="btn btn-primary"><i className="fas fa-save"/>Save</button></div>
    </form>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// CALC WORKBENCH — run → save → sign-off → PDF → register → comments (Milestone 0)
// ═══════════════════════════════════════════════════════════════════════════════
const SO_COLORS={draft:"#64748b",prepared:"#d97706",checked:"#2563eb",approved:"#16a34a",superseded:"#94a3b8"};
const SOBadge=({s})=>(<span style={{background:(SO_COLORS[s]||"#64748b")+"22",color:SO_COLORS[s]||"#64748b",
  border:"1px solid "+(SO_COLORS[s]||"#64748b")+"55",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,textTransform:"capitalize"}}>{s||"draft"}</span>);

const CALC_TYPES={
  beam:{label:"RCC Beam — IS 456:2000",code:"IS 456:2000",endpoint:"/structural/beam/design",
    fields:[["span_m","Span (m)"],["Mu_kNm","Mu (kN·m)"],["Vu_kN","Vu (kN)"],["b_mm","Width b (mm)"],["fck","fck (MPa)"],["fy","fy (MPa)"],["cover_mm","Cover (mm)"]],
    def:{span_m:6,Mu_kNm:150,Vu_kN:120,b_mm:300,fck:25,fy:415,cover_mm:25},
    summary:r=>[r.design_type,r.tension_steel&&("Ast "+r.tension_steel.Ast_required_mm2+" mm² → "+r.tension_steel.bars),r.shear_design&&("Stirrups "+r.shear_design.stirrups)]},
  column:{label:"RCC Column (axial) — IS 456:2000",code:"IS 456:2000",endpoint:"/structural/column/design/axial",
    fields:[["Pu_kN","Pu (kN)"],["height_m","Height (m)"],["b_mm","b (mm)"],["D_mm","D (mm)"],["fck","fck (MPa)"],["fy","fy (MPa)"],["cover_mm","Cover (mm)"],["bar_dia_mm","Bar dia (mm)"]],
    def:{Pu_kN:800,height_m:3,b_mm:300,D_mm:300,fck:25,fy:415,cover_mm:40,bar_dia_mm:16},
    summary:r=>[r.steel_design&&("Steel "+r.steel_design.bars+" ("+r.steel_design.p_provided_percent+"%)"),r.capacity&&("Pu,cap "+r.capacity.Pu_capacity_kN+" kN"),r.capacity&&(r.capacity.adequate?"Adequate":"Revise section")]},
  slab:{label:"RCC One-way Slab — IS 456:2000",code:"IS 456:2000",endpoint:"/structural/slab/design/oneway",
    fields:[["span_m","Span (m)"],["total_load_kN_m2","Load (kN/m²)"],["fck","fck (MPa)"],["fy","fy (MPa)"],["cover_mm","Cover (mm)"],["main_bar_dia_mm","Main bar dia (mm)"]],
    def:{span_m:3.5,total_load_kN_m2:8,fck:25,fy:415,cover_mm:20,main_bar_dia_mm:10},
    summary:r=>[r.section&&("D "+r.section.D_mm+" mm"),r.main_steel&&("Main "+(r.main_steel.spec||(r.main_steel.bar_dia_mm+" @ "+r.main_steel.spacing_mm))),r.distribution_steel&&("Dist "+(r.distribution_steel.spec||""))]},
  footing:{label:"Isolated Footing — IS 456:2000",code:"IS 456:2000",endpoint:"/structural/foundation/design",
    fields:[["Pu_kN","Pu (kN)"],["Mu_kNm","Mu (kN·m)"],["sbc_kN_m2","SBC (kN/m²)"],["col_b_mm","Col b (mm)"],["col_D_mm","Col D (mm)"],["fck","fck (MPa)"],["fy","fy (MPa)"],["cover_mm","Cover (mm)"],["bar_dia_mm","Bar dia (mm)"],["depth_of_foundation_m","Depth (m)"]],
    def:{Pu_kN:800,Mu_kNm:0,sbc_kN_m2:150,col_b_mm:300,col_D_mm:300,fck:25,fy:415,cover_mm:50,bar_dia_mm:12,depth_of_foundation_m:1.5},
    summary:r=>[r.footing_size&&("Footing "+r.footing_size.L_m+" x "+r.footing_size.B_m+" m"),r.footing_size&&("D "+r.footing_size.D_mm+" mm"),r.steel_design&&("Steel "+(r.steel_design.spec_x||(r.steel_design.Ast_required_mm2_m+" mm²/m")))]},
};
const summarizeCalc=(r)=>{ if(!r)return[];
  let s=[];
  if(r.tension_steel)s=CALC_TYPES.beam.summary(r);
  else if(r.capacity&&r.steel_design)s=CALC_TYPES.column.summary(r);
  else if(r.main_steel)s=CALC_TYPES.slab.summary(r);
  else if(r.footing_size)s=CALC_TYPES.footing.summary(r);
  else s=[r.design_type||r.overall||r.status];
  return s.filter(Boolean);
};
const isBeamResult=(r)=>!!(r&&r.tension_steel&&r.shear_design);

const CalcWorkbench=({toast,currentUser})=>{
  const[calcType,setCalcType]=useState("beam");
  const[reg,setReg]=useState({items:[],totals:{},approved:0,awaiting_action:0,total_calculations:0});
  const[sel,setSel]=useState(null);
  const[comments,setComments]=useState([]);
  const[qty,setQty]=useState(null);
  const[busy,setBusy]=useState(false);
  const[modal,setModal]=useState(false);
  const[preview,setPreview]=useState(null);
  const[cbody,setCbody]=useState("");
  const[form,setForm]=useState({title:"",...CALC_TYPES.beam.def});
  const isAdmin=currentUser?.role==="admin";
  const myName=currentUser?.full_name||currentUser?.username;
  const CT=CALC_TYPES[calcType];

  const load=()=>api("/calculations/register").then(setReg).catch(e=>toast(e.message,"error"));
  useEffect(()=>{load()},[]);
  const openCalc=(id)=>Promise.all([api("/calculations/"+id),api("/calculations/"+id+"/comments")])
    .then(([r,cs])=>{setSel(r);setComments(cs);setQty(null);}).catch(e=>toast(e.message,"error"));

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const pickType=(k)=>{setCalcType(k);setForm(f=>({title:f.title,...CALC_TYPES[k].def}));setPreview(null);};
  const _payload=()=>{const o={};CT.fields.forEach(([k])=>{o[k]=+form[k];});return o;};
  const runDesign=async()=>{setBusy(true);try{
    const r=await api(CT.endpoint,{method:"POST",body:JSON.stringify(_payload())});
    if(r&&r.error){toast(r.error,"error");}else setPreview(r);
  }catch(e){toast(e.message,"error");}setBusy(false);};
  const saveCalc=async()=>{if(!preview){toast("Run the design first","error");return;}setBusy(true);try{
    const rec=await api("/calculations/",{method:"POST",body:JSON.stringify({
      calculator:CT.label,title:form.title||CT.label,country:"India",code_basis:CT.code,
      inputs:_payload(),result:preview})});
    toast("Calculation prepared");setModal(false);setPreview(null);await load();openCalc(rec.id);
  }catch(e){toast(e.message,"error");}setBusy(false);};

  const act=async(id,action)=>{setBusy(true);try{
    const r=await api("/calculations/"+id+"/"+action,{method:"POST"});
    toast(action==="revise"?"New revision created":"Updated");await load();
    openCalc(action==="revise"?r.id:id);
  }catch(e){toast(e.message,"error");}setBusy(false);};
  const del=async(id)=>{setBusy(true);try{await api("/calculations/"+id,{method:"DELETE"});toast("Deleted");setSel(null);await load();}catch(e){toast(e.message,"error");}setBusy(false);};
  const addComment=async(id)=>{if(!cbody.trim())return;setBusy(true);try{
    await api("/calculations/"+id+"/comments",{method:"POST",body:JSON.stringify({body:cbody})});
    setCbody("");setComments(await api("/calculations/"+id+"/comments"));toast("Comment added");
  }catch(e){toast(e.message,"error");}setBusy(false);};
  const runQty=async(id)=>{setBusy(true);try{setQty(await api("/calculations/"+id+"/quantities",{method:"POST"}));}catch(e){toast(e.message,"error");}setBusy(false);};
  const download=(id)=>downloadPDF("/reports/calc-sheet/"+id,{},"calc_sheet_"+id+".pdf");

  const uploadBranding=async(logoFile,sealFile)=>{const fd=new FormData();
    if(logoFile)fd.append("logo",logoFile);if(sealFile)fd.append("seal",sealFile);
    try{const r=await fetch(API+"/company/branding",{method:"POST",headers:{Authorization:"Bearer "+getToken(),"ngrok-skip-browser-warning":"true"},body:fd});
      if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"Upload failed");}
      toast("Branding saved — it will appear on new calc sheets");
    }catch(e){toast(e.message,"error");}};

  const actionsFor=(r)=>{
    const s=r.signoff_status, isPrep=r.prepared_by===myName;
    const B=(k,l,cls,fn)=>(<button key={k} disabled={busy} className={"btn "+cls} style={{marginRight:8,marginBottom:8}} onClick={fn}>{l}</button>);
    const list=[];
    if(s==="draft"){list.push(B("sub","Submit for check","btn-primary",()=>act(r.id,"submit")));list.push(B("del","Delete","btn-danger",()=>del(r.id)));}
    if(s==="prepared"){list.push(B("chk","Mark as checked","btn-primary",()=>act(r.id,"check")));list.push(B("ret","Return to draft","btn-outline",()=>act(r.id,"return")));}
    if(s==="checked"){list.push(B("app","Approve & lock","btn-primary",()=>act(r.id,"approve")));list.push(B("ret2","Return to prepared","btn-outline",()=>act(r.id,"return")));}
    if(s==="approved"||s==="superseded"){list.push(B("dl","Download calc sheet","btn-primary",()=>download(r.id)));}
    if(s==="approved"){list.push(B("rev","Revise (new rev)","btn-outline",()=>act(r.id,"revise")));}
    if(isBeamResult(r.result))list.push(B("qty","Quantities (BBS/BOQ)","btn-outline",()=>runQty(r.id)));
    if(s!=="approved"&&s!=="superseded")list.push(B("dl2","Preview PDF","btn-outline",()=>download(r.id)));
    return list;
  };

  const num=(k,l,step)=>(<div style={{flex:"1 1 120px"}}><label style={{fontSize:11,color:"#64748b",fontWeight:600}}>{l}</label>
    <input type="number" step={step||"any"} value={form[k]} onChange={e=>set(k,e.target.value)}
      style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:14}}/></div>);

  const t=reg.totals||{};
  return(
  <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12,marginBottom:16}}>
      <div><h2 style={{fontSize:20,fontWeight:700}}>Calculation Sign-off</h2>
        <p style={{color:"#64748b",fontSize:13}}>Prepare → check → approve → issue a sealed calc sheet. IS 456:2000 beam.</p></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {isAdmin&&<BrandingUploader onUpload={uploadBranding}/>}
        <button className="btn btn-primary" onClick={()=>{setModal(true);setPreview(null);}}><i className="fas fa-plus"/> New calculation</button>
      </div>
    </div>

    {/* status rollup */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10,marginBottom:18}}>
      {[["Total",reg.total_calculations,"#1e40af"],["Draft",t.draft||0,SO_COLORS.draft],["Prepared",t.prepared||0,SO_COLORS.prepared],
        ["Checked",t.checked||0,SO_COLORS.checked],["Approved",t.approved||0,SO_COLORS.approved],["Superseded",t.superseded||0,SO_COLORS.superseded]].map(([l,v,c])=>(
        <div key={l} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"12px 14px"}}>
          <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
          <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div></div>))}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"minmax(280px,1fr) minmax(340px,1.4fr)",gap:16,alignItems:"start"}}>
      {/* register list */}
      <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,overflow:"hidden"}}>
        <div style={{padding:"12px 14px",borderBottom:"1px solid #e2e8f0",fontWeight:700,fontSize:14}}>Register</div>
        {(reg.items||[]).length===0&&<div style={{padding:20,color:"#94a3b8",fontSize:13}}>No calculations yet. Click “New beam calc”.</div>}
        {(reg.items||[]).map(it=>(
          <div key={it.id} onClick={()=>openCalc(it.id)} style={{padding:"11px 14px",borderBottom:"1px solid #f1f5f9",cursor:"pointer",
            background:sel&&sel.id===it.id?"#eff6ff":"#fff"}}>
            <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"center"}}>
              <div style={{fontWeight:600,fontSize:14}}>{it.title} <span style={{color:"#94a3b8",fontWeight:400}}>· rev {it.revision}</span></div>
              <SOBadge s={it.signoff_status}/></div>
            <div style={{fontSize:12,color:"#64748b",marginTop:3}}>{it.code_basis||it.calculator}</div>
          </div>))}
      </div>

      {/* detail */}
      <div>
        {!sel&&<div style={{background:"#fff",border:"1px dashed #cbd5e1",borderRadius:12,padding:30,color:"#94a3b8",textAlign:"center"}}>Select a calculation to review its trace, sign it off, and download the sheet.</div>}
        {sel&&<div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:18}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <div><div style={{fontSize:17,fontWeight:800}}>{sel.title}</div>
              <div style={{fontSize:12,color:"#64748b"}}>{sel.code_basis} · rev {sel.revision} {sel.supersedes_id?`(supersedes #${sel.supersedes_id})`:""}</div></div>
            <SOBadge s={sel.signoff_status}/>
          </div>

          {/* sign-off chain */}
          <div style={{display:"flex",gap:10,margin:"14px 0",flexWrap:"wrap"}}>
            {[["Prepared",sel.prepared_by,sel.prepared_at],["Checked",sel.checked_by,sel.checked_at],["Approved",sel.approved_by,sel.approved_at]].map(([r,who,at])=>(
              <div key={r} style={{flex:"1 1 120px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"8px 10px"}}>
                <div style={{fontSize:10,color:"#94a3b8",textTransform:"uppercase"}}>{r}</div>
                <div style={{fontSize:13,fontWeight:700,color:who?"#0f172a":"#cbd5e1"}}>{who||"— pending —"}</div>
                <div style={{fontSize:10,color:"#94a3b8"}}>{at?fmtDate(at):""}</div></div>))}
          </div>

          {/* key results (any calc type) */}
          {summarizeCalc(sel.result).length>0&&<div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",fontSize:13,marginBottom:12}}>
            {summarizeCalc(sel.result).join("  ·  ")}</div>}

          <div style={{marginBottom:6}}>{actionsFor(sel)}</div>

          {/* quantities */}
          {qty&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:10,padding:12,marginBottom:12,fontSize:13}}>
            <b>Bar-bending schedule + BOQ</b><div>Reinforcement: {qty.derived_from.n_main_bars} – #{qty.derived_from.main_bar_dia_mm} + #{qty.derived_from.stirrup_dia_mm} stirrups</div>
            <div>Steel: {qty.bbs.total_steel_kg} kg · BOQ total: ₹ {qty.boq&&qty.boq.cost_INR?qty.boq.cost_INR.total.toLocaleString():"—"}</div></div>}

          {/* comments */}
          <div style={{borderTop:"1px solid #e2e8f0",paddingTop:12}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>Review comments</div>
            {comments.length===0&&<div style={{color:"#94a3b8",fontSize:12,marginBottom:8}}>No comments yet. Use @username to notify a colleague.</div>}
            {comments.map(cm=>(<div key={cm.id} style={{fontSize:13,marginBottom:8}}>
              <b>{cm.author}</b> <span style={{color:"#94a3b8",fontSize:11}}>{fmtDate(cm.created_at)}</span><div>{cm.body}</div></div>))}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={cbody} onChange={e=>setCbody(e.target.value)} placeholder="Add a comment… @mention to notify"
                style={{flex:1,padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:13}}
                onKeyDown={e=>{if(e.key==="Enter")addComment(sel.id);}}/>
              <button className="btn btn-outline btn-sm" disabled={busy} onClick={()=>addComment(sel.id)}>Post</button>
            </div>
          </div>
        </div>}
      </div>
    </div>

    {/* new calc modal */}
    {modal&&<div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,padding:22,width:600,maxWidth:"100%",maxHeight:"90vh",overflow:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <h3 style={{fontWeight:800,fontSize:16}}>New calculation</h3>
          <button className="btn btn-outline btn-sm" onClick={()=>setModal(false)}><i className="fas fa-times"/></button></div>
        {/* calculator type picker */}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
          {[["beam","Beam"],["column","Column"],["slab","Slab"],["footing","Footing"]].map(([k,l])=>(
            <button key={k} onClick={()=>pickType(k)} style={{padding:"7px 14px",borderRadius:8,fontWeight:700,fontSize:13,cursor:"pointer",
              border:"1px solid "+(calcType===k?"#1e40af":"#d1d5db"),background:calcType===k?"#eff6ff":"#fff",color:calcType===k?"#1e40af":"#475569"}}>{l}</button>))}
        </div>
        <div style={{fontSize:11,color:"#64748b",marginBottom:10}}>{CT.label}</div>
        <div style={{marginBottom:10}}><label style={{fontSize:11,color:"#64748b",fontWeight:600}}>Title</label>
          <input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. Beam B12 — Level 3"
            style={{width:"100%",padding:"8px 10px",border:"1px solid #cbd5e1",borderRadius:8,fontSize:14}}/></div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
          {CT.fields.map(([k,l])=>num(k,l))}</div>
        <div style={{display:"flex",gap:8}}>
          <button className="btn btn-outline" disabled={busy} onClick={runDesign}><i className="fas fa-calculator"/> Run design</button>
          <button className="btn btn-primary" disabled={busy||!preview} onClick={saveCalc}><i className="fas fa-save"/> Save as calculation</button>
        </div>
        {preview&&<div style={{marginTop:14,background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:12,fontSize:13}}>
          {summarizeCalc(preview).map((x,i)=>(<div key={i}>{x}</div>))}
          {preview.proof&&preview.proof.sources&&preview.proof.sources[0]&&<div style={{color:"#64748b",marginTop:4}}>Source: {preview.proof.sources[0].label}</div>}
        </div>}
      </div>
    </div>}
  </div>);
};

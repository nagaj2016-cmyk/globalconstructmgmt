const App=()=>{
  const[page,setPage]=useState("dashboard");
  const[toast,setToast]=useState(null);
  const[authUser,setAuthUser]=useState(null);   // null = logged out
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[locale,setLocale]=useState(getSavedLocale());
  const[locales,setLocales]=useState([]);
  const[demoBusy,setDemoBusy]=useState(false);
  const[restoring,setRestoring]=useState(!!getRefresh());   // trying to restore a session

  // Restore a session on page load using the stored refresh token (no re-login).
  useEffect(()=>{
    if(!getRefresh()){setRestoring(false);return;}
    doRefresh().then(u=>{
      if(u){setAppCurrency(getCountryProfile(u?.country||"India").currency==="Multi-currency"?"USD":getCountryProfile(u?.country||"India").currency);
        setAuthUser(u);changeLocale(getSavedLocale()||u?.language||"en");}
      setRestoring(false);
    });
  },[]);

  // Load available languages + the persisted language bundle once, from the DB.
  useEffect(()=>{
    listLocales().then(setLocales);
    changeLocale(getSavedLocale());
  },[]);

  // Switch language: fetch the DB bundle, persist locally, save to the user's
  // profile if signed in (so it follows them across devices), then re-render.
  const changeLocale=async(code)=>{
    await loadI18n(code);
    saveLocale(code);
    setLocale(code);
    if(getToken()){
      api("/auth/me",{method:"PUT",body:JSON.stringify({language:code})}).catch(()=>{});
    }
  };

  // Demo controls — only ever shown to the demo account.
  const isDemoUser=!!(authUser&&authUser.is_demo);
  const runDemo=async(action)=>{
    setDemoBusy(true);
    try{
      const res=await api("/demo-data/"+action,{method:"POST"});
      showToast(res.message||(action==="load"?"Demo data loaded.":"Demo data deleted."));
      // Hard reload for a truly fresh state (session is restored via refresh token).
      setTimeout(()=>window.location.reload(),700);
    }catch(e){showToast(e.message,"error");setDemoBusy(false);}
  };
  const[showPWABanner,setShowPWABanner]=useState(false);

  useEffect(()=>{
    // Show PWA install banner after 10s if prompt available
    const t=setTimeout(()=>{
      if(window._pwaPrompt&&authUser)setShowPWABanner(true);
    },10000);
    return()=>clearTimeout(t);
  },[authUser]);

  const installPWA=async()=>{
    if(!window._pwaPrompt)return;
    window._pwaPrompt.prompt();
    const{outcome}=await window._pwaPrompt.userChoice;
    if(outcome==="accepted")console.log("[PWA] Installed");
    window._pwaPrompt=null;
    setShowPWABanner(false);
  };

  const showToast=(msg,type="success")=>setToast({msg,type});
  const navigatePage=(nextPage)=>{
    setPage(nextPage);
    if(window.location.hash!==`#${nextPage}`)history.pushState(null,"",`#${nextPage}`);
  };
  const handleLogin=(user)=>{
    setAppCurrency(getCountryProfile(user?.country||"India").currency==="Multi-currency"?"USD":getCountryProfile(user?.country||"India").currency);
    setAuthUser(user);
    // The language picked on the login screen wins; otherwise use the user's
    // saved profile language. Either way it carries through every screen.
    changeLocale(getSavedLocale()||user?.language||"en");
    navigatePage("dashboard");
  };
  const handleLogout=()=>{
    const rt=getRefresh();
    if(rt){fetch(API+"/auth/logout",{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},body:JSON.stringify({refresh_token:rt})}).catch(()=>{});}
    setRefresh(null);setToken(null);setAuthUser(null);setPage("dashboard");setSidebarOpen(false);
    history.replaceState(null,"","/app?entry=landing#login");
  };
  const countryProfile=getCountryProfile(authUser?.country||"India");

  // Filter nav by role access
  const access=authUser?authUser.access||[]:[];
  const nav=authUser?ALL_NAV
    .filter(n=>(authUser.role==="admin"||(access.includes(n.key)||n.key==="dashboard"))&&countryAllowsNav(n,countryProfile,authUser.role))
    // Label priority: DB translation (nav namespace) -> country override -> default.
    .map(n=>({...n,label:tr("nav",n.key,countryNavLabel(n,countryProfile))})):[];

  useEffect(()=>{
    if(authUser&&nav.length&&!nav.some(n=>n.key===page)){
      navigatePage(nav.some(n=>n.key==="dashboard")?"dashboard":nav[0].key);
    }
  },[authUser?.country,page,nav.map(n=>n.key).join("|")]);

  useEffect(()=>{
    if(!authUser)return;
    const syncFromHash=()=>{
      const key=window.location.hash.replace("#","");
      if(key&&ALL_NAV.some(n=>n.key===key)&&nav.some(n=>n.key===key))setPage(key);
    };
    syncFromHash();
    window.addEventListener("hashchange",syncFromHash);
    return()=>window.removeEventListener("hashchange",syncFromHash);
  },[authUser,nav.map(n=>n.key).join("|")]);

  // Bottom nav: 5 most important items based on role
  const bottomNavItems=[
    {key:"dashboard",icon:"fa-tachometer-alt",label:"Home"},
    {key:"projects",icon:"fa-folder-open",label:"Projects"},
    {key:"safety",icon:"fa-shield-alt",label:"Safety"},
    {key:"siteops",icon:"fa-hard-hat",label:"Site"},
    {key:countryProfile.engineering[0]||"structural",icon:"fa-drafting-compass",label:"Design"},
  ].filter((item,idx,arr)=>nav.some(n=>n.key===item.key)&&arr.findIndex(x=>x.key===item.key)===idx);

  if(!authUser&&restoring)return<div className="loading-center" style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div>;
  if(!authUser)return<LoginPage onLogin={handleLogin}/>;

  const renderPage=()=>{
    const props={toast:showToast,setPage:navigatePage,currentUser:authUser};
    switch(page){
      case"dashboard":   return<Dashboard {...props}/>;
      case"company":     return<CompanyOrg {...props}/>;
      case"projects":    return<Projects {...props}/>;
      case"tasks":       return<Tasks {...props}/>;
      case"scheduling":  return<Scheduling {...props}/>;
      case"commercial":  return<Commercial {...props}/>;
      case"controls":    return<Controls {...props}/>;
      case"workers":     return<Workers {...props}/>;
      case"clients":     return<Clients {...props}/>;
      case"finance":     return<Finance {...props}/>;
      case"siteops":     return<SiteOps {...props}/>;
      case"attendance":  return<AttendanceModule {...props}/>;
      case"reports":     return<ReportsCenter {...props}/>;
      case"quality":     return<QualityControl {...props}/>;
      case"safety":      return<SafetyPro {...props}/>;
      case"documents":   return<Documents {...props}/>;
      case"inventory":   return<Inventory {...props}/>;
      case"signoff":     return<CalcWorkbench {...props}/>;
      case"structural":  return<StructuralEngineering {...props}/>;
      case"intlcodes":   return<IntlCodes {...props}/>;
      case"steel":       return<SteelDesign {...props}/>;
      case"nbc":         return<NBCCanada {...props}/>;
      case"bim":         return<BIMViewer {...props}/>;
      case"team_roles":  return<TeamRoles {...props} companyId={props.user?.company_id}/>;
      case"saas":        return<SaasAdmin {...props}/>;
      case"users":       return<UserManagement {...props}/>;
      default:           return<Dashboard {...props}/>;
    }
  };

  let lastSection=null;
  return(
    <div className="app">
      {/* Mobile sidebar overlay */}
      <div className={"mob-overlay"+(sidebarOpen?" visible":"")} onClick={()=>setSidebarOpen(false)}/>

      <aside className={"sidebar"+(sidebarOpen?" open":"")}>
        <div className="sidebar-brand">
          <div className="logo"><i className="fas fa-building-columns" style={{color:"#fff"}}/></div>
          <div>
            <h1>NagaForge</h1>
            <small>Construction ERP</small>
          </div>
        </div>
        <nav className="sidebar-nav">
          {nav.map(n=>{
            const showSection=n.section&&n.section!==lastSection;
            if(showSection)lastSection=n.section;
            return(
              <React.Fragment key={n.key}>
                {showSection&&<div className="nav-section">{n.section}</div>}
                <div className={"nav-item"+(page===n.key?" active":"")} onClick={()=>navigatePage(n.key)}>
                  <i className={"fas "+n.icon}/>{n.label}
                </div>
              </React.Fragment>
            );
          })}
        </nav>
        <div className="sidebar-footer">
          NagaForge v5.1<br/>
          <span style={{fontSize:10}}>Phases 0-10, 13-14: ERP+BIM+SaaS+PWA+PDF</span>
        </div>
      </aside>

      <div className="main">
        <header className="topbar">
          {/* Mobile hamburger */}
          <button className="mob-hamburger" onClick={()=>setSidebarOpen(o=>!o)} aria-label="Menu">
            <i className={"fas "+(sidebarOpen?"fa-times":"fa-bars")}/>
          </button>
          <span className="topbar-title">{tr("nav",page,PAGE_TITLES[page])} · {countryProfile.home}</span>
          <div className="topbar-right">
            <span style={{fontSize:12,color:"#64748b",marginRight:8}}>
              <span style={{background:"#eef2ff",color:"#3730a3",border:"1px solid #c7d2fe",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,marginRight:8}}>
                {authUser.country||"India"} · {countryProfile.currency}
              </span>
              <span style={{background:ROLE_COLORS[authUser.role]+"22",color:ROLE_COLORS[authUser.role],border:"1px solid "+ROLE_COLORS[authUser.role]+"44",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,marginRight:8}}>
                {ROLE_LABELS[authUser.role]||authUser.role}
              </span>
              <span className="hide-mobile">{authUser.full_name}</span>
            </span>
            {/* Demo controls — visible ONLY to the demo account */}
            {isDemoUser&&(
              <span style={{display:"inline-flex",gap:6,marginRight:8}}>
                <button className="btn btn-sm" disabled={demoBusy}
                  style={{background:"#10b981",color:"#fff"}}
                  onClick={()=>runDemo("load")} title="Load sample data into the demo workspace">
                  <i className="fas fa-database"/>{" "}{demoBusy?tr("common","loading","Loading…"):tr("demo","load","Load demo data")}
                </button>
                <button className="btn btn-sm btn-danger" disabled={demoBusy}
                  onClick={()=>{if(window.confirm(tr("demo","reset","Delete demo data")+"?"))runDemo("reset");}}
                  title="Delete all demo data">
                  <i className="fas fa-trash"/>{" "}{tr("demo","reset","Delete demo data")}
                </button>
              </span>
            )}
            {/* Language selector — options come from the DB /i18n/locales */}
            <select value={locale} onChange={e=>changeLocale(e.target.value)}
              title={tr("common","language","Language")}
              style={{marginRight:8,fontSize:12,padding:"4px 6px",borderRadius:6,border:"1px solid #cbd5e1",background:"#fff"}}>
              {(locales.length?locales:[{code:"en",native_name:"English"}]).map(l=>(
                <option key={l.code} value={l.code}>{l.native_name||l.name||l.code}</option>
              ))}
            </select>
            <button className="btn btn-outline btn-sm" onClick={handleLogout} title="Sign out">
              <i className="fas fa-sign-out-alt"/></button>
          </div>
        </header>
        <main className="content">
          {renderPage()}
        </main>
      </div>

      {/* Mobile bottom navigation */}
      <nav className="bottom-nav">
        {bottomNavItems.map(b=>(
          <button key={b.key} className={"bottom-nav-item"+(page===b.key?" active":"")}
            onClick={()=>{navigatePage(b.key);setSidebarOpen(false)}}>
            <i className={"fas "+b.icon}/>
            <span>{tr("nav",b.key,b.label)}</span>
          </button>
        ))}
      </nav>

      {/* PWA install banner */}
      {showPWABanner&&(
        <div className="pwa-banner">
          <i className="fas fa-download" style={{fontSize:20}}/>
          <div>
            <div style={{fontWeight:700,fontSize:13}}>Install NagaForge</div>
            <div style={{fontSize:11,opacity:.85}}>Add to home screen for offline access</div>
          </div>
          <button onClick={installPWA}>Install</button>
          <button className="pwa-close" onClick={()=>setShowPWABanner(false)}>&#x2715;</button>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type} onDone={()=>setToast(null)}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

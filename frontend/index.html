// USER MANAGEMENT (Admin only)
// ═══════════════════════════════════════════════════════════════════════════════
const ROLES_LIST=["admin","project_manager","site_engineer","engineer","site_manager","safety_officer","quality_engineer","accountant","designer","finance","foreman","client","worker"];
const ROLE_COLORS={admin:"#1e40af",project_manager:"#7c3aed",site_engineer:"#0891b2",engineer:"#0891b2",site_manager:"#475569",safety_officer:"#dc2626",quality_engineer:"#0d9488",accountant:"#059669",designer:"#d97706",finance:"#059669",foreman:"#dc2626",client:"#64748b",worker:"#374151"};
const ROLE_LABELS={admin:"Admin",project_manager:"Project Manager",site_engineer:"Site Engineer",engineer:"Engineer",site_manager:"Site Manager",safety_officer:"Safety Officer",quality_engineer:"QC Engineer",accountant:"Accountant",designer:"Designer",finance:"Finance",foreman:"Foreman",client:"Client",worker:"Worker"};

const UserManagement=({toast,currentUser})=>{
  const[users,setUsers]=useState([]);
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);

  const load=()=>api("/auth/users").then(setUsers).catch(e=>toast(e.message,"error"));
  useEffect(()=>{load()},[]);

  const save=async(d)=>{
    try{
      if(d.id)await api("/auth/users/"+d.id,{method:"PUT",body:JSON.stringify(d)});
      else await api("/auth/users",{method:"POST",body:JSON.stringify(d)});
      toast(d.id?"User updated":"User created");setModal(null);load();
    }catch(e){toast(e.message,"error");}
  };
  const del=async(id)=>{
    try{await api("/auth/users/"+id,{method:"DELETE"});toast("User deleted");setConfirm(null);load();}
    catch(e){toast(e.message,"error");}
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>User Management</h2>
        <button className="btn btn-primary" onClick={()=>setModal({})}><i className="fas fa-user-plus"/>Add User</button>
      </div>
      <div className="card">
        <div className="table-wrap">
          <table>
            <thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Country</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id}>
                  <td><div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:34,height:34,borderRadius:"50%",background:ROLE_COLORS[u.role]||"#64748b",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",fontWeight:700}}>
                      {initials(u.full_name)}</div>
                    <div><div style={{fontWeight:600,fontSize:13}}>{u.full_name}</div>
                    {u.id===currentUser.id&&<span style={{fontSize:10,color:"#3b82f6",fontWeight:600}}>YOU</span>}</div>
                  </div></td>
                  <td style={{fontFamily:"monospace",fontSize:12}}>{u.username}</td>
                  <td style={{fontSize:12,color:"#64748b"}}>{u.email||"—"}</td>
                  <td style={{fontSize:12,color:"#334155"}}>{u.country||"India"}</td>
                  <td><span style={{background:ROLE_COLORS[u.role]+"22",color:ROLE_COLORS[u.role],border:"1px solid "+ROLE_COLORS[u.role]+"44",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:600}}>
                    {ROLE_LABELS[u.role]||u.role}</span></td>
                  <td><span className={"badge badge-"+(u.is_active?"active":"inactive")}>{u.is_active?"Active":"Disabled"}</span></td>
                  <td>
                    <button className="btn btn-outline btn-sm" style={{marginRight:6}} onClick={()=>setModal(u)}><i className="fas fa-edit"/></button>
                    {u.id!==currentUser.id&&<button className="btn btn-danger btn-sm" onClick={()=>setConfirm(u.id)}><i className="fas fa-trash"/></button>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
      {modal!==null&&<Modal title={modal.id?"Edit User":"Add User"} onClose={()=>setModal(null)}>
        <UserForm data={modal} onSave={save} onClose={()=>setModal(null)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this user?" onYes={()=>del(confirm)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

const UserForm=({data,onSave,onClose})=>{
  const countryOptions=["India","Canada","United States","Europe","Australia","United Arab Emirates","Saudi Arabia","United Kingdom","Singapore","Global"];
  const languageOptions=[
    {v:"en",l:"English"},
    {v:"hi",l:"Hindi"},
    {v:"fr-CA",l:"French (Canada)"},
    {v:"ar",l:"Arabic"},
  ];
  const[d,setD]=useState({username:data.username||"",full_name:data.full_name||"",email:data.email||"",role:data.role||"site_engineer",country:data.country||"India",language:data.language||"en",is_active:data.is_active!==false,password:""});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const submit=(e)=>{e.preventDefault();onSave(data.id?{...d,id:data.id}:d);};
  return(
    <form onSubmit={submit}>
      <div className="form-row">
        <div className="form-group"><label>Full Name *</label><input required value={d.full_name} onChange={e=>set("full_name",e.target.value)}/></div>
        <div className="form-group"><label>Username *</label><input required value={d.username} onChange={e=>set("username",e.target.value)} disabled={!!data.id}/></div>
      </div>
      <div className="form-group"><label>Email</label><input type="email" value={d.email} onChange={e=>set("email",e.target.value)}/></div>
      <div className="form-row">
        <div className="form-group"><label>Country *</label>
          <select required value={d.country} onChange={e=>set("country",e.target.value)}>
            {countryOptions.map(c=><option key={c} value={c}>{c}</option>)}
          </select></div>
        <div className="form-group"><label>Language</label>
          <select value={d.language} onChange={e=>set("language",e.target.value)}>
            {languageOptions.map(l=><option key={l.v} value={l.v}>{l.l}</option>)}
          </select></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Role</label>
          <select value={d.role} onChange={e=>set("role",e.target.value)}>
            {ROLES_LIST.map(r=><option key={r} value={r}>{ROLE_LABELS[r]||r}</option>)}
          </select></div>
        <div className="form-group"><label>{data.id?"New Password (blank=no change)":"Password *"}</label>
          <input type="password" value={d.password} onChange={e=>set("password",e.target.value)} required={!data.id} placeholder={data.id?"Leave blank to keep":"Set password"}/></div>
      </div>
      {data.id&&<div className="form-group"><label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
        <input type="checkbox" checked={d.is_active} onChange={e=>set("is_active",e.target.checked)} style={{width:16,height:16}}/>
        Account Active</label></div>}
      <div className="form-actions">
        <button type="button" className="btn btn-outline" onClick={onClose}>Cancel</button>
        <button type="submit" className="btn btn-primary"><i className="fas fa-save"/>Save User</button>
      </div>
    </form>
  );
};

// SCHEDULING — CPM/PERT + EVM + GANTT
// ═══════════════════════════════════════════════════════════════════════════════
const Scheduling=({toast})=>{
  const[tab,setTab]=useState("gantt");
  const[projects,setProjects]=useState([]);
  const[projId,setProjId]=useState("");
  const[activities,setActivities]=useState([]);
  const[cpmResult,setCpmResult]=useState(null);
  const[evmData,setEvmData]=useState(null);
  const[modal,setModal]=useState(null);
  const[evmModal,setEvmModal]=useState(false);
  const[confirm,setConfirm]=useState(null);
  const[running,setRunning]=useState(false);

  const loadProjects=async()=>{const p=await api("/projects");setProjects(p);if(p.length&&!projId)setProjId(String(p[0].id));};
  const loadActivities=async(pid)=>{if(!pid)return;const a=await api("/scheduling/activities/"+pid);setActivities(a);};
  const loadEVM=async(pid)=>{if(!pid)return;try{const e=await api("/scheduling/evm/"+pid);setEvmData(e);}catch(e){}};

  useEffect(()=>{loadProjects();},[]);
  useEffect(()=>{if(projId){loadActivities(projId);loadEVM(projId);setCpmResult(null);}},[projId]);

  const saveActivity=async(d)=>{
    try{
      if(d.id)await api("/scheduling/activities/"+d.id,{method:"PUT",body:JSON.stringify(d)});
      else await api("/scheduling/activities",{method:"POST",body:JSON.stringify({...d,project_id:parseInt(projId)})});
      toast(d.id?"Updated":"Activity added");setModal(null);loadActivities(projId);
    }catch(e){toast(e.message,"error");}
  };
  const delActivity=async(id)=>{
    try{await api("/scheduling/activities/"+id,{method:"DELETE"});toast("Deleted");setConfirm(null);loadActivities(projId);}
    catch(e){toast(e.message,"error");}
  };
  const runCPM=async()=>{
    setRunning(true);
    try{const r=await api("/scheduling/cpm/"+projId,{method:"POST"});setCpmResult(r);await loadActivities(projId);toast("CPM calculated — critical path found!");setTab("gantt");}
    catch(e){toast(e.message,"error");}
    setRunning(false);
  };
  const saveEVMSnapshot=async(d)=>{
    try{await api("/scheduling/evm/snapshot",{method:"POST",body:JSON.stringify({...d,project_id:parseInt(projId)})});
      toast("EVM snapshot saved");setEvmModal(false);loadEVM(projId);}
    catch(e){toast(e.message,"error");}
  };

  const tabs=[["gantt","Gantt Chart"],["activities","Activities"],["evm","EVM Dashboard"]];

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Project Scheduling</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <select value={projId} onChange={e=>setProjId(e.target.value)} style={{padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13}}>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <button className="btn btn-primary" onClick={runCPM} disabled={running||!projId}>
            {running?<><span className="spinner"/>Running…</>:<><i className="fas fa-calculator"/>Run CPM</>}
          </button>
        </div>
      </div>

      <div className="struct-tabs" style={{marginBottom:16}}>
        {tabs.map(([k,l])=>(
          <button key={k} className={"struct-tab"+(tab===k?" active":"")} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {tab==="gantt"&&<GanttTab activities={activities} projDuration={cpmResult?cpmResult.project_duration:null}/>}
      {tab==="activities"&&(
        <div>
          <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
            <button className="btn btn-primary" onClick={()=>setModal({})}><i className="fas fa-plus"/>Add Activity</button>
          </div>
          <div className="card">
            <div className="table-wrap">
              <table>
                <thead><tr><th>WBS</th><th>Activity</th><th>Duration</th><th>Budget</th><th>Predecessors</th><th>ES</th><th>EF</th><th>Float</th><th>Status</th><th>%</th><th></th></tr></thead>
                <tbody>
                  {activities.map(a=>(
                    <tr key={a.id} style={{background:a.is_critical?"#fff5f5":""}}>
                      <td style={{fontFamily:"monospace",fontSize:11,color:"#64748b"}}>{a.wbs_code||"—"}</td>
                      <td>
                        <div style={{fontWeight:600,fontSize:13}}>{a.name}</div>
                        {a.is_critical&&<span style={{fontSize:10,color:"#ef4444",fontWeight:700}}>CRITICAL</span>}
                      </td>
                      <td>{a.duration_days}d</td>
                      <td style={{fontSize:12}}>{a.cost_budget>0?fmt(a.cost_budget):"—"}</td>
                      <td style={{fontSize:11,color:"#64748b"}}>{(a.predecessors||[]).join(", ")||"—"}</td>
                      <td style={{fontSize:12}}>{a.early_start||0}</td>
                      <td style={{fontSize:12}}>{a.early_finish||0}</td>
                      <td style={{fontSize:12,color:a.total_float===0?"#ef4444":"#059669",fontWeight:600}}>{a.total_float||0}d</td>
                      <td><span className={"badge badge-"+(a.percent_complete>=100?"done":a.percent_complete>0?"in_progress":"todo")}>
                        {a.percent_complete>=100?"Done":a.percent_complete>0?"In Progress":"Not Started"}</span></td>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:50,height:6,background:"#e2e8f0",borderRadius:3,overflow:"hidden"}}>
                            <div style={{width:a.percent_complete+"%",height:"100%",background:a.is_critical?"#ef4444":"#3b82f6"}}/>
                          </div>
                          <span style={{fontSize:11}}>{a.percent_complete}%</span>
                        </div>
                      </td>
                      <td>
                        <button className="btn btn-outline btn-sm" style={{marginRight:4}} onClick={()=>setModal(a)}><i className="fas fa-edit"/></button>
                        <button className="btn btn-danger btn-sm" onClick={()=>setConfirm(a.id)}><i className="fas fa-trash"/></button>
                      </td>
                    </tr>
                  ))}
                  {!activities.length&&<tr><td colSpan={11} className="empty">No activities yet. Add activities then run CPM.</td></tr>}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {tab==="evm"&&<EVMTab evmData={evmData} onAddSnapshot={()=>setEvmModal(true)} projId={projId}/>}

      {modal!==null&&<Modal title={modal.id?"Edit Activity":"Add Activity"} onClose={()=>setModal(null)}>
        <ActivityForm data={modal} activities={activities} onSave={saveActivity} onClose={()=>setModal(null)}/>
      </Modal>}
      {evmModal&&<Modal title="Add EVM Snapshot" onClose={()=>setEvmModal(false)}>
        <EVMSnapshotForm onSave={saveEVMSnapshot} onClose={()=>setEvmModal(false)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this activity?" onYes={()=>delActivity(confirm)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

// ── Gantt Chart (SVG) ──────────────────────────────────────────────────────────
const GanttTab=({activities,projDuration})=>{
  if(!activities.length)return(
    <div className="card"><div className="empty" style={{paddingTop:60}}>
      <i className="fas fa-chart-gantt" style={{fontSize:40,color:"#cbd5e1",marginBottom:12}}/>
      <p style={{fontSize:14,color:"#64748b"}}>Add activities and run CPM to generate the Gantt chart</p>
    </div></div>
  );

  const dur=projDuration||Math.max(...activities.map(a=>a.early_finish||a.duration_days));
  const barH=28,gap=6,paddingL=180,paddingR=40,paddingT=36,barW=700;
  const scaleX=(v)=>(v/dur)*barW;
  const totalH=paddingT+activities.length*(barH+gap)+20;

  return(
    <div className="card" style={{padding:0,overflow:"auto"}}>
      <div style={{padding:"14px 20px",borderBottom:"1px solid #e2e8f0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontWeight:600,fontSize:14}}>Gantt Chart — Project Duration: <strong>{dur} days</strong></span>
        <div style={{display:"flex",alignItems:"center",gap:16,fontSize:12}}>
          <span><span style={{display:"inline-block",width:12,height:12,background:"#ef4444",borderRadius:2,marginRight:5}}/>Critical Path</span>
          <span><span style={{display:"inline-block",width:12,height:12,background:"#3b82f6",borderRadius:2,marginRight:5}}/>Non-Critical</span>
        </div>
      </div>
      <div style={{overflowX:"auto",padding:"10px 20px 20px"}}>
        <svg width={paddingL+barW+paddingR} height={totalH} style={{fontFamily:"inherit",minWidth:700}}>
          {/* Header */}
          <text x={paddingL} y={20} style={{fontSize:11,fill:"#64748b",fontWeight:600}}>Day 0</text>
          <text x={paddingL+barW/4} y={20} style={{fontSize:11,fill:"#64748b"}}>{Math.round(dur/4)}</text>
          <text x={paddingL+barW/2} y={20} style={{fontSize:11,fill:"#64748b"}}>{Math.round(dur/2)}</text>
          <text x={paddingL+barW*3/4} y={20} style={{fontSize:11,fill:"#64748b"}}>{Math.round(dur*3/4)}</text>
          <text x={paddingL+barW-10} y={20} style={{fontSize:11,fill:"#64748b"}}>{Math.round(dur)}</text>
          {/* Grid lines */}
          {[0,.25,.5,.75,1].map(p=>(
            <line key={p} x1={paddingL+barW*p} y1={paddingT-10} x2={paddingL+barW*p} y2={totalH-10} stroke="#e2e8f0" strokeDasharray="4,3"/>
          ))}
          {/* Bars */}
          {activities.map((a,i)=>{
            const y=paddingT+i*(barH+gap);
            const x=paddingL+scaleX(a.early_start||0);
            const w=Math.max(scaleX(a.duration_days),4);
            const fillPct=a.percent_complete/100;
            const color=a.is_critical?"#ef4444":"#3b82f6";
            const lightColor=a.is_critical?"#fee2e2":"#dbeafe";
            return(
              <g key={a.id}>
                <text x={paddingL-8} y={y+barH/2+4} textAnchor="end" style={{fontSize:11,fill:"#374151"}}
                  title={a.name}>{a.name.length>22?a.name.slice(0,20)+"…":a.name}</text>
                {a.wbs_code&&<text x={4} y={y+barH/2+4} style={{fontSize:9,fill:"#94a3b8"}}>{a.wbs_code}</text>}
                {/* Float bar */}
                {a.total_float>0&&<rect x={x+w} y={y+barH*0.3} width={scaleX(a.total_float)} height={barH*0.4} rx={2} fill="#fef3c7" stroke="#fcd34d" strokeWidth={1}/>}
                {/* Main bar background */}
                <rect x={x} y={y} width={w} height={barH} rx={4} fill={lightColor} stroke={color} strokeWidth={1.5}/>
                {/* Progress fill */}
                {fillPct>0&&<rect x={x} y={y} width={w*fillPct} height={barH} rx={4} fill={color} opacity={0.8}/>}
                {/* Label inside */}
                {w>30&&<text x={x+w/2} y={y+barH/2+4} textAnchor="middle" style={{fontSize:9.5,fill:fillPct>0.4?"#fff":color,fontWeight:600}}>
                  {a.percent_complete}%</text>}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
};

const EVMTab=({evmData,onAddSnapshot,projId})=>{
  const evm=evmData&&evmData.latest_evm;
  const snaps=evmData&&evmData.snapshots||[];
  const sc=evmData&&evmData.s_curve;

  const chartRef=useRef(null);
  const chartInst=useRef(null);

  useEffect(()=>{
    if(!chartRef.current||!sc||!sc.labels.length)return;
    if(chartInst.current)chartInst.current.destroy();
    chartInst.current=new Chart(chartRef.current,{
      type:"line",
      data:{
        labels:sc.labels,
        datasets:[
          {label:"Planned Value (PV)",data:sc.pv,borderColor:"#3b82f6",backgroundColor:"#dbeafe55",fill:true,tension:.3,pointRadius:3},
          {label:"Earned Value (EV)",data:sc.ev,borderColor:"#10b981",backgroundColor:"#d1fae555",fill:true,tension:.3,pointRadius:3},
          {label:"Actual Cost (AC)",data:sc.ac,borderColor:"#ef4444",backgroundColor:"#fee2e255",fill:false,tension:.3,pointRadius:3,borderDash:[5,3]},
          {label:"BAC",data:sc.bac,borderColor:"#f59e0b",borderDash:[8,4],borderWidth:2,pointRadius:0,fill:false},
        ]
      },
      options:{responsive:true,plugins:{legend:{position:"bottom"}},scales:{y:{ticks:{callback:(v)=>fmt(v)}}}}
    });
    return()=>{if(chartInst.current)chartInst.current.destroy();};
  },[sc]);

  if(!evm&&!snaps.length)return(
    <div className="card"><div className="empty" style={{paddingTop:60}}>
      <i className="fas fa-chart-line" style={{fontSize:40,color:"#cbd5e1",marginBottom:12}}/>
      <p style={{fontSize:14,color:"#64748b",marginBottom:16}}>No EVM data yet. Add snapshots to track earned value.</p>
      <button className="btn btn-primary" onClick={onAddSnapshot}><i className="fas fa-plus"/>Add EVM Snapshot</button>
    </div></div>
  );

  const kpi=(label,val,sub,color)=>(
    <div className="stat-card">
      <div className="stat-icon" style={{background:color+"22",color}}><i className="fas fa-chart-line"/></div>
      <div className="stat-info"><h3 style={{fontSize:18}}>{val}</h3><p>{label}</p>{sub&&<div className="trend" style={{color}}>{sub}</div>}</div>
    </div>
  );

  return(
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
        <button className="btn btn-primary" onClick={onAddSnapshot}><i className="fas fa-plus"/>Add Snapshot</button>
      </div>
      {evm&&<>
        <div style={{background:evm.status_color+"11",border:"2px solid "+evm.status_color,borderRadius:12,padding:"12px 20px",marginBottom:20,display:"flex",alignItems:"center",gap:14}}>
          <i className="fas fa-circle-info" style={{fontSize:22,color:evm.status_color}}/>
          <div>
            <div style={{fontWeight:700,fontSize:15,color:evm.status_color}}>{evm.summary.overall}</div>
            <div style={{fontSize:12,color:"#64748b"}}>{evm.summary.schedule} · {evm.summary.cost}</div>
          </div>
          <div style={{marginLeft:"auto",fontSize:13,color:"#374151"}}>
            {evm.progress.pct_complete}% complete · {evm.progress.pct_scheduled}% planned
          </div>
        </div>
        <div className="stats-grid" style={{marginBottom:20}}>
          {kpi("CPI",evm.indices.cpi,evm.interpretation.cpi,evm.indices.cpi>=1?"#10b981":"#ef4444")}
          {kpi("SPI",evm.indices.spi,evm.summary.schedule,evm.indices.spi>=1?"#10b981":"#ef4444")}
          {kpi("EAC",fmt(evm.forecasts.eac),"Estimate at Completion","#3b82f6")}
          {kpi("VAC",fmt(evm.forecasts.vac),evm.forecasts.vac>=0?"Under budget":"Over budget",evm.forecasts.vac>=0?"#10b981":"#ef4444")}
        </div>
        <div className="card" style={{marginBottom:20}}>
          <div className="card-header"><span className="card-title">Key Indicators</span></div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
            {[["Budget (BAC)",fmt(evm.inputs.bac)],["Planned Value",fmt(evm.inputs.pv)],["Earned Value",fmt(evm.inputs.ev)],
              ["Actual Cost",fmt(evm.inputs.ac)],["Cost Variance",fmt(evm.variances.cv)],["Schedule Variance",fmt(evm.variances.sv)],
              ["ETC",fmt(evm.forecasts.etc)],["TCPI",evm.indices.tcpi],["Time EAC",evm.forecasts.time_eac_days+" days"]
            ].map(([k,v])=>(
              <div key={k} style={{background:"#f8fafc",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"#64748b",marginBottom:3}}>{k}</div>
                <div style={{fontWeight:700,fontSize:15,color:"#1e293b"}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
      </>}
      {sc&&sc.labels.length>1&&<div className="card" style={{marginBottom:20}}>
        <div className="card-header"><span className="card-title">S-Curve (PV / EV / AC)</span></div>
        <canvas ref={chartRef} height={120}/>
      </div>}
      {snaps.length>0&&<div className="card">
        <div className="card-header"><span className="card-title">Snapshots</span></div>
        <div className="table-wrap"><table>
          <thead><tr><th>Date</th><th>BAC</th><th>PV</th><th>EV</th><th>AC</th><th>Notes</th></tr></thead>
          <tbody>{snaps.map(s=>(
            <tr key={s.id}>
              <td>{s.snapshot_date}</td>
              <td>{fmt(s.bac)}</td><td>{fmt(s.pv)}</td><td>{fmt(s.ev)}</td><td>{fmt(s.ac)}</td>
              <td style={{fontSize:12,color:"#64748b"}}>{s.notes||"—"}</td>
            </tr>
          ))}</tbody>
        </table></div>
      </div>}
    </div>
  );
};

const ActivityForm=({data,activities,onSave,onClose})=>{

        <div className="form-group"><label>{moneyLabel("Actual Cost")}</label><input type="number" min={0} value={d.actual_cost} onChange={e=>set("actual_cost",parseFloat(e.target.value)||0)}/></div>

      "Permits to Work":"/safety/permits"+(editing?"/"+editing:""),

          <div style={{fontWeight:600,fontSize:12,color:"#64748b",marginBottom:8}}>STANDARD TOPICS</div>

            {topics.map(t=>(
              <span key={t} onClick={()=>setForm({...form,topic:t})}

                {t}
              </span>
            ))}
          </div>
        </div>
      )}
      <div className="card">
        <div className="card-header">
          <span className="card-title">{tab}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <select className="form-control" style={{width:200}} value={selProject} onChange={e=>setSelProject(e.target.value)}>
              <option value="">All Projects</option>
              {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}

                <div key={f.k} className="form-group">

                  {f.type==="textarea"

// INTERNATIONAL STRUCTURAL CODES

  const [snowF,setSnowF]=useState({Ss:1.5,Sr:0.1,Cb:0.8,Cw:1.0,Cs:1.0,Ca:1.0,Is:1.0,pg:1.2,Ce:1.0,Ct:1.0,roof_type:"flat",sk:1.5,mu1:0.8,Ce_ec:1.0,Ct_ec:1.0});
  const [comboF,setComboF]=useState({D:100,L:75,W:30,S:20,E:0,code:"IS"});
  const [matF,setMatF]=useState({fck_MPa:25,fy_MPa:415,code:"IS"});

  useEffect(()=>{
    if(tab==="Load Tables"){
      api("/intl/live-loads/"+code).then(d=>setLiveTbl(d.loads||[])).catch(()=>setLiveTbl([]));

                code==="NBCC"?{q_ref:windF.q_ref,Ce:windF.Ce,Ct:windF.Ct,Cg:windF.Cg,Cp:windF.Cp,importance_factor:windF.importance_factor}:
                code==="ASCE"?{V_mph:windF.V_mph,Kz:windF.Kz,Kzt:windF.Kzt,Ke:windF.Ke,Kd:windF.Kd,GCp:windF.GCp,risk_category:windF.risk_category}:
                {vb0:windF.vb0,c0:windF.c0,cdir:windF.cdir,cseason:windF.cseason,z:windF.z,terrain_cat:windF.terrain_cat,cp_net:windF.cp_net}
              )}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-calculator"/>} Calculate Wind
            </button>
            {err&&<div className="struct-alert-fail" style={{marginTop:10}}><i className="fas fa-times-circle"/>{err}</div>}
          </div>
          <ResultBox r={result}/>
        </div>
      )}

      {tab==="Seismic"&&(
        <div className="struct-grid">
          <div className="calc-form">
            <h3><i className="fas fa-wave-square"/> Seismic Base Shear</h3>
            <div className="form-group">
              <label>Design Code</label>
              <select className="form-control" value={code} onChange={e=>{setCode(e);setResult(null);}}>
                <option value="NBCC">NBCC 2020 (Canada)</option>
                <option value="ASCE">ASCE 7-22 (USA)</option>
                <option value="EC">EN 1998-1 (Eurocode)</option>
              </select>
            </div>
            <div className="form-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
              {(code==="NBCC"?nbccSeisFields:code==="ASCE"?asceSeisFields:ecSeisFields).map(fk=>(
                <F key={fk} label={fk} fk={fk} fmap={seisF} setFmap={setSeisF}/>
              ))}
            </div>
            <button className="btn btn-primary" style={{marginTop:12,width:"100%"}} disabled={loading}
              onClick={()=>{
                const ep="/intl/seismic/"+{NBCC:"nbcc",ASCE:"asce",EC:"eurocode"}[code];
                const body=code==="NBCC"?{Sa_02:seisF.Sa_02,Sa_10:seisF.Sa_10,W:seisF.W,Rd:seisF.Rd,Ro:seisF.Ro,IE:seisF.IE,Fa:seisF.Fa,Fv:seisF.Fv,hn:seisF.hn,system:seisF.system}:
                  code==="ASCE"?{SDS:seisF.SDS,SD1:seisF.SD1,W:seisF.W,R:seisF.R,Ie:seisF.Ie,Ct:seisF.Ct,x_exp:seisF.x_exp,hn_ft:seisF.hn_ft}:
                  {agR:seisF.agR,S:seisF.S,W:seisF.W,q:seisF.q,gamma_I:seisF.gamma_I,T1:seisF.T1,hn:seisF.hn,TB:seisF.TB,TC:seisF.TC,TD:seisF.TD,structure:seisF.structure};
                run(ep,body);
              }}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-calculator"/>} Calculate Seismic
            </button>
            {err&&<div className="struct-alert-fail" style={{marginTop:10}}><i className="fas fa-times-circle"/>{err}</div>}
          </div>
          <ResultBox r={result}/>
        </div>
      )}

      {tab==="Snow"&&(
        <div className="struct-grid">
          <div className="calc-form">
            <h3><i className="fas fa-snowflake"/> Snow Load Calculator</h3>
            <div className="form-group">
              <label>Design Code</label>
              <select className="form-control" value={code} onChange={e=>{setCode(e);setResult(null);}}>
                <option value="NBCC">NBCC 2020 (Canada)</option>
                <option value="ASCE">ASCE 7-22 (USA)</option>
                <option value="EC">EN 1991-1-3 (Eurocode)</option>
              </select>
            </div>
            <div className="form-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
              {(code==="NBCC"?nbccSnowFields:code==="ASCE"?asceSnowFields:ecSnowFields).map(fk=>(
                <F key={fk} label={fk} fk={fk} fmap={snowF} setFmap={setSnowF}/>
              ))}
            </div>
            <button className="btn btn-primary" style={{marginTop:12,width:"100%"}} disabled={loading}
              onClick={()=>{
                const ep="/intl/snow/"+{NBCC:"nbcc",ASCE:"asce",EC:"eurocode"}[code];
                const body=code==="NBCC"?{Ss:snowF.Ss,Sr:snowF.Sr,Cb:snowF.Cb,Cw:snowF.Cw,Cs:snowF.Cs,Ca:snowF.Ca,Is:snowF.Is}:
                  code==="ASCE"?{pg:snowF.pg,Ce:snowF.Ce,Ct:snowF.Ct,Is:snowF.Is,roof_type:snowF.roof_type}:
                  {sk:snowF.sk,mu1:snowF.mu1,Ce_ec:snowF.Ce_ec,Ct_ec:snowF.Ct_ec};
                run(ep,body);
              }}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-calculator"/>} Calculate Snow
            </button>
            {err&&<div className="struct-alert-fail" style={{marginTop:10}}><i className="fas fa-times-circle"/>{err}</div>}
          </div>
          <ResultBox r={result}/>
        </div>
      )}

      {tab==="Load Combos"&&(
        <div className="struct-grid">
          <div className="calc-form">
            <h3><i className="fas fa-layer-group"/> Load Combinations</h3>
            <div className="form-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
              {["D","L","W","S","E"].map(fk=>(
                <div key={fk} className="form-group">
                  <label style={{fontSize:12}}>{fk==="D"?"D — Dead":fk==="L"?"L — Live":fk==="W"?"W — Wind":fk==="S"?"S — Snow":"E — Seismic"}</label>
                  <input type="number" className="form-control" value={comboF[fk]||0} onChange={e=>setComboF({...comboF,[fk]:parseFloat(e.target.value)||0})}/>
                </div>
              ))}
              <div className="form-group">
                <label style={{fontSize:12}}>Code</label>
                <select className="form-control" value={comboF.code} onChange={e=>setComboF({...comboF,code:e.target.value})}>
                  <option value="IS">IS 875 / IS 1893</option>
                  <option value="NBCC">NBCC 2020</option>
                  <option value="ASCE">ASCE 7-22</option>
                  <option value="EC">EN 1990</option>
                </select>
              </div>
            </div>
            <button className="btn btn-primary" style={{marginTop:12,width:"100%"}} disabled={loading}
              onClick={()=>run("/intl/combinations",comboF)}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-calculator"/>} Run Combinations
            </button>
            {err&&<div className="struct-alert-fail" style={{marginTop:10}}><i className="fas fa-times-circle"/>{err}</div>}
          </div>
          <div className="calc-result">
            {result&&(
              <div>
                <div className="result-highlight">
                  <div className="big-num">Governing: {(result.governing||0).toFixed(2)}</div>
                  <div className="big-label"><span className="code-badge">{result.governing_combo}</span></div>
                </div>
                <div className="result-section">
                  <h4>All Combinations</h4>
                  {(result.combinations||[]).map((c,i)=>(
                    <div key={i} className="result-row" style={{background:c.name===result.governing_combo?"#eff6ff":"transparent",borderRadius:4,padding:"4px 6px"}}>
                      <span className="result-label">{c.name}</span>
                      <span className="result-val" style={{color:c.name===result.governing_combo?"#1e40af":"#374151"}}>{c.value.toFixed(2)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {!result&&<div style={{textAlign:"center",color:"#94a3b8",paddingTop:60}}>Enter loads and click Calculate</div>}
          </div>
        </div>
      )}

      {tab==="Materials"&&(
        <div className="struct-grid">
          <div className="calc-form">
            <h3><i className="fas fa-cubes"/> Material Design Strengths</h3>
            <div className="form-group"><label>fck (MPa)</label>
              <input type="number" className="form-control" value={matF.fck_MPa} onChange={e=>setMatF({...matF,fck_MPa:parseFloat(e.target.value)||25})}/>
            </div>
            <div className="form-group"><label>fy (MPa)</label>
              <input type="number" className="form-control" value={matF.fy_MPa} onChange={e=>setMatF({...matF,fy_MPa:parseFloat(e.target.value)||415})}/>
            </div>
            <div className="form-group"><label>Code</label>
              <select className="form-control" value={matF.code} onChange={e=>setMatF({...matF,code:e.target.value})}>
                <option value="IS">IS 456:2000</option>
                <option value="NBCC">CSA A23.3-19</option>
                <option value="ASCE">ACI 318-19</option>
                <option value="EC">EN 1992-1-1</option>
              </select>
            </div>
            <button className="btn btn-primary" style={{marginTop:12,width:"100%"}} disabled={loading}
              onClick={()=>run("/intl/materials",matF)}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-calculator"/>} Calculate
            </button>
            {err&&<div className="struct-alert-fail" style={{marginTop:10}}><i className="fas fa-times-circle"/>{err}</div>}
          </div>
          <ResultBox r={result}/>
        </div>
      )}

      {tab==="Code Compare"&&(
        <div>
          <div className="card" style={{marginBottom:16,padding:"14px 20px"}}>
            <h4 style={{fontSize:14,fontWeight:700,marginBottom:8}}>Seismic Code Comparison</h4>
            <p style={{fontSize:13,color:"#64748b",marginBottom:12}}>Compare base shear (V) for a 1000 kN building across IS, NBCC, ASCE, and Eurocode.</p>
            <button className="btn btn-primary" disabled={loading}
              onClick={()=>run("/intl/compare/seismic?W=1000",{})}>
              {loading?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-chart-bar"/>} Run Comparison
            </button>
          </div>
          {result&&result.results&&(
            <div className="card">
              <div className="card-header"><span className="card-title">Code Comparison Results — W = {result.weight_kN} kN</span></div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Code</th><th>Base Shear (kN)</th><th>Seismic Coeff Ah</th><th>Notes</th></tr></thead>
                  <tbody>
                    {Object.entries(result.results).map(([cname,cd])=>(
                      <tr key={cname}>
                        <td><strong>{cname}</strong></td>
                        <td style={{fontWeight:700,color:"#1e40af"}}>{cd.V_kN?(cd.V_kN.toFixed(1)+" kN"):(cd.base_shear_kN?(cd.base_shear_kN.toFixed(1)+" kN"):"—")}</td>
                        <td>{cd.Cs_used||cd.Ah_approx||"—"}</td>
                        <td style={{color:"#64748b",fontSize:12}}>{cd.note||cd.system||""}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
};

// PHASE 9 — STEEL DESIGN (IS 800:2007 + AISC 360-22)
// ═══════════════════════════════════════════════════════════════════════════════
const SteelDesign=({toast})=>{
  const[tab,setTab]=useState("beam");
  const[sections,setSections]=useState([]);
  const[result,setResult]=useState(null);
  const[loading,setLoading]=useState(false);
  const[grade,setGrade]=useState("E250");
  // IS Beam
  const[beamSec,setBeamSec]=useState("ISMB300");
  const[span,setSpan]=useState("6");
  const[Md,setMd]=useState("120");
  const[Vd,setVd]=useState("80");
  const[loadType,setLoadType]=useState("udl");
  // IS Column
  const[colSec,setColSec]=useState("ISMB300");
  const[axial,setAxial]=useState("500");
  const[leff,setLeff]=useState("4");
  const[bCurve,setBCurve]=useState("b");
  // Bolt
  const[boltDia,setBoltDia]=useState("20");
  const[nBolts,setNBolts]=useState("4");
  const[nPlanes,setNPlanes]=useState("1");
  const[boltP,setBoltP]=useState("100");
  const[plateT,setPlateT]=useState("10");
  const[boltGrade,setBoltGrade]=useState("8.8");
  // Weld
  const[wSize,setWSize]=useState("8");
  const[wLen,setWLen]=useState("200");
  const[wP,setWP]=useState("80");
  // AISC
  const[aSec,setASec]=useState("W18x97");
  const[aSpan,setASpan]=useState("20");
  const[aMu,setAMu]=useState("150");
  const[aVu,setAVu]=useState("40");
  const[aLb,setALb]=useState("5");
  const[aFy,setAFy]=useState("50");
  // Selector
  const[selSpan,setSelSpan]=useState("6");
  const[selMd,setSelMd]=useState("120");
  const[selVd,setSelVd]=useState("80");

  React.useEffect(()=>{
    api("/steel/sections?system=IS").then(d=>setSections((d.sections||[]).map(s=>s.name)));
  },[]);

  const run=async(endpoint,body)=>{
    setLoading(true);setResult(null);
    try{const d=await api("/steel/"+endpoint,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});setResult(d);}
    catch(e){toast("Error: "+e.message,"error");}
    setLoading(false);
  };
  const S=({s})=><span style={{background:s==="PASS"?"#dcfce7":"#fee2e2",color:s==="PASS"?"#166534":"#991b1b",borderRadius:4,padding:"2px 8px",fontWeight:700,fontSize:11}}>{s}</span>;
  const RC=({label,children})=><div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,padding:12,marginBottom:8}}><div style={{fontWeight:700,color:"#1e40af",marginBottom:6,fontSize:12}}>{label}</div>{children}</div>;
  const RW=({k,v,hi})=><div style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #f1f5f9",background:hi?"#fefce8":"transparent"}}><span style={{fontSize:12,color:"#64748b"}}>{k}</span><span style={{fontSize:12,fontWeight:600,color:hi?"#92400e":"#1e293b"}}>{v}</span></div>;
  const isSecs=sections.length>0?sections:["ISMB150","ISMB200","ISMB250","ISMB300","ISMB350","ISMB400","ISMB450","ISMB500","ISMB550","ISMB600"];
  const aiscSecs=["W8x31","W10x49","W12x50","W14x48","W16x57","W18x76","W18x97","W21x62","W24x76","W24x104"];

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[["beam","IS Beam"],["column","IS Column"],["bolt","Bolt Conn."],["weld","Fillet Weld"],["aisc","AISC Beam"],["selector","Auto Select"]].map(([k,l])=>(
          <button key={k} className={"btn"+(tab===k?" btn-primary":"")} style={{fontSize:12}} onClick={()=>{setTab(k);setResult(null);}}>{l}</button>
        ))}
        <span style={{marginLeft:"auto",background:"#f1f5f9",borderRadius:6,padding:"4px 10px",fontSize:11,color:"#64748b",alignSelf:"center"}}>IS 800:2007 + AISC 360-22</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"320px 1fr",gap:16}}>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:16}}>
          {tab==="beam"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>IS 800:2007 Beam</h4>
            <label>Section</label><select className="input" value={beamSec} onChange={e=>setBeamSec(e.target.value)}>{isSecs.map(s=><option key={s}>{s}</option>)}</select>
            <label>Span (m)</label><input className="input" type="number" value={span} onChange={e=>setSpan(e.target.value)}/>
            <label>Moment demand Md (kNm)</label><input className="input" type="number" value={Md} onChange={e=>setMd(e.target.value)}/>
            <label>Shear demand Vd (kN)</label><input className="input" type="number" value={Vd} onChange={e=>setVd(e.target.value)}/>
            <label>Grade</label><select className="input" value={grade} onChange={e=>setGrade(e.target.value)}>{["E250","E300","E350","E410","E450"].map(g=><option key={g}>{g}</option>)}</select>
            <label>Loading</label><select className="input" value={loadType} onChange={e=>setLoadType(e.target.value)}><option value="udl">UDL</option><option value="point">Point Load</option></select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("beam/is800",{section:beamSec,span_m:+span,Md_kNm:+Md,Vd_kN:+Vd,grade,loading:loadType})}>{loading?"Calculating...":"Design Beam"}</button>
          </div>)}
          {tab==="column"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>IS 800:2007 Column</h4>
            <label>Section</label><select className="input" value={colSec} onChange={e=>setColSec(e.target.value)}>{isSecs.map(s=><option key={s}>{s}</option>)}</select>
            <label>Axial load P (kN)</label><input className="input" type="number" value={axial} onChange={e=>setAxial(e.target.value)}/>
            <label>Effective length Leff (m)</label><input className="input" type="number" value={leff} onChange={e=>setLeff(e.target.value)}/>
            <label>Grade</label><select className="input" value={grade} onChange={e=>setGrade(e.target.value)}>{["E250","E300","E350","E410","E450"].map(g=><option key={g}>{g}</option>)}</select>
            <label>Buckling curve</label><select className="input" value={bCurve} onChange={e=>setBCurve(e.target.value)}>{["a","b","c","d"].map(c=><option key={c}>{c}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("column/is800",{section:colSec,P_kN:+axial,Leff_m:+leff,grade,buckling_curve:bCurve})}>{loading?"Calculating...":"Design Column"}</button>
          </div>)}
          {tab==="bolt"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>IS 800 Bolt Connection (Cl.10.3)</h4>
            <label>Bolt dia (mm)</label><input className="input" type="number" value={boltDia} onChange={e=>setBoltDia(e.target.value)}/>
            <label>No. of bolts</label><input className="input" type="number" value={nBolts} onChange={e=>setNBolts(e.target.value)}/>
            <label>Shear planes</label><input className="input" type="number" value={nPlanes} onChange={e=>setNPlanes(e.target.value)}/>
            <label>Applied force P (kN)</label><input className="input" type="number" value={boltP} onChange={e=>setBoltP(e.target.value)}/>
            <label>Plate thickness (mm)</label><input className="input" type="number" value={plateT} onChange={e=>setPlateT(e.target.value)}/>
            <label>Bolt grade</label><select className="input" value={boltGrade} onChange={e=>setBoltGrade(e.target.value)}>{["4.6","4.8","5.6","6.8","8.8","10.9"].map(g=><option key={g}>{g}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("bolt/is800",{dia_mm:+boltDia,n_bolts:+nBolts,n_shear_planes:+nPlanes,P_kN:+boltP,plate_t_mm:+plateT,bolt_grade:boltGrade})}>{loading?"Calculating...":"Check Connection"}</button>
          </div>)}
          {tab==="weld"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>IS 800 Fillet Weld (Cl.10.5)</h4>
            <label>Weld size s (mm)</label><input className="input" type="number" value={wSize} onChange={e=>setWSize(e.target.value)}/>
            <label>Weld length (mm)</label><input className="input" type="number" value={wLen} onChange={e=>setWLen(e.target.value)}/>
            <label>Applied force P (kN)</label><input className="input" type="number" value={wP} onChange={e=>setWP(e.target.value)}/>
            <label>Grade</label><select className="input" value={grade} onChange={e=>setGrade(e.target.value)}>{["E250","E300","E350","E410","E450"].map(g=><option key={g}>{g}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("weld/is800",{size_mm:+wSize,length_mm:+wLen,P_kN:+wP,grade})}>{loading?"Calculating...":"Check Weld"}</button>
          </div>)}
          {tab==="aisc"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>AISC 360-22 LRFD Beam</h4>
            <label>Section</label><select className="input" value={aSec} onChange={e=>setASec(e.target.value)}>{aiscSecs.map(s=><option key={s}>{s}</option>)}</select>
            <label>Span (ft)</label><input className="input" type="number" value={aSpan} onChange={e=>setASpan(e.target.value)}/>
            <label>Mu (kip-ft)</label><input className="input" type="number" value={aMu} onChange={e=>setAMu(e.target.value)}/>
            <label>Vu (kips)</label><input className="input" type="number" value={aVu} onChange={e=>setAVu(e.target.value)}/>
            <label>Lb unbraced (ft)</label><input className="input" type="number" value={aLb} onChange={e=>setALb(e.target.value)}/>
            <label>Fy (ksi)</label><input className="input" type="number" value={aFy} onChange={e=>setAFy(e.target.value)}/>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("beam/aisc",{section:aSec,span_ft:+aSpan,Mu_kip_ft:+aMu,Vu_kips:+aVu,Lb_ft:+aLb,Fy_ksi:+aFy})}>{loading?"Calculating...":"Design (LRFD)"}</button>
          </div>)}
          {tab==="selector"&&(<div>
            <h4 style={{marginBottom:10,color:"#1e40af"}}>Auto Section Selector</h4>
            <p style={{fontSize:12,color:"#64748b",marginBottom:8}}>Picks the lightest IS section passing all IS 800:2007 checks.</p>
            <label>Span (m)</label><input className="input" type="number" value={selSpan} onChange={e=>setSelSpan(e.target.value)}/>
            <label>Moment demand (kNm)</label><input className="input" type="number" value={selMd} onChange={e=>setSelMd(e.target.value)}/>
            <label>Shear demand (kN)</label><input className="input" type="number" value={selVd} onChange={e=>setSelVd(e.target.value)}/>
            <label>Grade</label><select className="input" value={grade} onChange={e=>setGrade(e.target.value)}>{["E250","E300","E350","E410","E450"].map(g=><option key={g}>{g}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} disabled={loading} onClick={()=>run("select/beam",{span_m:+selSpan,Md_kNm:+selMd,Vd_kN:+selVd,grade})}>{loading?"Searching...":"Find Optimal Section"}</button>
          </div>)}
        </div>
        <div>
          {!result&&!loading&&<div style={{background:"#f8fafc",border:"1px dashed #cbd5e1",borderRadius:10,padding:40,textAlign:"center",color:"#94a3b8"}}><i className="fas fa-calculator" style={{fontSize:40,marginBottom:12,display:"block"}}/><p>Enter parameters and run a design check.</p></div>}
          {loading&&<div style={{textAlign:"center",padding:40,color:"#64748b"}}><i className="fas fa-spinner fa-spin" style={{fontSize:32}}/><p style={{marginTop:8}}>Computing...</p></div>}
          {result&&result.error&&<div style={{background:"#fee2e2",border:"1px solid #fca5a5",borderRadius:10,padding:16,color:"#991b1b"}}><i className="fas fa-exclamation-triangle"/> {result.error}</div>}
          {result&&!result.error&&tab==="selector"&&(<div>
            <div style={{background:"#dcfce7",border:"1px solid #86efac",borderRadius:10,padding:16,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{fontSize:18,fontWeight:700,color:"#166534"}}><i className="fas fa-check-circle"/> Recommended: {result.recommended}</div>
                <div style={{fontSize:12,color:"#15803d",marginTop:4}}>Lightest passing IS section per IS 800:2007</div></div>
                <button className="btn btn-pdf btn-sm" onClick={()=>downloadPDF("/reports/steel",{code:"IS 800:2007",section:result.recommended||"ISMB",element_type:"Beam",project:"NagaForge",engineer:"Engineer",span_m:+selSpan,Md_kNm:+selMd,Vd_kN:+selVd,grade,results:result},"steel_selector.pdf")}><i className="fas fa-file-pdf"/> PDF</button>
              </div>
            </div>
            {(result.alternatives||[]).length>0&&<RC label="Alternatives">
              <table className="table" style={{fontSize:12}}><thead><tr><th>Section</th><th>Area cm2</th><th>Bend util</th><th>Shear util</th></tr></thead>
              <tbody>{result.alternatives.map(a=><tr key={a.section}><td>{a.section}</td><td>{a.A_cm2}</td><td>{(a.bending_util*100).toFixed(0)+"%"}</td><td>{(a.shear_util*100).toFixed(0)+"%"}</td></tr>)}</tbody></table>
            </RC>}
          </div>)}
          {result&&!result.error&&tab!=="selector"&&(<div>
            <div style={{background:result.overall==="PASS"?"#dcfce7":"#fee2e2",border:"1px solid "+(result.overall==="PASS"?"#86efac":"#fca5a5"),borderRadius:10,padding:14,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:16,fontWeight:700,color:result.overall==="PASS"?"#166534":"#991b1b"}}>Overall: {result.overall}</div>
              <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{result.code} {result.clause||""}</div></div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <S s={result.overall}/>
                <button className="btn btn-pdf btn-sm" onClick={()=>downloadPDF("/reports/steel",{code:result.code||"IS 800:2007",section:result.section||beamSec,element_type:tab==="beam"||tab==="aisc"?"Beam":"Column",project:"NagaForge",engineer:"Engineer",span_m:tab==="beam"?+span:null,Md_kNm:tab==="beam"?+Md:null,Vd_kN:tab==="beam"?+Vd:null,P_kN:tab==="column"?+axial:null,Leff_m:tab==="column"?+leff:null,grade,results:result},"steel_"+tab+"_report.pdf")}><i className="fas fa-file-pdf"/> PDF</button>
              </div>
            </div>
            {result.section_props&&<RC label="Section Properties"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>{Object.entries(result.section_props).map(([k,v])=><div key={k} style={{fontSize:11}}><span style={{color:"#64748b"}}>{k}:</span> <b>{v}</b></div>)}</div></RC>}
            {result.bending&&<RC label={"Bending — "+result.bending.status}>
              <RW k="Plastic Md" v={(result.bending.Md_plastic_kNm||result.bending.Mp_kip_ft)+" "+(result.bending.Md_plastic_kNm?"kNm":"kip-ft")}/>
              {result.bending.lambda_LT!==undefined&&<RW k="LTB λ" v={result.bending.lambda_LT}/>}
              {result.bending.chi_LT!==undefined&&<RW k="χLT" v={result.bending.chi_LT}/>}
              <RW k="Design capacity" v={(result.bending.Md_design_kNm||result.bending.phi_Mn_kip_ft)+" "+(result.bending.Md_design_kNm?"kNm":"kip-ft")}/>
              <RW k="Demand" v={(result.bending.demand_kNm||result.bending.demand_kip_ft)} hi={true}/>
              <RW k="Utilization" v={(result.bending.utilization*100).toFixed(1)+"%"} hi={true}/>
              <S s={result.bending.status}/>
            </RC>}
            {result.shear&&<RC label={"Shear — "+result.shear.status}>
              <RW k="Capacity" v={(result.shear.Vd_capacity_kN||result.shear.phi_Vn_kips)+" "+(result.shear.Vd_capacity_kN?"kN":"kips")}/>
              <RW k="Demand" v={(result.shear.demand_kN||result.shear.demand_kips)} hi={true}/>
              <RW k="Utilization" v={(result.shear.utilization*100).toFixed(1)+"%"} hi={true}/>
              <S s={result.shear.status}/>
            </RC>}
            {result.deflection&&<RC label={"Deflection — "+result.deflection.status}>
              <RW k="δ actual" v={(result.deflection.delta_mm||result.deflection.delta_in)+" "+(result.deflection.delta_mm?"mm":"in")}/>
              <RW k="Limit" v={(result.deflection.limit_L300_mm||result.deflection.limit_L360_in)+" "+(result.deflection.limit_L300_mm?"mm (L/300)":"in (L/360)")} hi={true}/>
              <S s={result.deflection.status}/>
            </RC>}
            {result.column&&<RC label={"Column — "+result.column.status}>
              <RW k="KL/r" v={result.column.KL_over_r}/><RW k="λ" v={result.column.lambda}/><RW k="χ" v={result.column.chi||result.chi||"—"}/>
              <RW k="fcd" v={(result.column.fcd_MPa||result.Fcr_ksi)+" "+(result.column.fcd_MPa?"MPa":"ksi")}/>
              <RW k="Capacity" v={(result.column.Pd_kN||result.phi_Pn_kips)+" "+(result.column.Pd_kN?"kN":"kips")}/>
              <RW k="Demand" v={(result.column.demand_kN||result.demand_kips)} hi={true}/>
              <RW k="Utilization" v={(result.column.utilization*100).toFixed(1)+"%"} hi={true}/>
              <S s={result.column.status}/>
            </RC>}
            {result.total_capacity_kN!==undefined&&result.dia_mm!==undefined&&<RC label={"Bolt Connection — "+result.status}>
              <RW k="Shear/bolt" v={result.shear_capacity_per_bolt_kN+" kN"}/><RW k="Bearing/bolt" v={result.bearing_capacity_per_bolt_kN+" kN"}/>
              <RW k="Capacity" v={result.total_capacity_kN+" kN"}/><RW k="Demand" v={result.demand_kN+" kN"} hi={true}/>
              <RW k="Utilization" v={(result.utilization*100).toFixed(1)+"%"} hi={true}/><S s={result.status}/>
            </RC>}
            {result.throat_mm!==undefined&&<RC label={"Fillet Weld — "+result.status}>
              <RW k="Throat (mm)" v={result.throat_mm}/><RW k="Cap/mm" v={result.capacity_per_mm_kN+" kN/mm"}/>
              <RW k="Capacity" v={result.total_capacity_kN+" kN"}/><RW k="Demand" v={result.demand_kN+" kN"} hi={true}/>
              <RW k="Utilization" v={(result.utilization*100).toFixed(1)+"%"} hi={true}/><S s={result.status}/>
            </RC>}
          </div>)}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════════════════════════════════════════
// PHASE 10 — BIM VIEWER
// ═══════════════════════════════════════════════════════════════════════════════
const BIMViewer=({toast})=>{
  const[tab,setTab]=useState("models");
  const[models,setModels]=useState([]);
  const[elements,setElements]=useState([]);
  const[selModel,setSelModel]=useState(null);
  const[viewerData,setViewerData]=useState(null);
  const[projects,setProjects]=useState([]);
  const[proj,setProj]=useState("");
  const[takeoff,setTakeoff]=useState(null);
  const[clashResult,setClashResult]=useState(null);
  const[filterFloor,setFilterFloor]=useState("all");
  const[filterType,setFilterType]=useState("All");
  const[etypes,setEtypes]=useState([]);
  const canvasRef=React.useRef(null);
  const[mForm,setMForm]=useState({name:"",description:"",total_floors:1,building_height_m:0,gross_area_m2:0});
  const[eForm,setEForm]=useState({element_type:"Wall",level:"Ground Floor",floor_number:0,material:"",length_m:5,width_m:0.2,height_m:3,pos_x:0,pos_y:0,pos_z:0,status:"design"});

  React.useEffect(()=>{
    api("/projects").then(d=>setProjects(Array.isArray(d)?d:(d.items||[])));
    api("/bim/element-types").then(d=>setEtypes(d.types||[]));
    loadModels();
  },[]);

  const loadModels=async(pid)=>{const url="/bim/models"+(pid?"?project_id="+pid:"");const d=await api(url);setModels(Array.isArray(d)?d:[]);};
  const loadEls=async(mid)=>{const d=await api("/bim/elements?model_id="+mid);setElements(Array.isArray(d)?d:[]);};
  const createModel=async()=>{if(!proj){toast("Select project","error");return;}
    await api("/bim/models",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...mForm,project_id:+proj})});
    toast("Model created");loadModels(proj);setMForm({name:"",description:"",total_floors:1,building_height_m:0,gross_area_m2:0});};
  const pickModel=async(m)=>{setSelModel(m);setTakeoff(null);setClashResult(null);await loadEls(m.id);};
  const addEl=async()=>{if(!selModel){toast("Select model first","error");return;}
    await api("/bim/elements",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...eForm,model_id:selModel.id})});
    toast("Element added");loadEls(selModel.id);};
  const delEl=async(id)=>{await api("/bim/elements/"+id,{method:"DELETE"});toast("Deleted","info");loadEls(selModel.id);};
  const getTakeoff=async()=>{const d=await api("/bim/models/"+selModel.id+"/takeoff");setTakeoff(d);setTab("takeoff");};
  const runClash=async()=>{const d=await api("/bim/models/"+selModel.id+"/clash-detect",{method:"POST"});setClashResult(d);setTab("clashes");};
  const openViewer=async()=>{const d=await api("/bim/models/"+selModel.id+"/viewer-data");setViewerData(d);setTab("viewer");};

  // Isometric canvas renderer
  const drawScene=React.useCallback(()=>{
    if(!canvasRef.current||!viewerData)return;
    const cv=canvasRef.current;const ctx=cv.getContext("2d");
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);ctx.fillStyle="#1e293b";ctx.fillRect(0,0,W,H);
    const objs=viewerData.objects||[];if(!objs.length)return;
    const iso=(x,y,z)=>({x:W/2+(x-z)*38,y:H*0.55+(x+z)*18-y*32});
    const sorted=[...objs].sort((a,b)=>(b.pos[0]+b.pos[2])-(a.pos[0]+a.pos[2]));
    sorted.forEach(o=>{
      const[px,py,pz]=o.pos;const[lx,ly,lz]=o.size;const col=o.color||"#adb5bd";
      const faces=[
        {pts:[[px,py+ly,pz],[px+lx,py+ly,pz],[px+lx,py+ly,pz+lz],[px,py+ly,pz+lz]],alpha:"cc"},
        {pts:[[px+lx,py+ly,pz],[px+lx,py,pz],[px+lx,py,pz+lz],[px+lx,py+ly,pz+lz]],alpha:"77"},
        {pts:[[px,py+ly,pz+lz],[px,py,pz+lz],[px+lx,py,pz+lz],[px+lx,py+ly,pz+lz]],alpha:"99"},
      ];
      faces.forEach(({pts,alpha})=>{
        const projected=pts.map(([x,y,z])=>iso(x,y,z));
        ctx.beginPath();ctx.moveTo(projected[0].x,projected[0].y);
        projected.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();
        ctx.fillStyle=col+alpha;ctx.fill();ctx.strokeStyle="#0006";ctx.lineWidth=0.5;ctx.stroke();
      });
    });
    ctx.fillStyle="#94a3b8";ctx.font="12px monospace";
    ctx.fillText("Elements: "+objs.length+" | "+viewerData.model.name,10,20);
  },[viewerData]);

  React.useEffect(()=>{if(tab==="viewer")drawScene();},[drawScene,tab]);

  const TC={"Column":"#8d99ae","Beam":"#5c6bc0","Slab":"#b0bec5","FloorSlab":"#cfd8dc","RoofSlab":"#90a4ae","Footing":"#78909c","Wall":"#d4a373","ExternalWall":"#c1956e","InternalWall":"#e9c46a","CurtainWall":"#a8dadc","Door":"#a0856e","Window":"#90e0ef","Staircase":"#f4a261","Stair":"#f4a261","Ramp":"#e9c46a","Other":"#ced4da"};
  const allFloors=["all",...new Set(elements.map(e=>String(e.floor_number)))];
  const allTypes=["All",...new Set(elements.map(e=>e.element_type))];
  const filtEls=elements.filter(e=>(filterFloor==="all"||String(e.floor_number)===filterFloor)&&(filterType==="All"||e.element_type===filterType));

  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {[["models","fa-layer-group","Models"],["elements","fa-cubes","Elements"],["takeoff","fa-calculator","Takeoff"],["clashes","fa-triangle-exclamation","Clashes"],["viewer","fa-cube","3D View"]].map(([k,ic,l])=>(
          <button key={k} className={"btn"+(tab===k?" btn-primary":"")} style={{fontSize:12}} onClick={()=>setTab(k)}>
            <i className={"fas "+ic}/> {l}
          </button>
        ))}
        {selModel&&<div style={{marginLeft:"auto",background:"#e0f2fe",border:"1px solid #7dd3fc",borderRadius:6,padding:"4px 10px",fontSize:12,color:"#0369a1",display:"flex",gap:8,alignItems:"center"}}>
          <i className="fas fa-check-circle"/> <strong>{selModel.name}</strong>
          <button className="btn" style={{fontSize:11,padding:"2px 6px"}} onClick={openViewer}>3D</button>
          <button className="btn" style={{fontSize:11,padding:"2px 6px"}} onClick={getTakeoff}>QTO</button>
          <button className="btn" style={{fontSize:11,padding:"2px 6px",background:"#fef3c7",color:"#92400e"}} onClick={runClash}>Clash</button>
        </div>}
      </div>

      {tab==="models"&&<div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:16}}>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:16}}>
          <h4 style={{marginBottom:10,color:"#1e40af"}}>New Model</h4>
          <label>Project</label>
          <select className="input" value={proj} onChange={e=>{setProj(e.target.value);loadModels(e.target.value);}}><option value="">All</option>{projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select>
          <label>Name</label><input className="input" value={mForm.name} onChange={e=>setMForm({...mForm,name:e.target.value})}/>
          <label>Description</label><input className="input" value={mForm.description} onChange={e=>setMForm({...mForm,description:e.target.value})}/>
          <label>Floors</label><input className="input" type="number" value={mForm.total_floors} onChange={e=>setMForm({...mForm,total_floors:+e.target.value})}/>
          <label>Height (m)</label><input className="input" type="number" value={mForm.building_height_m} onChange={e=>setMForm({...mForm,building_height_m:+e.target.value})}/>
          <label>Gross Area m2</label><input className="input" type="number" value={mForm.gross_area_m2} onChange={e=>setMForm({...mForm,gross_area_m2:+e.target.value})}/>
          <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={createModel}>Create Model</button>
        </div>
        <div>
          <h4 style={{marginBottom:10}}>BIM Models</h4>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:10}}>
            {models.map(m=><div key={m.id} style={{background:selModel&&selModel.id===m.id?"#eff6ff":"#fff",border:"1px solid "+(selModel&&selModel.id===m.id?"#3b82f6":"#e2e8f0"),borderRadius:10,padding:14,cursor:"pointer"}} onClick={()=>{pickModel(m);setTab("elements");}}>
              <div style={{fontWeight:700,color:"#1e40af",marginBottom:4}}>{m.name}</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{m.description}</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",fontSize:11}}>
                {[["v"+m.version,""],[""+m.total_floors+" fl",""],[""+m.element_count+" el",""]].map(([l],i)=><span key={i} style={{background:"#f1f5f9",borderRadius:4,padding:"2px 5px"}}>{l}</span>)}
              </div>
            </div>)}
            {models.length===0&&<div style={{color:"#94a3b8",fontSize:13,gridColumn:"1/-1",padding:20}}>No models yet.</div>}
          </div>
        </div>
      </div>}

      {tab==="elements"&&<div style={{display:"grid",gridTemplateColumns:"280px 1fr",gap:16}}>
        <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:16}}>
          <h4 style={{marginBottom:10,color:"#1e40af"}}>Add Element</h4>
          {!selModel?<p style={{color:"#94a3b8",fontSize:13}}>Select a model first.</p>:<>
            <label>Type</label><select className="input" value={eForm.element_type} onChange={e=>setEForm({...eForm,element_type:e.target.value})}>{etypes.map(t=><option key={t}>{t}</option>)}</select>
            <label>Level</label><input className="input" value={eForm.level} onChange={e=>setEForm({...eForm,level:e.target.value})}/>
            <label>Floor #</label><input className="input" type="number" value={eForm.floor_number} onChange={e=>setEForm({...eForm,floor_number:+e.target.value})}/>
            <label>Material</label><input className="input" value={eForm.material} onChange={e=>setEForm({...eForm,material:e.target.value})} placeholder="e.g. Brick Masonry"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
              <div><label style={{fontSize:10}}>L(m)</label><input className="input" type="number" step="0.1" value={eForm.length_m} onChange={e=>setEForm({...eForm,length_m:+e.target.value})}/></div>
              <div><label style={{fontSize:10}}>W(m)</label><input className="input" type="number" step="0.1" value={eForm.width_m} onChange={e=>setEForm({...eForm,width_m:+e.target.value})}/></div>
              <div><label style={{fontSize:10}}>H(m)</label><input className="input" type="number" step="0.1" value={eForm.height_m} onChange={e=>setEForm({...eForm,height_m:+e.target.value})}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
              <div><label style={{fontSize:10}}>X</label><input className="input" type="number" step="0.5" value={eForm.pos_x} onChange={e=>setEForm({...eForm,pos_x:+e.target.value})}/></div>
              <div><label style={{fontSize:10}}>Y</label><input className="input" type="number" step="0.5" value={eForm.pos_y} onChange={e=>setEForm({...eForm,pos_y:+e.target.value})}/></div>
              <div><label style={{fontSize:10}}>Z</label><input className="input" type="number" step="0.5" value={eForm.pos_z} onChange={e=>setEForm({...eForm,pos_z:+e.target.value})}/></div>
            </div>
            <label>Status</label><select className="input" value={eForm.status} onChange={e=>setEForm({...eForm,status:e.target.value})}>{["design","under_construction","complete"].map(s=><option key={s}>{s}</option>)}</select>
            <button className="btn btn-primary" style={{width:"100%",marginTop:8}} onClick={addEl}>Add Element</button>
          </>}
        </div>
        <div>
          <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
            <h4 style={{margin:0}}>{selModel?selModel.name+" Elements":"Elements"}</h4>
            <select className="input" style={{width:110,margin:0}} value={filterFloor} onChange={e=>setFilterFloor(e.target.value)}>{allFloors.map(f=><option key={f} value={f}>{f==="all"?"All floors":"Floor "+f}</option>)}</select>
            <select className="input" style={{width:130,margin:0}} value={filterType} onChange={e=>setFilterType(e.target.value)}>{allTypes.map(t=><option key={t}>{t}</option>)}</select>
            <span style={{marginLeft:"auto",fontSize:12,color:"#64748b"}}>{filtEls.length} shown</span>
          </div>
          <table className="table" style={{fontSize:11}}>
            <thead><tr><th>Type</th><th>Name</th><th>Level</th><th>L×W×H</th><th>Vol m3</th><th>Area m2</th><th>Material</th><th>Status</th><th></th></tr></thead>
            <tbody>{filtEls.map(e=><tr key={e.id}>
              <td><span style={{background:(TC[e.element_type]||"#ced4da")+"33",color:"#1e293b",borderRadius:3,padding:"1px 5px",fontSize:10,fontWeight:600}}>{e.element_type}</span></td>
              <td>{e.name}</td><td>{e.level}</td>
              <td>{e.dimensions.length}x{e.dimensions.width}x{e.dimensions.height}</td>
              <td>{e.volume_m3}</td><td>{e.area_m2}</td><td>{e.material||"—"}</td>
              <td><span style={{fontSize:9,background:e.status==="complete"?"#dcfce7":e.status==="under_construction"?"#fef3c7":"#f1f5f9",borderRadius:3,padding:"1px 4px"}}>{e.status}</span></td>
              <td><button className="btn" style={{fontSize:10,padding:"1px 5px",color:"#ef4444"}} onClick={()=>delEl(e.id)}>✕</button></td>
            </tr>)}
            {filtEls.length===0&&<tr><td colSpan={9} style={{textAlign:"center",color:"#94a3b8",padding:20}}>No elements.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>}

      {tab==="takeoff"&&(takeoff?<div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
          {[["Elements",takeoff.total_elements,"fa-cubes","#3b82f6"],["Volume",takeoff.total_volume_m3+" m3","fa-cube","#10b981"],["Area",takeoff.total_area_m2+" m2","fa-border-all","#f59e0b"],["Model",takeoff.model_name,"fa-layer-group","#8b5cf6"]].map(([l,v,ic,c])=>(
            <div key={l} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}><div style={{fontSize:11,color:"#64748b"}}><i className={"fas "+ic} style={{color:c,marginRight:4}}/>{l}</div><div style={{fontSize:22,fontWeight:700}}>{v}</div></div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}>
            <h4 style={{marginBottom:10}}>By Element Type</h4>
            <table className="table" style={{fontSize:12}}>
              <thead><tr><th>Type</th><th>Count</th><th>Vol m3</th><th>Area m2</th></tr></thead>
              <tbody>{Object.entries(takeoff.by_element_type||{}).map(([t,v])=><tr key={t}>
                <td><span style={{background:(TC[t]||"#ced4da")+"33",borderRadius:3,padding:"1px 5px",fontSize:10,fontWeight:600}}>{t}</span></td>
                <td>{v.count}</td><td>{v.total_volume_m3}</td><td>{v.total_area_m2}</td>
              </tr>)}</tbody>
            </table>
          </div>
          <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:14}}>
            <h4 style={{marginBottom:10}}>By Floor</h4>
            <table className="table" style={{fontSize:12}}>
              <thead><tr><th>Floor</th><th>Elements</th><th>Vol m3</th><th>Area m2</th></tr></thead>
              <tbody>{Object.entries(takeoff.by_floor||{}).map(([fl,v])=><tr key={fl}><td><b>{fl}</b></td><td>{v.element_count}</td><td>{v.volume_m3.toFixed(2)}</td><td>{v.area_m2.toFixed(2)}</td></tr>)}</tbody>
            </table>
          </div>
        </div>
      </div>:<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><p>Select a model and click <b>QTO</b> to generate quantities.</p></div>)}

      {tab==="clashes"&&(clashResult?<div>
        <div style={{background:clashResult.clashes_found>0?"#fee2e2":"#dcfce7",border:"1px solid "+(clashResult.clashes_found>0?"#fca5a5":"#86efac"),borderRadius:10,padding:14,marginBottom:12}}>
          <div style={{fontSize:15,fontWeight:700,color:clashResult.clashes_found>0?"#991b1b":"#166534"}}>
            {clashResult.clashes_found>0?("⚠ "+clashResult.clashes_found+" clashes in "+clashResult.elements_checked+" elements"):("✓ No clashes in "+clashResult.elements_checked+" elements")}
          </div>
        </div>
        {clashResult.clashes.length>0&&<table className="table" style={{fontSize:12}}>
          <thead><tr><th>Element A</th><th>Element B</th><th>Severity</th><th>Penetration m</th></tr></thead>
          <tbody>{clashResult.clashes.map((c,i)=><tr key={i}>
            <td>{c.element_a}</td><td>{c.element_b}</td>
            <td><span style={{background:c.severity==="major"?"#fee2e2":"#fef3c7",color:c.severity==="major"?"#991b1b":"#92400e",borderRadius:3,padding:"1px 5px",fontSize:10,fontWeight:600}}>{c.severity}</span></td>
            <td>{c.penetration_m}</td>
          </tr>)}</tbody>
        </table>}
      </div>:<div style={{textAlign:"center",padding:40,color:"#94a3b8"}}><p>Select a model and click <b>Clash</b> to run detection.</p></div>)}

      {tab==="viewer"&&<div>
        {viewerData?<div>
          <div style={{marginBottom:6,display:"flex",gap:8,alignItems:"center"}}>
            <strong style={{color:"#1e40af"}}>{viewerData.model.name}</strong>
            <span style={{fontSize:12,color:"#64748b"}}>v{viewerData.model.version} · {viewerData.stats.total} elements</span>
          </div>
          <canvas ref={canvasRef} width={900} height={500} style={{background:"#1e293b",borderRadius:10,border:"1px solid #334155",display:"block",maxWidth:"100%"}}/>
          <div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>
            {Object.entries(viewerData.stats.by_type||{}).map(([t,n])=><span key={t} style={{background:(TC[t]||"#ced4da")+"33",border:"1px solid "+(TC[t]||"#ced4da"),borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600}}>{t}: {n}</span>)}
          </div>
        </div>:<div style={{textAlign:"center",padding:60,color:"#94a3b8"}}><i className="fas fa-cube" style={{fontSize:48,display:"block",marginBottom:12}}/><p>Select a model and click <b>3D</b> to open the isometric viewer.</p></div>}
      </div>}
    </div>
  );
};

// TEAM ROLES & WELCOME SCREEN
// ═══════════════════════════════════════════════════════════════════════════════
const TeamRoles=({toast,companyId})=>{
  const[roles,setRoles]=useState([]);
  const[team,setTeam]=useState([]);
  const[selRole,setSelRole]=useState(null);
  useEffect(()=>{
    api("/saas/team-roles").then(d=>setRoles(Array.isArray(d)?d:[])).catch(()=>{});

  },[companyId]);

  return(
    <div>

          <h2 style={{fontSize:"1.3rem",fontWeight:800,marginBottom:6}}>🏗 Welcome to NagaForge Construction ERP</h2>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:16,marginBottom:24}}>

          const teamMember=team.find(u=>u.role===r.role);
          return(
            <div key={r.role} style={{background:"#fff",border:"1.5px solid "+(selRole===r.role?"#2563eb":"#e2e8f0"),borderRadius:12,padding:20,cursor:"pointer",transition:"all .2s",boxShadow:selRole===r.role?"0 4px 20px #2563eb22":"none"}}
              onClick={()=>setSelRole(selRole===r.role?null:r.role)}>
              <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
                <div style={{width:44,height:44,borderRadius:10,background:r.color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",color:r.color}}>
                  <i className={"fas "+r.icon}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:".95rem"}}>{r.display}</div>
                  <div style={{fontSize:".72rem",color:"#64748b",fontFamily:"monospace",marginTop:2}}>
                    {teamMember?<span style={{color:"#16a34a"}}>✓ {teamMember.username} / Demo@123</span>:<span style={{color:"#94a3b8"}}>No user assigned yet</span>}
                  </div>
                </div>
                <i className={"fas fa-chevron-"+(selRole===r.role?"up":"down")} style={{color:"#94a3b8",fontSize:".75rem"}}/>
              </div>

              {selRole===r.role&&(
                <div>
                  <div style={{fontSize:".72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"#64748b",marginBottom:8}}>Responsibilities</div>
                  <ul style={{listStyle:"none",display:"flex",flexDirection:"column",gap:6,marginBottom:12}}>
                    {r.responsibilities.map((resp,i)=>(
                      <li key={i} style={{display:"flex",gap:8,fontSize:".8rem",color:"#374151",alignItems:"flex-start"}}>
                        <i className="fas fa-check-circle" style={{color:r.color,marginTop:2,flexShrink:0,fontSize:".75rem"}}/>
                        {resp}
                      </li>
                    ))}
                  </ul>
                  <div style={{fontSize:".72rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",color:"#64748b",marginBottom:6}}>Modules Access</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                    {r.modules.map(m=><span key={m} style={{fontSize:".68rem",padding:"2px 8px",background:r.color+"15",color:r.color,border:"1px solid "+r.color+"30",borderRadius:20,fontWeight:600}}>{m}</span>)}
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Team Members Table */}
      {team.length>0&&(
        <div className="card">
          <div className="card-header"><span className="card-title">Your Team — Pre-loaded Users</span></div>
          <table className="table">
            <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Modules</th><th>Default Password</th></tr></thead>
            <tbody>
              {team.map(u=>(
                <tr key={u.id}>
                  <td><div style={{fontWeight:600}}>{u.full_name}</div><div style={{fontSize:11,color:"#64748b"}}>{u.email}</div></td>
                  <td><code style={{fontSize:".8rem",background:"#f1f5f9",padding:"2px 6px",borderRadius:4}}>{u.username}</code></td>
                  <td>
                    <span style={{background:(u.color||"#64748b")+"18",color:u.color||"#64748b",border:"1px solid "+(u.color||"#64748b")+"30",borderRadius:6,padding:"2px 8px",fontSize:".75rem",fontWeight:600}}>
                      <i className={"fas "+(u.icon||"fa-user")+" "} style={{marginRight:4}}/>{u.display_role}
                    </span>
                  </td>
                  <td style={{fontSize:".75rem",color:"#64748b"}}>{(u.modules||[]).join(", ")}</td>
                  <td><code style={{fontSize:".75rem",background:"#fef9c3",padding:"2px 8px",borderRadius:4,color:"#92400e"}}>Demo@123</code></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

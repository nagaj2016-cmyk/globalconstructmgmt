<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NagaForge — Integrated Construction Management</title>
<!-- PWA manifest -->
<link rel="manifest" href="/manifest.json"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="NagaForge"/>
<meta name="application-name" content="NagaForge"/>
<meta name="description" content="Enterprise Construction Management — Projects, Engineering, Safety, BIM"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1e293b}
  :root{
    --primary:#1e40af;--primary-light:#3b82f6;--primary-dark:#1e3a8a;
    --accent:#f59e0b;--success:#10b981;--danger:#ef4444;--warning:#f59e0b;
    --sidebar-w:240px;--header-h:60px;
  }
  .app{display:flex;min-height:100vh}
  /* Sidebar */
  .sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#0f172a 0%,#1e293b 100%);
    color:#fff;position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;
    display:flex;flex-direction:column}
  .sidebar-brand{padding:20px 16px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px}
  .sidebar-brand .logo{width:36px;height:36px;background:var(--primary-light);border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:18px}
  .sidebar-brand h1{font-size:16px;font-weight:700;color:#fff}
  .sidebar-brand small{font-size:10px;color:#64748b;display:block}
  .sidebar-nav{padding:12px 8px;flex:1}
  .nav-section{font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;
    letter-spacing:.8px;padding:8px 8px 4px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
    cursor:pointer;transition:.15s;color:#94a3b8;font-size:13.5px;margin-bottom:2px}
  .nav-item:hover{background:#1e40af22;color:#e2e8f0}
  .nav-item.active{background:var(--primary);color:#fff}
  .nav-item i{width:18px;text-align:center;font-size:14px}
  .sidebar-footer{padding:12px 16px;border-top:1px solid #334155;font-size:12px;color:#475569}
  /* Main */
  .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:var(--header-h);background:#fff;border-bottom:1px solid #e2e8f0;
    display:flex;align-items:center;justify-content:space-between;padding:0 24px;
    position:sticky;top:0;z-index:50}
  .topbar-title{font-size:17px;font-weight:600;color:#1e293b}
  .topbar-right{display:flex;align-items:center;gap:12px}
  .btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:13px;
    font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.15s}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-outline{background:#fff;color:var(--primary);border:1px solid #dbeafe}
  .btn-outline:hover{background:#eff6ff}
  .btn-danger{background:#fef2f2;color:var(--danger);border:1px solid #fecaca}
  .btn-danger:hover{background:var(--danger);color:#fff}
  .btn-success{background:#ecfdf5;color:var(--success);border:1px solid #a7f3d0}
  .btn-sm{padding:5px 10px;font-size:12px}
  .content{padding:24px;flex:1}
  /* Cards */
  .card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .card-title{font-size:14px;font-weight:600;color:#374151}
  /* Stats grid */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:24px}
  .stat-card{background:#fff;border-radius:12px;padding:16px 20px;border:1px solid #e2e8f0;
    box-shadow:0 1px 3px rgba(0,0,0,.06);display:flex;align-items:center;gap:14px}
  .stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;
    justify-content:center;font-size:18px;flex-shrink:0}
  .stat-info h3{font-size:22px;font-weight:700;color:#1e293b}
  .stat-info p{font-size:12px;color:#64748b;margin-top:2px}
  .stat-info .trend{font-size:11px;margin-top:3px}
  .trend.up{color:var(--success)}.trend.down{color:var(--danger)}
  /* Table */
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:#475569;
    border-bottom:1px solid #e2e8f0;white-space:nowrap}
  td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#374151}
  tr:hover td{background:#f8fafc}
  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;
    font-size:11px;font-weight:600;text-transform:capitalize}
  .badge-active,.badge-paid,.badge-done,.badge-passed{background:#ecfdf5;color:#059669}
  .badge-planning,.badge-draft,.badge-todo,.badge-low{background:#eff6ff;color:#3b82f6}
  .badge-on_hold,.badge-sent,.badge-in_progress,.badge-medium{background:#fef3c7;color:#d97706}
  .badge-completed,.badge-review{background:#f0fdf4;color:#16a34a}
  .badge-cancelled,.badge-overdue,.badge-urgent,.badge-critical,.badge-failed{background:#fef2f2;color:#dc2626}
  .badge-high{background:#fff7ed;color:#ea580c}
  /* Form */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
    display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;
    overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center}
  .modal-header h2{font-size:16px;font-weight:700}
  .modal-body{padding:20px 24px 24px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:5px}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid #d1d5db;border-radius:7px;
    font-size:13px;outline:none;transition:.15s;background:#fff}
  input:focus,select:focus,textarea:focus{border-color:var(--primary-light);
    box-shadow:0 0 0 3px #dbeafe}
  textarea{resize:vertical;min-height:70px}
  .form-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:4px}
  /* Progress bar */
  .progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:var(--primary-light);transition:.3s}
  /* Grid 2-col */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  /* Search bar */
  .search-bar{position:relative;display:inline-flex;align-items:center}
  .search-bar i{position:absolute;left:10px;color:#94a3b8;font-size:13px}
  .search-bar input{padding-left:32px;width:240px}
  /* Avatar */
  .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
  /* Kanban */
  .kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
  .kanban-col{background:#f8fafc;border-radius:10px;padding:12px}
  .kanban-col-title{font-size:12px;font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;color:#64748b;margin-bottom:10px;display:flex;
    align-items:center;justify-content:space-between}
  .kanban-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px;
    border:1px solid #e2e8f0;box-shadow:0 1px 2px rgba(0,0,0,.05);cursor:pointer}
  .kanban-card:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(59,130,246,.15)}
  .kanban-card h4{font-size:13px;font-weight:600;margin-bottom:6px;color:#1e293b}
  .kanban-card p{font-size:11px;color:#64748b}
  /* Alert */
  .alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;
    display:flex;align-items:center;gap:8px}
  .alert-warning{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
  .alert-danger{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
  /* Loading */
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid #e2e8f0;
    border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-center{display:flex;justify-content:center;padding:40px}
  /* Empty state */
  .empty{text-align:center;padding:40px 20px;color:#94a3b8}
  .empty i{font-size:36px;margin-bottom:10px;display:block}
  /* Responsive */
  @media(max-width:768px){
    .sidebar{transform:translateX(-100%);transition:.3s}
    .sidebar.open{transform:translateX(0)}
    .main{margin-left:0}
    .kanban{grid-template-columns:1fr 1fr}
    .grid-2,.grid-3{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:1fr 1fr}
    .form-row{grid-template-columns:1fr}
  }

  /* ── Mobile PWA / Phase 14 ──────────────────────────────────────────── */
  /* Mobile hamburger */
  .mob-hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;
    color:#1e293b;padding:6px;border-radius:7px}
  .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:90}

  @media(max-width:768px){
    .mob-hamburger{display:flex;align-items:center;justify-content:center}
    .mob-overlay.visible{display:block}
    /* Bottom nav bar for mobile */
    .bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1px solid #e2e8f0;z-index:80;height:60px;
      box-shadow:0 -2px 12px rgba(0,0,0,.08)}
    .bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
      justify-content:center;cursor:pointer;gap:3px;color:#94a3b8;font-size:10px;
      border:none;background:none;padding:6px 0;transition:.15s}
    .bottom-nav-item.active{color:#1e40af}
    .bottom-nav-item i{font-size:18px}
    /* Push content above bottom nav */
    .content{padding:16px 12px 80px}
    .topbar{padding:0 14px}
    .topbar-title{font-size:15px}
    /* Compact stat cards on mobile */
    .stats-grid{grid-template-columns:1fr 1fr;gap:10px}
    .stat-card{padding:12px}
    .stat-icon{width:36px;height:36px;font-size:15px}
    .stat-info h3{font-size:18px}
    /* Modal full-screen on mobile */
    .modal-overlay{padding:0;align-items:flex-end}
    .modal{border-radius:14px 14px 0 0;max-height:85vh;max-width:100%}
    /* Struct grid single col on mobile */
    .struct-grid{grid-template-columns:1fr}
    /* Table horizontal scroll on mobile */
    .table-wrap{-webkit-overflow-scrolling:touch}
    table{font-size:12px}
    th,td{padding:8px 8px}
    /* Kanban single col on very small */
  }
  @media(max-width:480px){
    .kanban{grid-template-columns:1fr}
    .stats-grid{grid-template-columns:1fr 1fr}
  }
  /* Desktop: hide bottom nav */
  @media(min-width:769px){
    .bottom-nav{display:none}
  }

  /* PWA install banner */
  .pwa-banner{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
    background:#1e40af;color:#fff;border-radius:12px;padding:12px 20px;
    display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(30,64,175,.4);
    z-index:999;font-size:13px;max-width:90vw;animation:slideUp .3s ease}
  @keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
  .pwa-banner button{background:#fff;color:#1e40af;border:none;border-radius:7px;
    padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
  .pwa-banner .pwa-close{background:none;color:#bfdbfe;font-size:18px;padding:0 4px}

  /* Offline indicator */
  .offline-bar{position:fixed;top:0;left:0;right:0;background:#f59e0b;color:#fff;
    text-align:center;font-size:12px;padding:4px;z-index:1000;font-weight:600;
    display:none}
  .offline-bar.visible{display:block}

  /* PDF download button */
  .btn-pdf{background:#dc2626;color:#fff;border:none}
  .btn-pdf:hover{background:#b91c1c}

  /* Touch-friendly tap targets on mobile */
  @media(max-width:768px){
    .btn{min-height:40px;padding:9px 16px}
    .btn-sm{min-height:34px;padding:7px 12px}
    .nav-item{padding:11px 10px;min-height:42px}
    input,select,textarea{min-height:42px;font-size:16px}/* 16px prevents iOS zoom */
  }

  /* Safe area insets for iPhone notch */
  @supports(padding:max(0px)){
    .bottom-nav{padding-bottom:max(0px, env(safe-area-inset-bottom))}
    .content{padding-bottom:max(80px, calc(60px + env(safe-area-inset-bottom)))}
  }
  .chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;
    font-size:11px;background:#f1f5f9;color:#475569;margin:2px}
  .tag-row{display:flex;flex-wrap:wrap;gap:4px}
  canvas{max-width:100%}
  @media(max-width:768px){.hide-mobile{display:none}}
  /* ── Structural Engineering styles ── */
  .struct-tabs{display:flex;gap:4px;padding:4px;background:#f1f5f9;border-radius:10px;margin-bottom:20px;flex-wrap:wrap}
  .struct-tab{padding:7px 14px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#64748b;border:none;background:none;transition:.15s}
  .struct-tab.active{background:#fff;color:var(--primary);box-shadow:0 1px 4px rgba(0,0,0,.12);font-weight:600}
  .struct-grid{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start}
  .calc-form{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px}
  .calc-form h3{font-size:14px;font-weight:700;color:#1e40af;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .calc-result{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;min-height:400px}
  .result-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f1f5f9}
  .result-section:last-child{border-bottom:none;margin-bottom:0}
  .result-section h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:10px}
  .result-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
  .result-label{color:#6b7280}
  .result-val{font-weight:600;color:#1e293b}
  .result-ok{color:#059669;font-weight:700}
  .result-fail{color:#dc2626;font-weight:700}
  .result-warn{color:#d97706;font-weight:700}
  .code-badge{display:inline-flex;padding:2px 8px;background:#eff6ff;color:#3b82f6;border-radius:4px;font-size:10px;font-weight:600;border:1px solid #bfdbfe}
  .bbs-table th{background:#f0f9ff;color:#0369a1}
  .result-highlight{background:linear-gradient(135deg,#eff6ff,#f0fdf4);border:1px solid #bfdbfe;border-radius:10px;padding:14px;margin-bottom:14px}
  .result-highlight .big-num{font-size:24px;font-weight:800;color:#1e40af}
  .result-highlight .big-label{font-size:12px;color:#64748b;margin-top:2px}
  .struct-alert-ok{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:10px 14px;color:#065f46;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .struct-alert-fail{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;color:#991b1b;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .is-ref{font-size:11px;color:#9ca3af;font-style:italic;margin-top:6px}
  @media(max-width:900px){.struct-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<!-- Offline indicator -->
<div class="offline-bar" id="offlineBar">📡 No internet connection — showing cached data</div>

<div id="root"></div>

<!-- Service Worker registration -->
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').then(function(reg){
      console.log('[PWA] Service Worker registered, scope:',reg.scope);
      reg.addEventListener('updatefound',function(){
        var nw=reg.installing;
        nw.addEventListener('statechange',function(){
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            console.log('[PWA] Update available');
          }
        });
      });
    }).catch(function(err){console.warn('[PWA] SW registration failed:',err)});
  });
}
// Offline/online detection
window.addEventListener('online', function(){document.getElementById('offlineBar').classList.remove('visible')});
window.addEventListener('offline',function(){document.getElementById('offlineBar').classList.add('visible')});
if(!navigator.onLine){document.getElementById('offlineBar').classList.add('visible')}

// Capture PWA install prompt
window._pwaPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();
  window._pwaPrompt=e;
  console.log('[PWA] Install prompt ready');
});
</script>

<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
// Auto-detect API base: same origin when served by FastAPI (ngrok/Railway/localhost)
const API=window.location.origin===("http://localhost:3000")||window.location.port==="3000"
  ?"http://localhost:8000"
  :window.location.origin;
if((window.location.pathname==="/app"||window.location.pathname==="/app/")&&!new URLSearchParams(window.location.search).has("entry")){
  window.location.replace("/");
}

// ── Auth token store ───────────────────────────────────────────────────────────
// Access token: in-memory (short-lived). Refresh token: localStorage so a browser
// reload restores the session instead of logging the user out.
let _authToken=null;
const getToken=()=>_authToken;
const setToken=(t)=>{_authToken=t};
const getRefresh=()=>{try{return localStorage.getItem("nf_refresh")||null;}catch(e){return null;}};
const setRefresh=(t)=>{try{t?localStorage.setItem("nf_refresh",t):localStorage.removeItem("nf_refresh");}catch(e){}};
// Exchange the stored refresh token for a fresh access token. Returns the user or null.
const doRefresh=async()=>{
  const rt=getRefresh();
  if(!rt)return null;
  try{
    const r=await fetch(API+"/auth/refresh",{method:"POST",headers:{"Content-Type":"application/json","ngrok-skip-browser-warning":"true"},body:JSON.stringify({refresh_token:rt})});
    if(!r.ok){setRefresh(null);return null;}
    const d=await r.json();
    setToken(d.access_token);setRefresh(d.refresh_token);
    return d.user||null;
  }catch(e){return null;}
};

// ── Helpers ────────────────────────────────────────────────────────────────────
const api=async(path,opts={},_retry=true)=>{
  const headers={
    "Content-Type":"application/json",
    "ngrok-skip-browser-warning":"true",   // skip ngrok interstitial for API calls
    ...(opts.headers||{}),
  };
  if(getToken())headers["Authorization"]="Bearer "+getToken();
  const{headers:_ignoredHeaders,...rest}=opts;
  const r=await fetch(API+path,{...rest,headers});
  if(r.status===401&&_retry&&getRefresh()){
    const u=await doRefresh();
    if(u)return api(path,opts,false);   // retry once with the new access token
  }
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"Error")}
  return r.json();
};
// ── DB-driven i18n — every label loads from the backend, nothing hardcoded ────
window.NF_I18N={locale:"en",dir:"ltr",strings:{}};
const loadI18n=async(locale)=>{
  try{
    const b=await fetch(API+"/i18n/"+(locale||"en"),{headers:{"ngrok-skip-browser-warning":"true"}}).then(r=>r.json());
    window.NF_I18N={locale:b.locale||"en",dir:b.direction||"ltr",strings:b.strings||{}};
    document.documentElement.setAttribute("dir",window.NF_I18N.dir);
    document.documentElement.setAttribute("lang",window.NF_I18N.locale);
  }catch(e){/* keep last-known bundle / embedded fallbacks */}
  return window.NF_I18N;
};
const listLocales=async()=>{
  try{return await fetch(API+"/i18n/locales",{headers:{"ngrok-skip-browser-warning":"true"}}).then(r=>r.json());}
  catch(e){return[{code:"en",name:"English",native_name:"English",direction:"ltr"}];}
};
// tr(namespace,key,fallback) — resolves a string from the loaded DB bundle.
const tr=(ns,key,fallback)=>{
  const s=(window.NF_I18N&&window.NF_I18N.strings)||{};
  return (s[ns]&&s[ns][key])||fallback||key;
};
// The chosen language persists across sessions and screens (login → app).
const getSavedLocale=()=>{
  try{return localStorage.getItem("nf_locale")||(navigator.language||"en").slice(0,2)||"en";}
  catch(e){return "en";}

const CURRENCY_OPTIONS=["INR","CAD","USD","EUR","AUD","AED","SAR","GBP","SGD"];
const SIGNUP_COUNTRIES=["India","Canada","United States","Europe","Australia","United Arab Emirates","Saudi Arabia","United Kingdom","Singapore"];
const detectCountryFromTimezone=()=>{
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||"";
  if(tz.includes("Toronto")||tz.includes("Vancouver")||tz.includes("Canada"))return"Canada";
  if(tz.includes("New_York")||tz.includes("Chicago")||tz.includes("Denver")||tz.includes("Los_Angeles"))return"United States";
  if(tz.includes("Kolkata"))return"India";
  if(tz.includes("London"))return"United Kingdom";
  if(tz.includes("Berlin")||tz.includes("Paris")||tz.includes("Rome")||tz.includes("Madrid")||tz.includes("Amsterdam"))return"Europe";
  if(tz.includes("Sydney")||tz.includes("Melbourne"))return"Australia";
  if(tz.includes("Dubai"))return"United Arab Emirates";
  if(tz.includes("Riyadh"))return"Saudi Arabia";
  if(tz.includes("Singapore"))return"Singapore";
  return"India";
};

// ── PDF Download helper ─────────────────────────────────────────────────────
const downloadPDF=async(endpoint,body,filename)=>{
  const headers={"Content-Type":"application/json","ngrok-skip-browser-warning":"true"};
  if(getToken())headers["Authorization"]="Bearer "+getToken();
  try{
    const r=await fetch(API+endpoint,{method:"POST",headers,body:JSON.stringify(body)});
    if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"PDF generation failed");};
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=filename||"report.pdf";
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);URL.revokeObjectURL(url);
  }catch(e){alert("PDF Error: "+e.message)}
};

// ── Chart wrapper ──────────────────────────────────────────────────────────────
const ChartBar=({data,labels,label})=>{
  const ref=useRef();const chart=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    chart.current=new Chart(ref.current,{
      type:"bar",
      data:{labels,datasets:[{label,data,backgroundColor:"#3b82f680",borderColor:"#3b82f6",borderWidth:2,borderRadius:6}]},
      options:{responsive:true,plugins:{legend:{display:false},
        tooltip:{callbacks:{label:(c)=>fmt(c.parsed.y)}}},
        scales:{y:{beginAtZero:true,ticks:{callback:(v)=>Number(v).toLocaleString(CURRENCY_LOCALES[window.NF_CURRENCY]||"en-US")}}}}
    });
  },[data]);
  return <canvas ref={ref}/>;
};
const ChartDoughnut=({data,labels})=>{
  const ref=useRef();const chart=useRef();
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    if(chart.current)chart.current.destroy();
    chart.current=new Chart(ref.current,{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6"],borderWidth:0}]},
      options:{responsive:true,plugins:{legend:{position:"bottom"}},cutout:"65%"}
    });
  },[data]);
  return <canvas ref={ref} style={{maxHeight:200}}/>;
};

const Tasks=({toast})=>{
  const[tasks,setTasks]=useState([]);
  const[projects,setProjects]=useState([]);
  const[workers,setWorkers]=useState([]);
  const[selProj,setSelProj]=useState("");
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);

  const load=async()=>{
    const[p,w]=await Promise.all([api("/projects"),api("/workers")]);
    setProjects(p);setWorkers(w);
    if(p.length){
      const pid=selProj||p[0].id;setSelProj(pid);
      const t=await api(`/projects/${pid}/tasks`);setTasks(t);
    }
  };
  useEffect(()=>{load()},[]);
  const loadTasks=async(pid)=>{
    setSelProj(pid);
    const t=await api(`/projects/${pid}/tasks`);setTasks(t);
  };

  const save=async(d)=>{
    try{
      if(modal.edit){
        await api(`/projects/tasks/${modal.edit.id}`,{method:"PUT",body:JSON.stringify({...d,project_id:selProj})});
        toast("Task updated","success");
      } else {
        await api(`/projects/${selProj}/tasks`,{method:"POST",body:JSON.stringify({...d,project_id:selProj})});
        toast("Task created","success");
      }
      setModal(null);loadTasks(selProj);
    }catch(e){toast(e.message,"error")}
  };
  const del=async(id)=>{
    try{await api(`/projects/tasks/${id}`,{method:"DELETE"});toast("Deleted","success");
      setConfirm(null);loadTasks(selProj);}catch(e){toast(e.message,"error")}
  };
  const moveTask=async(task,newStatus)=>{
    try{await api(`/projects/tasks/${task.id}`,{method:"PUT",body:JSON.stringify({...task,status:newStatus})});
      loadTasks(selProj);}catch(e){}
  };

  const workerName=(id)=>{const w=workers.find(w=>w.id===id);return w?`${w.first_name} ${w.last_name}`:"—"};
  const byCol=(col)=>tasks.filter(t=>t.status===col);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Task Board</h2>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <select value={selProj} onChange={e=>loadTasks(e.target.value)} style={{padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13}}>
            {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
          <button className="btn btn-primary" onClick={()=>setModal({})} disabled={!selProj}>
            <i className="fas fa-plus"/>Add Task</button>
        </div>
      </div>

      <div className="kanban">
        {TASK_COLS.map(col=>(
          <div className="kanban-col" key={col}>
            <div className="kanban-col-title">
              <span style={{color:COL_COLORS[col]}}>{COL_LABELS[col]}</span>
              <span style={{background:COL_COLORS[col]+"22",color:COL_COLORS[col],
                borderRadius:12,padding:"1px 7px",fontSize:11}}>{byCol(col).length}</span>
            </div>
            {byCol(col).map(t=>(
              <div className="kanban-card" key={t.id}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <h4>{t.title}</h4>
                  <div style={{display:"flex",gap:3}}>
                    <button className="btn btn-outline btn-sm" style={{padding:"2px 5px"}} onClick={()=>setModal({edit:t})}><i className="fas fa-pen" style={{fontSize:10}}/></button>
                    <button className="btn btn-danger btn-sm" style={{padding:"2px 5px"}} onClick={()=>setConfirm(t.id)}><i className="fas fa-trash" style={{fontSize:10}}/></button>
                  </div>
                </div>
                <div style={{display:"flex",gap:4,marginBottom:6}}>
                  <Badge v={t.priority}/>
                </div>
                {t.assignee_id&&<p style={{fontSize:11,color:"#64748b"}}><i className="fas fa-user" style={{marginRight:4}}/>{workerName(t.assignee_id)}</p>}
                {t.due_date&&<p style={{fontSize:11,color:"#94a3b8"}}><i className="fas fa-calendar" style={{marginRight:4}}/>{fmtDate(t.due_date)}</p>}
                <div style={{display:"flex",gap:4,marginTop:8,flexWrap:"wrap"}}>
                  {TASK_COLS.filter(c=>c!==col).map(c=>(
                    <button key={c} className="btn btn-outline btn-sm" style={{fontSize:10,padding:"2px 7px"}}
                      onClick={()=>moveTask(t,c)}>→ {COL_LABELS[c]}</button>
                  ))}
                </div>
              </div>
            ))}
            {!byCol(col).length&&<div style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:"16px 0"}}>No tasks</div>}
          </div>
        ))}
      </div>

      {modal&&<Modal title={modal.edit?"Edit Task":"New Task"} onClose={()=>setModal(null)}>
        <TaskForm init={modal.edit} projects={projects} workers={workers} onSave={save} onClose={()=>setModal(null)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this task?" onYes={()=>del(confirm)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

  const[confirm,setConfirm]=useState(null);

  const load=()=>{
    api("/invoices").then(d=>setInvoices(Array.isArray(d)?d:[])).catch(()=>{});
    api("/expenses").then(d=>setExpenses(Array.isArray(d)?d:[])).catch(()=>{});
    api("/clients").then(d=>setClients(Array.isArray(d)?d:[])).catch(()=>{});
    api("/projects/").then(d=>setProjects(Array.isArray(d)?d:(d.projects||d.items||[]))).catch(()=>{});
  };
  useEffect(()=>{load()},[]);

  const saveInvoice=async(d)=>{
    try{
      if(modal.edit)await api(`/invoices/${modal.edit.id}`,{method:"PUT",body:JSON.stringify(d)});
      else await api("/invoices",{method:"POST",body:JSON.stringify(d)});
      toast("Saved","success");setModal(null);load();
    }catch(e){toast(e.message,"error")}
  };
  const saveExpense=async(d)=>{
    try{await api("/expenses",{method:"POST",body:JSON.stringify(d)});toast("Expense added","success");setModal(null);load();}
    catch(e){toast(e.message,"error")}
  };
  const delInvoice=async(id)=>{
    try{await api(`/invoices/${id}`,{method:"DELETE"});toast("Deleted","success");setConfirm(null);load()}
    catch(e){toast(e.message,"error")}
  };
  const delExpense=async(id)=>{
    try{await api(`/expenses/${id}`,{method:"DELETE"});toast("Deleted","success");setConfirm(null);load()}
    catch(e){toast(e.message,"error")}
  };

  const clientName=(id)=>{const c=clients.find(c=>c.id===id);return c?c.name:"—"};
  const projName=(id)=>{const p=projects.find(p=>p.id===id);return p?p.name:"—"};
  const totalPaid=invoices.filter(i=>i.status==="paid").reduce((s,i)=>s+i.total,0);
  const totalPending=invoices.filter(i=>["sent","draft"].includes(i.status)).reduce((s,i)=>s+i.total,0);
  const totalExp=expenses.reduce((s,e)=>s+e.amount,0);

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Finance & Billing</h2>
        <div style={{display:"flex",gap:8}}>
          {tab==="invoices"&&<button className="btn btn-primary" onClick={()=>setModal({type:"invoice"})}>
            <i className="fas fa-plus"/>New Invoice</button>}
          {tab==="expenses"&&<button className="btn btn-primary" onClick={()=>setModal({type:"expense"})}>
            <i className="fas fa-plus"/>Add Expense</button>}
        </div>
      </div>

      <div className="grid-3" style={{marginBottom:20}}>
        {[{label:"Revenue Collected",val:totalPaid,color:"#ecfdf5",tc:"#059669",icon:"fa-circle-check"},
          {label:"Pending / Draft",val:totalPending,color:"#fef3c7",tc:"#d97706",icon:"fa-clock"},
          {label:"Total Expenses",val:totalExp,color:"#fef2f2",tc:"#dc2626",icon:"fa-arrow-trend-down"}].map((s,i)=>(
          <div className="stat-card" key={i}>
            <div className="stat-icon" style={{background:s.color,color:s.tc}}><i className={`fas ${s.icon}`}/></div>
            <div className="stat-info"><h3 style={{fontSize:16}}>{fmt(s.val)}</h3><p>{s.label}</p></div>
          </div>
        ))}
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {["invoices","expenses"].map(t=>(
          <button key={t} className={`btn ${tab===t?"btn-primary":"btn-outline"}`}
            onClick={()=>setTab(t)} style={{textTransform:"capitalize"}}>{t}</button>
        ))}
      </div>

      {tab==="invoices"&&(
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Invoice#</th><th>Client</th><th>Project</th><th>Subtotal</th><th>GST</th><th>Total</th><th>Status</th><th>Due</th><th>Actions</th></tr></thead>
              <tbody>
                {invoices.map(inv=>(
                  <tr key={inv.id}>
                    <td style={{fontWeight:600,fontFamily:"monospace"}}>{inv.invoice_no}</td>
                    <td>{clientName(inv.client_id)}</td>
                    <td style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{projName(inv.project_id)}</td>
                    <td>{fmt(inv.subtotal)}</td>
                    <td>{inv.tax_rate}%</td>
                    <td style={{fontWeight:600}}>{fmt(inv.total)}</td>
                    <td><Badge v={inv.status}/></td>
                    <td style={{fontSize:11}}>{fmtDate(inv.due_date)}</td>
                    <td>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn btn-outline btn-sm" onClick={()=>setModal({type:"invoice",edit:inv})}><i className="fas fa-pen"/></button>
                        <button className="btn btn-danger btn-sm" onClick={()=>setConfirm({type:"invoice",id:inv.id})}><i className="fas fa-trash"/></button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==="expenses"&&(
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Description</th><th>Category</th><th>Project</th><th>Amount</th><th>Vendor</th><th>Date</th><th>Approved</th><th>Actions</th></tr></thead>
              <tbody>
                {expenses.map(e=>(
                  <tr key={e.id}>
                    <td>{e.description||"—"}</td>
                    <td style={{textTransform:"capitalize"}}>{e.category||"—"}</td>
                    <td style={{fontSize:12}}>{projName(e.project_id)}</td>
                    <td style={{fontWeight:600}}>{fmt(e.amount)}</td>
                    <td>{e.vendor||"—"}</td>
                    <td style={{fontSize:11}}>{fmtDate(e.date)}</td>
                    <td><Badge v={e.approved?"passed":"failed"}/></td>
                    <td><button className="btn btn-danger btn-sm" onClick={()=>setConfirm({type:"expense",id:e.id})}><i className="fas fa-trash"/></button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {modal?.type==="invoice"&&<Modal title={modal.edit?"Edit Invoice":"New Invoice"} onClose={()=>setModal(null)}>
        <InvoiceForm init={modal.edit} clients={clients} projects={projects} onSave={saveInvoice} onClose={()=>setModal(null)}/>
      </Modal>}
      {modal?.type==="expense"&&<Modal title="Add Expense" onClose={()=>setModal(null)}>
        <ExpenseForm projects={projects} onSave={saveExpense} onClose={()=>setModal(null)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this record?" onYes={()=>confirm.type==="invoice"?delInvoice(confirm.id):delExpense(confirm.id)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

        <div className="form-group"><label>GST %</label>

        <div className="form-group"><label>Due Date</label><input type="date" value={d.due_date} onChange={e=>set("due_date",e.target.value)}/></div>

      <div style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <label style={{fontSize:12,fontWeight:600,color:"#475569",margin:0}}>Line Items</label>
          <button type="button" className="btn btn-outline btn-sm" onClick={addItem}><i className="fas fa-plus"/>Add Row</button>
        </div>
        {items.map((it,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr auto",gap:6,marginBottom:6,alignItems:"center"}}>
            <input placeholder="Description" value={it.description} onChange={e=>setItem(i,"description",e.target.value)}/>
            <input type="number" placeholder="Qty" value={it.quantity} onChange={e=>setItem(i,"quantity",e.target.value)}/>
            <input type="number" placeholder={`Rate ${window.NF_CURRENCY||"INR"}`} value={it.rate} onChange={e=>setItem(i,"rate",e.target.value)}/>
            <span style={{fontSize:12,fontWeight:600}}>{fmt((+it.quantity||0)*(+it.rate||0))}</span>
            <button type="button" className="btn btn-danger btn-sm" onClick={()=>delItem(i)}><i className="fas fa-times"/></button>
          </div>

        <div style={{borderTop:"1px solid #e2e8f0",paddingTop:8,marginTop:8,fontSize:13}}>

          <div style={{display:"flex",justifyContent:"space-between",color:"#64748b"}}><span>GST ({d.tax_rate}%)</span><span>{fmt(tax)}</span></div>

const DOC_TYPES=["blueprint","permit","contract","drawing","report","specification","photo","other"];
const DOC_ICONS={"blueprint":"fa-drafting-compass","permit":"fa-certificate","contract":"fa-file-signature",
  "drawing":"fa-pencil-ruler","report":"fa-file-alt","specification":"fa-list-check","photo":"fa-image","other":"fa-file"};

const Documents=({toast})=>{
  const[docs,setDocs]=useState([]);
  const[projects,setProjects]=useState([]);
  const[modal,setModal]=useState(null);
  const[filterType,setFilterType]=useState("");
  const[confirm,setConfirm]=useState(null);
  const[search,setSearch]=useState("");

  const load=()=>Promise.all([api("/documents"),api("/projects")]).then(([d,p])=>{setDocs(d);setProjects(p)});
  useEffect(()=>{load()},[]);

  const saveDoc=async(d)=>{
    try{
      if(d)await api("/documents",{method:"POST",body:JSON.stringify(d)});
      toast("Document saved","success");setModal(null);load();
    }catch(e){toast(e.message,"error")}
  };
  const del=async(id)=>{
    try{await api(`/documents/${id}`,{method:"DELETE"});toast("Deleted","success");setConfirm(null);load()}
    catch(e){toast(e.message,"error")}
  };
  const projName=(id)=>{const p=projects.find(p=>p.id===id);return p?p.name:"—"};
  const shown=docs.filter(d=>{
    if(filterType&&d.doc_type!==filterType)return false;
    if(search&&!d.title.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{fontSize:20,fontWeight:700}}>Document Management</h2>
        <button className="btn btn-primary" onClick={()=>setModal({})}><i className="fas fa-plus"/>Add Document</button>
      </div>
      <div className="card">
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
          <div className="search-bar"><i className="fas fa-search"/>
            <input placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
          <select value={filterType} onChange={e=>setFilterType(e.target.value)}
            style={{padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13}}>
            <option value="">All Types</option>
            {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:14}}>
          {shown.map(d=>(
            <div key={d.id} className="card" style={{padding:14,border:"1px solid #e2e8f0"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{width:40,height:40,borderRadius:8,background:"#eff6ff",color:"#3b82f6",
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>
                  <i className={`fas ${DOC_ICONS[d.doc_type]||"fa-file"}`}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.title}</div>
                  <div style={{fontSize:11,color:"#64748b",textTransform:"capitalize"}}>{d.doc_type||"—"} · v{d.version}</div>
                </div>
              </div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>{projName(d.project_id)}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>By {d.uploaded_by||"—"} · {fmtDate(d.created_at)}</div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:6}}>
                {d.file_name&&<span className="chip" style={{fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}><i className="fas fa-paperclip" style={{marginRight:3}}/>{d.file_name}</span>}
                <div style={{display:"flex",gap:4,marginLeft:"auto",flexShrink:0}}>
                  {d.file_name&&<a href={API+"/documents/"+d.id+"/download"} target="_blank" rel="noreferrer"
                    className="btn btn-outline btn-sm" style={{padding:"3px 8px"}} title="Download"><i className="fas fa-download"/></a>}
                  <button className="btn btn-danger btn-sm" style={{padding:"3px 8px"}} onClick={()=>setConfirm(d.id)}><i className="fas fa-trash"/></button>
                </div>
              </div>
            </div>
          ))}
          {!shown.length&&<div className="empty" style={{gridColumn:"1/-1"}}><i className="fas fa-folder-open"/>No documents found</div>}
        </div>
      </div>
      {modal&&<Modal title="Add Document" onClose={()=>setModal(null)}>
        <DocumentForm projects={projects} onSave={saveDoc} onClose={()=>setModal(null)}/>
      </Modal>}
      {confirm&&<Confirm msg="Delete this document?" onYes={()=>del(confirm)} onNo={()=>setConfirm(null)}/>}
    </div>
  );
};

const DocumentForm=({projects,onSave,onClose})=>{
  const[f,setF]=useState(null);
  const[d,setD]=useState({title:"",project_id:"",doc_type:"blueprint",version:"1.0",description:"",uploaded_by:""});
  const[uploading,setUploading]=useState(false);
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const fileRef=useRef();

  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    setF(file);
    if(!d.title)setD(p=>({...p,title:file.name.replace(/\.[^.]+$/,"")}));
  };

  const submit=async(e)=>{
    e.preventDefault();
    setUploading(true);
    try{
      if(f){
        // multipart upload
        const fd=new FormData();
        fd.append("file",f);
        fd.append("title",d.title);
        fd.append("doc_type",d.doc_type);
        fd.append("version",d.version);
        fd.append("uploaded_by",d.uploaded_by);
        fd.append("description",d.description);
        if(d.project_id)fd.append("project_id",d.project_id);
        const headers={"ngrok-skip-browser-warning":"true"};
        if(getToken())headers["Authorization"]="Bearer "+getToken();
        const r=await fetch(API+"/documents/upload",{method:"POST",headers,body:fd});
        if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"Upload failed")}
        onSave(null);
      }else{
        await onSave(d);
      }
    }catch(err){alert(err.message)}
    setUploading(false);
  };

  return(
    <form onSubmit={submit}>
      {/* File picker */}
      <div className="form-group">
        <label>Attach File</label>
        <div onClick={()=>fileRef.current.click()} style={{border:"2px dashed #bfdbfe",borderRadius:8,padding:"18px",textAlign:"center",cursor:"pointer",background:"#f8faff",transition:".15s"}}
          onDragOver={e=>{e.preventDefault()}} onDrop={e=>{e.preventDefault();const file=e.dataTransfer.files[0];if(file){setF(file);if(!d.title)setD(p=>({...p,title:file.name.replace(/\.[^.]+$/,"")}))};}}>
          {f
            ? <><i className="fas fa-file-check" style={{fontSize:24,color:"#3b82f6",marginBottom:6,display:"block"}}/><strong style={{color:"#1e40af"}}>{f.name}</strong><span style={{fontSize:11,color:"#64748b",display:"block"}}>{(f.size/1024).toFixed(1)} KB</span></>
            : <><i className="fas fa-cloud-upload-alt" style={{fontSize:28,color:"#94a3b8",marginBottom:6,display:"block"}}/><span style={{color:"#64748b",fontSize:13}}>Click or drag &amp; drop a file here</span><br/><span style={{fontSize:11,color:"#94a3b8"}}>PDF, DWG, DOCX, XLSX, JPG, PNG…</span></>
          }
        </div>
        <input ref={fileRef} type="file" style={{display:"none"}} accept=".pdf,.dwg,.dxf,.doc,.docx,.xls,.xlsx,.jpg,.jpeg,.png,.zip,.rar" onChange={handleFile}/>
      </div>

      <div className="form-group"><label>Title *</label><input required value={d.title} onChange={e=>set("title",e.target.value)} placeholder="Document title"/></div>
      <div className="form-row">
        <div className="form-group"><label>Type</label>
          <select value={d.doc_type} onChange={e=>set("doc_type",e.target.value)}>
            {DOC_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
          </select></div>
        <div className="form-group"><label>Version</label><input value={d.version} onChange={e=>set("version",e.target.value)}/></div>
      </div>
      <div className="form-group"><label>Project</label>
        <select value={d.project_id} onChange={e=>set("project_id",e.target.value)}>
          <option value="">None</option>
          {projects.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
        </select></div>
      <div className="form-group"><label>Uploaded By</label><input value={d.uploaded_by} onChange={e=>set("uploaded_by",e.target.value)} placeholder="Your name"/></div>
      <div className="form-group"><label>Description</label><textarea value={d.description} onChange={e=>set("description",e.target.value)} style={{minHeight:50}}/></div>
      <div className="form-actions">
        <button type="button" className="btn btn-outline" onClick={onClose}>Cancel</button>
        <button type="submit" className="btn btn-primary" disabled={uploading}>
          {uploading?<><span className="spinner"/><span>Uploading…</span></>:<><i className="fas fa-upload"/>{f?"Upload &amp; Save":"Save"}</>}
        </button>
      </div>
    </form>
  );
};

const Inventory=({toast})=>{
  const[items,setItems]=useState([]);
  const[modal,setModal]=useState(null);
  const[confirm,setConfirm]=useState(null);
  const[search,setSearch]=useState("");
  const[filterCat,setFilterCat]=useState("");

  const load=()=>api("/inventory").then(setItems);
  useEffect(()=>{load()},[]);

  const save=async(d)=>{
    try{
      if(modal.edit)await api(`/inventory/${modal.edit.id}`,{method:"PUT",body:JSON.stringify(d)});
      else await api("/inventory",{method:"POST",body:JSON.stringify(d)});

  };
  const del=async(id)=>{
    try{await api(`/inventory/${id}`,{method:"DELETE"});toast("Deleted","success");setConfirm(null);load()}
    catch(e){toast(e.message,"error")}
  };

  const shown=items.filter(it=>{
    if(filterCat&&it.category!==filterCat)return false;
    if(search&&!it.name.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  });
  const lowStock=items.filter(it=>it.quantity<=it.min_quantity).length;

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

            <option value="">All Categories</option>
            {["material","tool","equipment"].map(c=><option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Item</th><th>Category</th><th>SKU</th><th>Stock</th><th>Min Stock</th><th>Unit Cost</th><th>Total Value</th><th>Supplier</th><th>Location</th><th>Actions</th></tr></thead>
            <tbody>
              {shown.map(it=>{
                const low=it.quantity<=it.min_quantity;
                return(
                  <tr key={it.id}>
                    <td style={{fontWeight:600,color:low?"#dc2626":"#1e293b"}}>{it.name}</td>
                    <td style={{textTransform:"capitalize"}}>{it.category||"—"}</td>
                    <td style={{fontFamily:"monospace",fontSize:11}}>{it.sku||"—"}</td>
                    <td>
                      <span style={{fontWeight:600,color:low?"#dc2626":"#059669"}}>{it.quantity}</span>
                      <span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>{it.unit}</span>
                      {low&&<i className="fas fa-triangle-exclamation" style={{color:"#f59e0b",marginLeft:4,fontSize:11}}/>}
                    </td>
                    <td style={{fontSize:12,color:"#64748b"}}>{it.min_quantity} {it.unit}</td>
                    <td>{fmt(it.unit_cost)}</td>
                    <td style={{fontWeight:600}}>{fmt(it.quantity*it.unit_cost)}</td>
                    <td style={{fontSize:12}}>{it.supplier||"—"}</td>
                    <td style={{fontSize:12}}>{it.location||"—"}</td>
                    <td>
                      <div style={{display:"flex",gap:4}}>
                        <button className="btn btn-outline btn-sm" onClick={()=>setModal({edit:it})}><i className="fas fa-pen"/></button>
                        <button className="btn btn-danger btn-sm" onClick={()=>setConfirm(it.id)}><i className="fas fa-trash"/></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {modal&&<Modal title={modal.edit?"Edit Item":"Add Item"} onClose={()=>setModal(null)}>

// ═══════════════ 1. LOAD CALCULATOR ═══════════════════════════════════════════
const LoadCalc=({toast})=>{
  const[tab,setTab]=useState("dead");
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  // Dead
  const[dead,setDead]=useState({slab_thickness_mm:150,floor_finish_kn_m2:1.0,partition_kn_m2:1.0,ceiling_kn_m2:0.25,wall_thickness_mm:0,wall_height_m:0});
  // Wind
  const[wind,setWind]=useState({city:"Mumbai",building_height_m:15,terrain_category:"2",structure_class:"B_general",topography:"flat"});
  // Seismic
  const[seis,setSeis]=useState({city:"Mumbai",total_seismic_weight_kn:5000,building_height_m:15,num_floors:5,soil_type:"II",response_reduction:5,building_use:"residential"});
  // Combo
  const[combo,setCombo]=useState({DL:8,LL:3,WL:2,EQ:1.5});

  const calc=async()=>{
    setLoading(true);setResult(null);
    try{
      let r;
      if(tab==="dead") r=await api("/structural/loads/dead",{method:"POST",body:JSON.stringify(dead)});
      else if(tab==="wind") r=await api("/structural/loads/wind",{method:"POST",body:JSON.stringify(wind)});
      else if(tab==="seismic") r=await api("/structural/loads/seismic",{method:"POST",body:JSON.stringify(seis)});
      else r=await api("/structural/loads/combination",{method:"POST",body:JSON.stringify(combo)});
      setResult(r);
    }catch(e){toast(e.message,"error")}
    setLoading(false);
  };

  const setD=(k,v)=>setDead(p=>({...p,[k]:v}));
  const setW=(k,v)=>setWind(p=>({...p,[k]:v}));
  const setS=(k,v)=>setSeis(p=>({...p,[k]:v}));
  const setC=(k,v)=>setCombo(p=>({...p,[k]:v}));

  const cities=["Mumbai","Delhi","Chennai","Kolkata","Bangalore","Ahmedabad","Hyderabad","Pune","Guwahati","Surat","Jaipur","Lucknow","Nagpur","Bhopal","Patna","Chandigarh"];

  return(
    <div>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>Structural Load Calculator</h2>
      <div className="struct-tabs">
        {[["dead","Dead Load (IS 875-1)"],["wind","Wind Load (IS 875-3)"],["seismic","Seismic (IS 1893)"],["combo","Load Combinations"]].map(([k,l])=>(
          <button key={k} className={`struct-tab ${tab===k?"active":""}`} onClick={()=>{setTab(k);setResult(null)}}>{l}</button>
        ))}
      </div>
      <div className="struct-grid">
        <div className="calc-form">
          {tab==="dead"&&<>

            <FG label="Max Aggregate Size (mm)"><SI value={form.nominal_agg_size_mm} onChange={v=>set("nominal_agg_size_mm",parseInt(v))} options={[[10,"10 mm"],[20,"20 mm (standard)"],[40,"40 mm"]]}/></FG>
            <FG label="Fine Aggregate Zone (IS 383)"><SI value={form.fa_zone} onChange={v=>set("fa_zone",v)} options={[["I","Zone I (Coarse)"],["II","Zone II"],["III","Zone III"],["IV","Zone IV (Fine)"]]}/></FG>
          </div>
          <FG label="Target Slump (mm)"><NI value={form.slump_mm} onChange={v=>set("slump_mm",v)} min={25} max={200} step={25}/></FG>
          <div className="form-row">
            <FG label="Cement SG"><NI value={form.cement_sg} onChange={v=>set("cement_sg",v)} min={3.0} max={3.3} step={0.01}/></FG>
            <FG label="Fine Agg. SG"><NI value={form.fa_sg} onChange={v=>set("fa_sg",v)} min={2.4} max={2.8} step={0.01}/></FG>
          </div>
          <div className="form-row">
            <FG label="Coarse Agg. SG"><NI value={form.ca_sg} onChange={v=>set("ca_sg",v)} min={2.4} max={2.9} step={0.01}/></FG>
            <FG label="Fly Ash % (of cement)"><NI value={form.flyash_percent} onChange={v=>set("flyash_percent",v)} min={0} max={35}/></FG>
          </div>
          <FG label="Chemical Admixture %"><NI value={form.admixture_percent} onChange={v=>set("admixture_percent",v)} min={0} max={2} step={0.1}/></FG>
          <CalcBtn loading={loading} onClick={calc}/>
          <p className="is-ref" style={{marginTop:8}}>IS 10262:2019 — Concrete Mix Design</p>
        </div>
        <div className="calc-result">
          {!result?<NoResult/>:<>
            <div className="result-highlight" style={{marginBottom:12}}>
              <div className="big-num">{result.grade}</div>
              <div className="big-label">Target Strength: {result.target_strength_N_mm2} N/mm² (fck + 1.65σ)</div>
            </div>
            <Sec title="Design W/C Ratio">
              <RR label="Calculated W/C" val={result.design_parameters.wc_ratio}/>
              <RR label="Max W/C (IS 456 exposure)" val={result.compliance_checks.wc_max}/>
              <RR label="W/C OK?" val={result.compliance_checks.wc_ok?"YES":"NO"} ok={result.compliance_checks.wc_ok}/>
              <RR label="Water Content" val={result.design_parameters.water_content_kg_m3} unit="kg/m³"/>
              <RR label="Cement Content" val={result.design_parameters.cement_content_kg_m3} unit="kg/m³"/>
            </Sec>
            <Sec title="Mix Proportions per m³ of Concrete">
              <RR label="Cement" val={result.mix_proportions_per_m3.cement_kg} unit="kg"/>
              {result.mix_proportions_per_m3.fly_ash_kg>0&&<RR label="Fly Ash" val={result.mix_proportions_per_m3.fly_ash_kg} unit="kg"/>}
              <RR label="Water" val={result.mix_proportions_per_m3.water_kg} unit="kg"/>
              <RR label="Fine Aggregate" val={result.mix_proportions_per_m3.fine_aggregate_kg} unit="kg"/>
              <RR label="Coarse Aggregate" val={result.mix_proportions_per_m3.coarse_aggregate_kg} unit="kg"/>
              <RR label="Total" val={result.mix_proportions_per_m3.total_mass_kg} unit="kg"/>
            </Sec>
            <Sec title="Mix Ratio">
              <RR label="C : FA : CA" val={result.mix_ratio["C:FA:CA"]}/>
              <RR label="W/C Ratio" val={result.mix_ratio.water_cement_ratio}/>
            </Sec>
            <Sec title="Trial Mix for 50 Litres">
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Material</th><th>Quantity (kg)</th></tr></thead>
                  <tbody>
                    <tr><td>Cement</td><td><b>{result.trial_mix_50L.cement_kg}</b></td></tr>
                    {result.trial_mix_50L.fly_ash_kg>0&&<tr><td>Fly Ash</td><td><b>{result.trial_mix_50L.fly_ash_kg}</b></td></tr>}
                    <tr><td>Water</td><td><b>{result.trial_mix_50L.water_kg}</b></td></tr>
                    <tr><td>Fine Aggregate</td><td><b>{result.trial_mix_50L.fine_aggregate_kg}</b></td></tr>
                    <tr><td>Coarse Aggregate</td><td><b>{result.trial_mix_50L.coarse_aggregate_kg}</b></td></tr>
                  </tbody>
                </table>
              </div>
            </Sec>
            <div className="is-ref">{result.code}</div>
          </>}
        </div>
      </div>
    </div>
  );
};

// ═══════════════ 8. BOQ GENERATOR ═════════════════════════════════════════════
const BOQGenerator=({toast})=>{
  const[loading,setLoading]=useState(false);
  const[result,setResult]=useState(null);
  const[beams,setBeams]=useState([{beam_id:"B1",span_m:5,b_mm:230,D_mm:450,n_spans:4,steel_kg:85,concrete_grade:"M25",fy:415}]);
  const[cols,setCols]=useState([{col_id:"C1",height_m:3,b_mm:300,D_mm:300,n_columns:8,steel_kg:45,concrete_grade:"M25",fy:415}]);
  const[slabs,setSlabs]=useState([{slab_id:"S1",lx_m:3.5,ly_m:4.5,D_mm:150,n_panels:6,steel_kg:120,concrete_grade:"M25",fy:415}]);
  const[fdns,setFdns]=useState([{fdn_id:"F1",L_m:1.8,B_m:1.8,D_mm:400,n_footings:8,steel_kg:35,concrete_grade:"M25",fy:415}]);

  const calc=async()=>{
    setLoading(true);setResult(null);
    try{
      const r=await api("/structural/boq/generate",{method:"POST",body:JSON.stringify({beams,columns:cols,slabs,footings:fdns})});
      setResult(r);
    }catch(e){toast(e.message,"error")}
    setLoading(false);
  };

  const inrFmt=(n)=>new Intl.NumberFormat("en-IN",{style:"currency",currency:"INR",maximumFractionDigits:0}).format(n);
  const upd=(arr,setArr,i,k,v)=>{const a=[...arr];a[i]={...a[i],[k]:v};setArr(a);};
  const add=(arr,setArr,tmpl)=>setArr([...arr,{...tmpl}]);
  const rem=(arr,setArr,i)=>setArr(arr.filter((_,j)=>j!==i));

  return(
    <div>
      <h2 style={{fontSize:20,fontWeight:700,marginBottom:16}}>BOQ Auto-Generator — Structural Members</h2>
      <div className="grid-2" style={{gap:20,marginBottom:20}}>
        {/* Beams */}
        <div className="card">
          <div className="card-header">
            <div className="card-title"><i className="fas fa-ruler-horizontal" style={{marginRight:6}}/>Beams</div>
            <button className="btn btn-outline btn-sm" onClick={()=>add(beams,setBeams,{beam_id:`B${beams.length+1}`,span_m:5,b_mm:230,D_mm:450,n_spans:1,steel_kg:85,concrete_grade:"M25",fy:415})}><i className="fas fa-plus"/>Add</button>
          </div>
          {beams.map((b,i)=><div key={i} style={{background:"#f8fafc",borderRadius:8,padding:10,marginBottom:8}}>
            <div className="form-row">
              <FG label="ID"><input value={b.beam_id} onChange={e=>upd(beams,setBeams,i,"beam_id",e.target.value)} style={{fontSize:12,padding:"5px 8px"}}/></FG>
              <FG label="Span (m)"><NI value={b.span_m} onChange={v=>upd(beams,setBeams,i,"span_m",v)} min={1}/></FG>
            </div>
            <div className="form-row">
              <FG label="b×D (mm)">
                <div style={{display:"flex",gap:4}}>
                  <NI value={b.b_mm} onChange={v=>upd(beams,setBeams,i,"b_mm",v)} min={150} step={25}/>
                  <NI value={b.D_mm} onChange={v=>upd(beams,setBeams,i,"D_mm",v)} min={200} step={25}/>
                </div>
              </FG>
              <FG label="No. Spans"><NI value={b.n_spans} onChange={v=>upd(beams,setBeams,i,"n_spans",parseInt(v)||1)} min={1} step={1}/></FG>
            </div>
            <div className="form-row">
              <FG label="Steel (kg/span)"><NI value={b.steel_kg} onChange={v=>upd(beams,setBeams,i,"steel_kg",v)} min={0}/></FG>
              <FG label="Grade"><SI value={b.concrete_grade} onChange={v=>upd(beams,setBeams,i,"concrete_grade",v)} options={[["M20","M20"],["M25","M25"],["M30","M30"]]}/></FG>
            </div>
            {beams.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>rem(beams,setBeams,i)}><i className="fas fa-trash"/>Remove</button>}
          </div>)}
        </div>
        {/* Columns */}
        <div className="card">
          <div className="card-header">
            <div className="card-title"><i className="fas fa-columns" style={{marginRight:6}}/>Columns</div>
            <button className="btn btn-outline btn-sm" onClick={()=>add(cols,setCols,{col_id:`C${cols.length+1}`,height_m:3,b_mm:300,D_mm:300,n_columns:1,steel_kg:45,concrete_grade:"M25",fy:415})}><i className="fas fa-plus"/>Add</button>
          </div>
          {cols.map((c,i)=><div key={i} style={{background:"#f8fafc",borderRadius:8,padding:10,marginBottom:8}}>
            <div className="form-row">
              <FG label="ID"><input value={c.col_id} onChange={e=>upd(cols,setCols,i,"col_id",e.target.value)} style={{fontSize:12,padding:"5px 8px"}}/></FG>
              <FG label="Height (m)"><NI value={c.height_m} onChange={v=>upd(cols,setCols,i,"height_m",v)} min={2}/></FG>
            </div>
            <div className="form-row">
              <FG label="b×D (mm)">
                <div style={{display:"flex",gap:4}}>
                  <NI value={c.b_mm} onChange={v=>upd(cols,setCols,i,"b_mm",v)} min={200} step={25}/>
                  <NI value={c.D_mm} onChange={v=>upd(cols,setCols,i,"D_mm",v)} min={200} step={25}/>
                </div>
              </FG>
              <FG label="No. Cols"><NI value={c.n_columns} onChange={v=>upd(cols,setCols,i,"n_columns",parseInt(v)||1)} min={1} step={1}/></FG>
            </div>
            <div className="form-row">
              <FG label="Steel (kg/col)"><NI value={c.steel_kg} onChange={v=>upd(cols,setCols,i,"steel_kg",v)} min={0}/></FG>
              <FG label="Grade"><SI value={c.concrete_grade} onChange={v=>upd(cols,setCols,i,"concrete_grade",v)} options={[["M25","M25"],["M30","M30"]]}/></FG>
            </div>
            {cols.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>rem(cols,setCols,i)}><i className="fas fa-trash"/>Remove</button>}
          </div>)}
        </div>
        {/* Slabs */}
        <div className="card">
          <div className="card-header">
            <div className="card-title"><i className="fas fa-border-all" style={{marginRight:6}}/>Slabs</div>
            <button className="btn btn-outline btn-sm" onClick={()=>add(slabs,setSlabs,{slab_id:`S${slabs.length+1}`,lx_m:3.5,ly_m:4.5,D_mm:150,n_panels:1,steel_kg:120,concrete_grade:"M25",fy:415})}><i className="fas fa-plus"/>Add</button>
          </div>
          {slabs.map((s,i)=><div key={i} style={{background:"#f8fafc",borderRadius:8,padding:10,marginBottom:8}}>
            <div className="form-row">
              <FG label="ID"><input value={s.slab_id} onChange={e=>upd(slabs,setSlabs,i,"slab_id",e.target.value)} style={{fontSize:12,padding:"5px 8px"}}/></FG>
              <FG label="Depth D (mm)"><NI value={s.D_mm} onChange={v=>upd(slabs,setSlabs,i,"D_mm",v)} min={75} step={25}/></FG>
            </div>
            <div className="form-row">
              <FG label="Lx (m)"><NI value={s.lx_m} onChange={v=>upd(slabs,setSlabs,i,"lx_m",v)} min={1}/></FG>
              <FG label="Ly (m)"><NI value={s.ly_m} onChange={v=>upd(slabs,setSlabs,i,"ly_m",v)} min={1}/></FG>
            </div>
            <div className="form-row">
              <FG label="No. Panels"><NI value={s.n_panels} onChange={v=>upd(slabs,setSlabs,i,"n_panels",parseInt(v)||1)} min={1} step={1}/></FG>
              <FG label="Steel (kg/panel)"><NI value={s.steel_kg} onChange={v=>upd(slabs,setSlabs,i,"steel_kg",v)} min={0}/></FG>
            </div>
            {slabs.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>rem(slabs,setSlabs,i)}><i className="fas fa-trash"/>Remove</button>}
          </div>)}
        </div>
        {/* Footings */}
        <div className="card">
          <div className="card-header">
            <div className="card-title"><i className="fas fa-mountain" style={{marginRight:6}}/>Foundations</div>
            <button className="btn btn-outline btn-sm" onClick={()=>add(fdns,setFdns,{fdn_id:`F${fdns.length+1}`,L_m:1.8,B_m:1.8,D_mm:400,n_footings:1,steel_kg:35,concrete_grade:"M25",fy:415})}><i className="fas fa-plus"/>Add</button>
          </div>
          {fdns.map((f,i)=><div key={i} style={{background:"#f8fafc",borderRadius:8,padding:10,marginBottom:8}}>
            <div className="form-row">
              <FG label="ID"><input value={f.fdn_id} onChange={e=>upd(fdns,setFdns,i,"fdn_id",e.target.value)} style={{fontSize:12,padding:"5px 8px"}}/></FG>
              <FG label="Depth D (mm)"><NI value={f.D_mm} onChange={v=>upd(fdns,setFdns,i,"D_mm",v)} min={200} step={50}/></FG>
            </div>
            <div className="form-row">
              <FG label="L (m)"><NI value={f.L_m} onChange={v=>upd(fdns,setFdns,i,"L_m",v)} min={0.5}/></FG>
              <FG label="B (m)"><NI value={f.B_m} onChange={v=>upd(fdns,setFdns,i,"B_m",v)} min={0.5}/></FG>
            </div>
            <div className="form-row">
              <FG label="No. Footings"><NI value={f.n_footings} onChange={v=>upd(fdns,setFdns,i,"n_footings",parseInt(v)||1)} min={1} step={1}/></FG>
              <FG label="Steel (kg/fdn)"><NI value={f.steel_kg} onChange={v=>upd(fdns,setFdns,i,"steel_kg",v)} min={0}/></FG>
            </div>
            {fdns.length>1&&<button className="btn btn-danger btn-sm" onClick={()=>rem(fdns,setFdns,i)}><i className="fas fa-trash"/>Remove</button>}
          </div>)}
        </div>
      </div>
      <button className="btn btn-primary" style={{width:"100%",padding:"12px",fontSize:15}} onClick={calc} disabled={loading}>
        {loading?<><span className="spinner"/><span>Generating BOQ…</span></>:<><i className="fas fa-file-invoice"/>Generate Structural BOQ</>}
      </button>

      {result&&<div style={{marginTop:24}}>
        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-icon" style={{background:"#eff6ff"}}><i className="fas fa-cubes" style={{color:"#3b82f6"}}/></div>
            <div className="stat-info"><h3>{result.summary_quantities.total_concrete_m3} m³</h3><p>Total Concrete</p></div>
          </div>
          <div className="stat-card">
            <div className="stat-icon" style={{background:"#fef3c7"}}><i className="fas fa-table-cells" style={{color:"#d97706"}}/></div>
            <div className="stat-info"><h3>{result.summary_quantities.total_formwork_m2} m²</h3><p>Formwork</p></div>
          </div>
          <div className="stat-card">
            <div className="stat-icon" style={{background:"#ecfdf5"}}><i className="fas fa-weight-scale" style={{color:"#059669"}}/></div>
            <div className="stat-info"><h3>{result.summary_quantities.total_steel_tonnes} T</h3><p>Steel ({result.summary_quantities.total_steel_kg} kg)</p></div>
          </div>
          <div className="stat-card">
            <div className="stat-icon" style={{background:"#fef2f2"}}><i className="fas fa-coins" style={{color:"#dc2626"}}/></div>
            <div className="stat-info"><h3>{result.cost_summary_INR.grand_total_lakhs} L</h3><p>Est. Total Cost (incl. GST)</p></div>
          </div>
        </div>
        <div className="card" style={{marginTop:16}}>
          <div className="card-header"><div className="card-title">Cost Summary</div></div>
          <table>
            <thead><tr><th>Element</th><th>Cost (INR)</th></tr></thead>
            <tbody>
              {result.items.map((it,i)=><tr key={i}><td>{it.element} — {it.id}</td><td>{inrFmt(it.total_cost_INR)}</td></tr>)}
              <tr style={{background:"#f8fafc"}}><td><b>Sub-total</b></td><td><b>{inrFmt(result.cost_summary_INR.subtotal)}</b></td></tr>
              <tr><td>GST @18%</td><td>{inrFmt(result.cost_summary_INR.GST_18pct)}</td></tr>
              <tr style={{background:"#eff6ff",fontWeight:700}}><td>GRAND TOTAL</td><td style={{fontSize:16}}>{inrFmt(result.cost_summary_INR.grand_total)}</td></tr>
            </tbody>
          </table>
          <p style={{fontSize:11,color:"#9ca3af",marginTop:10}}>{result.disclaimer}</p>
        </div>
      </div>}
    </div>
  );
};

const SignupForm=({onCreated})=>{
  const initialCountry=detectCountryFromTimezone();
  const profile=getCountryProfile(initialCountry);
  const[form,setForm]=useState({company_name:"",admin_name:"",admin_username:"",admin_email:"",admin_password:"",plan_name:"free",country:initialCountry,timezone:Intl.DateTimeFormat().resolvedOptions().timeZone||profile.timezone,currency:profile.currency});
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const setCountry=(country)=>{
    const p=getCountryProfile(country);
    setForm(f=>({...f,country,timezone:p.timezone,currency:p.currency==="Multi-currency"?"USD":p.currency}));
  };
  const submit=async(e)=>{
    e.preventDefault();setErr("");setLoading(true);
    try{
      const data=await api("/saas/onboard",{method:"POST",body:JSON.stringify(form)});

    }catch(e){setErr(e.message);}
    setLoading(false);

        <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Full Name</label><input required value={form.admin_name} onChange={e=>set("admin_name",e.target.value)} placeholder="Your name" style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14}}/></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Username</label><input required value={form.admin_username} onChange={e=>set("admin_username",e.target.value)} placeholder="Login username" style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14}}/></div>
        <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Password</label><input required type="password" value={form.admin_password} onChange={e=>set("admin_password",e.target.value)} placeholder="Create password" style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14}}/></div>
      </div>
      <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Email</label><input required type="email" value={form.admin_email} onChange={e=>set("admin_email",e.target.value)} placeholder="you@company.com" style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14}}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

        <div style={{marginBottom:12}}><label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>Plan</label><select value={form.plan_name} onChange={e=>set("plan_name",e.target.value)} style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14}}><option value="free">Free</option><option value="starter">Starter launch offer</option></select></div>

const LoginPage=({onLogin})=>{
  const initialMode=window.location.hash==="#signup"?"signup":"login";
  const[mode,setMode]=useState(initialMode);
  const[user,setUser]=useState("");
  const[pass,setPass]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  // Language picker on the login screen — options come from the DB, and the
  // choice is persisted so it carries through to every screen after login.
  const[langs,setLangs]=useState([]);
  const[loc,setLoc]=useState(getSavedLocale());
  useEffect(()=>{listLocales().then(setLangs);loadI18n(getSavedLocale()).then(b=>setLoc(b.locale));},[]);
  const pickLang=async(code)=>{const b=await loadI18n(code);saveLocale(b.locale);setLoc(b.locale);};

  const submit=async(e)=>{
    e.preventDefault();setErr("");setLoading(true);
    try{
      const fd=new URLSearchParams();
      fd.append("username",user);fd.append("password",pass);
      const r=await fetch(API+"/auth/login",{method:"POST",body:fd,headers:{"ngrok-skip-browser-warning":"true"}});
      if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.detail||"Login failed");}
      const data=await r.json();
      setToken(data.access_token);
      setRefresh(data.refresh_token);
      onLogin(data.user);
    }catch(e){setErr(e.message);}
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#0f172a 100%)",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div dir={window.NF_I18N.dir||"ltr"} style={{background:"#fff",borderRadius:16,padding:"40px 36px",width:mode==="signup"?620:380,boxShadow:"0 25px 60px rgba(0,0,0,.4)"}}>
        {/* Language selector (top-right of the card) */}
        <div style={{display:"flex",justifyContent:"flex-end",marginBottom:4}}>
          <label style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:"#64748b"}}>
            <i className="fas fa-language" style={{fontSize:15}}/>
            <select value={loc} onChange={e=>pickLang(e.target.value)}
              aria-label={tr("common","language","Language")}
              style={{fontSize:12,padding:"4px 6px",borderRadius:6,border:"1px solid #d1d5db",background:"#fff",cursor:"pointer"}}>
              {(langs.length?langs:[{code:"en",native_name:"English"}]).map(l=>(
                <option key={l.code} value={l.code}>{l.native_name||l.name||l.code}</option>
              ))}
            </select>
          </label>
        </div>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{width:56,height:56,background:"#1e40af",borderRadius:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 14px",fontSize:26}}>
            <i className="fas fa-building-columns" style={{color:"#fff"}}/>
          </div>
          <h1 style={{fontSize:22,fontWeight:800,color:"#0f172a"}}>NagaForge</h1>
          <p style={{color:"#64748b",fontSize:13,marginTop:4}}>{mode==="signup"?"Create your free workspace":"Integrated Construction Management"}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:18}}>
          <button type="button" onClick={()=>{setMode("login");window.location.hash="login";}} style={{padding:"9px",border:"1px solid #d1d5db",borderRadius:8,background:mode==="login"?"#eff6ff":"#fff",color:mode==="login"?"#1e40af":"#475569",fontWeight:700,cursor:"pointer"}}>Sign In</button>
          <button type="button" onClick={()=>{setMode("signup");window.location.hash="signup";}} style={{padding:"9px",border:"1px solid #d1d5db",borderRadius:8,background:mode==="signup"?"#eff6ff":"#fff",color:mode==="signup"?"#1e40af":"#475569",fontWeight:700,cursor:"pointer"}}>Free Signup</button>
        </div>
        {mode==="signup"?<SignupForm onCreated={(username)=>{setUser(username||"");setMode("login");window.location.hash="login";setErr("Workspace created. Sign in with your new username and password.");}}/>:<form onSubmit={submit}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>{tr("auth","username","Username")}</label>
            <input value={user} onChange={e=>setUser(e.target.value)} required placeholder={tr("auth","username","Username")}
              style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:12,fontWeight:600,color:"#374151",display:"block",marginBottom:6}}>{tr("auth","password","Password")}</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required placeholder={tr("auth","password","Password")}
              style={{width:"100%",padding:"10px 12px",border:"1px solid #d1d5db",borderRadius:8,fontSize:14,outline:"none"}}/>
          </div>
          {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:"9px 12px",color:"#dc2626",fontSize:13,marginBottom:14,display:"flex",alignItems:"center",gap:8}}>
            <i className="fas fa-exclamation-circle"/>{err}</div>}
          <button type="submit" disabled={loading} style={{width:"100%",padding:"11px",background:"#1e40af",color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><span className="spinner"/>{tr("common","loading","Signing in…")}</>:<><i className="fas fa-sign-in-alt"/>{tr("auth","login","Sign In")}</>}
          </button>
        </form>}
        {mode==="login"&&<div style={{marginTop:20,padding:"12px",background:"#f8fafc",borderRadius:8,fontSize:12,color:"#64748b",textAlign:"center"}}>
          Default admin: <strong>admin</strong> / <strong>admin123</strong>
        </div>}
      </div>
    </div>
  );
};

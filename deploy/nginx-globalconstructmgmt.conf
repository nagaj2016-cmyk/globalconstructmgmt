# /etc/nginx/sites-available/globalconstructmgmt.com
# After `certbot --nginx`, certbot injects the TLS lines and the :80 -> :443 redirect.

server {
    listen 80;
    server_name globalconstructmgmt.com www.globalconstructmgmt.com;

    # Allow large document/photo uploads (matches MAX_UPLOAD_MB=50)
    client_max_body_size 60m;

    # Proxy everything to the FastAPI app (Gunicorn/Uvicorn on 127.0.0.1:8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Serve uploaded files directly from disk (faster than proxying)
    location /uploads/ {
        alias /opt/nagaforge-gpt/uploads/;
        access_log off;
        expires 7d;
    }
}
